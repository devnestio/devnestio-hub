<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailwind CSS Color Palette — All Shades, Copy Hex/RGB/HSL/Class</title>
  <meta name="description" content="Full Tailwind CSS v3 color palette reference. All shades 50–950. Copy hex, RGB, HSL values or Tailwind class names instantly. Search by color name or hex." />
  <link rel="canonical" href="https://devnestio.pages.dev/tailwind-color-palette/" />
  <meta property="og:title" content="Tailwind CSS Color Palette Reference" />
  <meta property="og:description" content="Browse all Tailwind v3 colors with shades 50–950. Copy hex, RGB, HSL, or class name." />
  <meta property="og:type" content="website" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 28px 32px 20px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #e6edf3; }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-muted); margin-top: 6px; font-size: .9rem; }
    main { flex: 1; padding: 28px 32px; max-width: 1200px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .search-input { flex: 1; min-width: 200px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px 14px; font-size: .9rem; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .copy-mode { display: flex; gap: 6px; }
    .mode-btn { padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: .82rem; cursor: pointer; transition: all .15s; }
    .mode-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }
    .mode-btn:hover:not(.active) { border-color: var(--text-muted); color: var(--text); }

    .color-group { margin-bottom: 8px; }
    .group-name { font-size: .78rem; font-weight: 600; text-transform: capitalize; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 8px; }
    .shades-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .swatch { width: 52px; height: 52px; border-radius: 6px; cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,.06); transition: transform .1s; flex-shrink: 0; }
    .swatch:hover { transform: scale(1.12); z-index: 2; }
    .swatch-tip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1c2128; border: 1px solid var(--border); border-radius: 5px; padding: 6px 10px; white-space: nowrap; font-size: .75rem; color: var(--text); z-index: 10; pointer-events: none; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
    .swatch:hover .swatch-tip { display: block; }
    .swatch-tip::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:#1c2128; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #1c2128; border: 1px solid var(--green); color: var(--green); padding: 10px 18px; border-radius: 8px; font-size: .85rem; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; }

    footer { text-align: center; padding: 24px; font-size: .82rem; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: auto; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<header>
  <h1>Tailwind CSS <span>Color Palette</span></h1>
  <p>Full Tailwind v3 color reference — all shades 50–950. Click any swatch to copy.</p>
</header>
<main>
  <div class="controls">
    <input class="search-input" id="searchInput" type="text" placeholder="Search by name or hex (e.g. blue, #3b82f6)" oninput="render()" />
    <div class="copy-mode">
      <button class="mode-btn active" id="modeHex" onclick="setMode('hex')">HEX</button>
      <button class="mode-btn" id="modeRgb" onclick="setMode('rgb')">RGB</button>
      <button class="mode-btn" id="modeHsl" onclick="setMode('hsl')">HSL</button>
      <button class="mode-btn" id="modeClass" onclick="setMode('class')">Class</button>
    </div>
  </div>
  <div id="palette"></div>
</main>
<div class="toast" id="toast"></div>
<footer>
  <p>Tailwind Color Palette — 100% in-browser, no data transmitted &nbsp;|&nbsp; <a href="https://buymeacoffee.com/devnestio" target="_blank" rel="noopener">Buy me a coffee ☕</a></p>
</footer>
<script>
const COLORS = {
  slate: {50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a',950:'#020617'},
  gray:  {50:'#f9fafb',100:'#f3f4f6',200:'#e5e7eb',300:'#d1d5db',400:'#9ca3af',500:'#6b7280',600:'#4b5563',700:'#374151',800:'#1f2937',900:'#111827',950:'#030712'},
  zinc:  {50:'#fafafa',100:'#f4f4f5',200:'#e4e4e7',300:'#d4d4d8',400:'#a1a1aa',500:'#71717a',600:'#52525b',700:'#3f3f46',800:'#27272a',900:'#18181b',950:'#09090b'},
  neutral:{50:'#fafafa',100:'#f5f5f5',200:'#e5e5e5',300:'#d4d4d4',400:'#a3a3a3',500:'#737373',600:'#525252',700:'#404040',800:'#262626',900:'#171717',950:'#0a0a0a'},
  stone: {50:'#fafaf9',100:'#f5f5f4',200:'#e7e5e4',300:'#d6d3d1',400:'#a8a29e',500:'#78716c',600:'#57534e',700:'#44403c',800:'#292524',900:'#1c1917',950:'#0c0a09'},
  red:   {50:'#fef2f2',100:'#fee2e2',200:'#fecaca',300:'#fca5a5',400:'#f87171',500:'#ef4444',600:'#dc2626',700:'#b91c1c',800:'#991b1b',900:'#7f1d1d',950:'#450a0a'},
  orange:{50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12',950:'#431407'},
  amber: {50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f',950:'#451a03'},
  yellow:{50:'#fefce8',100:'#fef9c3',200:'#fef08a',300:'#fde047',400:'#facc15',500:'#eab308',600:'#ca8a04',700:'#a16207',800:'#854d0e',900:'#713f12',950:'#422006'},
  lime:  {50:'#f7fee7',100:'#ecfccb',200:'#d9f99d',300:'#bef264',400:'#a3e635',500:'#84cc16',600:'#65a30d',700:'#4d7c0f',800:'#3f6212',900:'#365314',950:'#1a2e05'},
  green: {50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16'},
  emerald:{50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b',950:'#022c22'},
  teal:  {50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',300:'#5eead4',400:'#2dd4bf',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#115e59',900:'#134e4a',950:'#042f2e'},
  cyan:  {50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63',950:'#083344'},
  sky:   {50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e',950:'#082f49'},
  blue:  {50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',950:'#172554'},
  indigo:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b'},
  violet:{50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9',800:'#5b21b6',900:'#4c1d95',950:'#2e1065'},
  purple:{50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',400:'#c084fc',500:'#a855f7',600:'#9333ea',700:'#7e22ce',800:'#6b21a8',900:'#581c87',950:'#3b0764'},
  fuchsia:{50:'#fdf4ff',100:'#fae8ff',200:'#f5d0fe',300:'#f0abfc',400:'#e879f9',500:'#d946ef',600:'#c026d3',700:'#a21caf',800:'#86198f',900:'#701a75',950:'#4a044e'},
  pink:  {50:'#fdf2f8',100:'#fce7f3',200:'#fbcfe8',300:'#f9a8d4',400:'#f472b6',500:'#ec4899',600:'#db2777',700:'#be185d',800:'#9d174d',900:'#831843',950:'#500724'},
  rose:  {50:'#fff1f2',100:'#ffe4e6',200:'#fecdd3',300:'#fda4af',400:'#fb7185',500:'#f43f5e',600:'#e11d48',700:'#be123c',800:'#9f1239',900:'#881337',950:'#4c0519'},
};
const SHADES = [50,100,200,300,400,500,600,700,800,900,950];
let copyMode = 'hex';

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if (max===min) { h=s=0; }
  else {
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){ case r: h=((g-b)/d+(g<b?6:0))/6; break; case g: h=((b-r)/d+2)/6; break; case b: h=((r-g)/d+4)/6; break; }
  }
  return {h:Math.round(h*360), s:Math.round(s*100), l:Math.round(l*100)};
}
function getCopyValue(colorName, shade, hex) {
  if (copyMode === 'hex') return hex;
  if (copyMode === 'class') return `${colorName}-${shade}`;
  const {r,g,b} = hexToRgb(hex);
  if (copyMode === 'rgb') return `rgb(${r}, ${g}, ${b})`;
  const {h,s,l} = rgbToHsl(r,g,b);
  return `hsl(${h}, ${s}%, ${l}%)`;
}
function setMode(m) {
  copyMode = m;
  ['hex','rgb','hsl','class'].forEach(id => {
    document.getElementById('mode'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('active', id===m);
  });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1600);
}
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const palette = document.getElementById('palette');
  palette.innerHTML = '';
  Object.entries(COLORS).forEach(([name, shades]) => {
    // filter by name or by any hex value
    const matchName = name.includes(q);
    const matchHex = q.startsWith('#') ? Object.values(shades).some(h=>h.toLowerCase().includes(q)) : false;
    if (q && !matchName && !matchHex) return;
    const group = document.createElement('div');
    group.className = 'color-group';
    const shadesHtml = SHADES.map(s => {
      const hex = shades[s];
      if (!hex) return '';
      const isLight = parseInt(hex.slice(1,3),16)*0.299+parseInt(hex.slice(3,5),16)*0.587+parseInt(hex.slice(5,7),16)*0.114 > 128;
      return `<div class="swatch" style="background:${hex}" title="${name}-${s}: ${hex}" onclick="copy('${name}','${s}','${hex}')">
        <div class="swatch-tip">${name}-${s}<br>${hex}</div>
      </div>`;
    }).join('');
    group.innerHTML = `<div class="group-name">${name}</div><div class="shades-row">${shadesHtml}</div>`;
    palette.appendChild(group);
  });
}
function copy(colorName, shade, hex) {
  const val = getCopyValue(colorName, shade, hex);
  navigator.clipboard.writeText(val).then(() => showToast(`Copied: ${val}`));
}
render();
</script>
</body>
</html>
