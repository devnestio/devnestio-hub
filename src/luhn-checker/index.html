<body>
<div id="privacy-banner">🔒 All processing happens in your browser. No data is sent to any server.</div>
<header>
  <span class="badge">FREE</span>
  <h1>Luhn Algorithm Checker</h1>
  <a href="https://devnestio.pages.dev">← All Tools</a>
</header>
<main>

  <div class="card">
    <div class="card-title">Validate a Number</div>
    <label>Enter digits (spaces and dashes ignored)</label>
    <input type="text" id="num-input" placeholder="4111 1111 1111 1111" oninput="validate()" maxlength="40" />
    <div id="result-banner" class="result-banner empty">Enter a number above to validate</div>
    <div id="card-type" class="card-type"></div>
  </div>

  <div class="card" id="steps-card" style="display:none">
    <div class="card-title">Step-by-Step Luhn Calculation</div>
    <div class="steps-wrap">
      <table id="steps-table">
        <thead>
          <tr>
            <th>Position</th><th>Digit</th><th>Action</th><th>Value</th>
          </tr>
        </thead>
        <tbody id="steps-body"></tbody>
        <tfoot id="steps-foot"></tfoot>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Generate a Valid Luhn Number</div>
    <div class="gen-row">
      <input type="text" class="gen-input" id="gen-prefix" placeholder="Prefix (e.g. 4111111111111)" maxlength="18" />
      <button class="gen-btn" onclick="generate()">Generate Check Digit</button>
    </div>
    <div id="gen-result" class="gen-result" style="display:none;margin-top:12px">
      <span id="gen-output">—</span>
      <button class="copy-btn" onclick="copyGen()">Copy</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Examples</div>
    <div class="examples" id="examples"></div>
  </div>

  <div id="ad-slot" data-ea-publisher="devnestio" data-ea-type="image"></div>
</main>
<script>
function luhn(digits) {
  // digits: array of ints, right-to-left: index 0 = check digit (rightmost)
  let sum = 0;
  for (let i = 0; i < digits.length; i++) {
    let d = digits[i];
    if (i % 2 === 1) { // double every second from right (position 2,4,6…)
      d *= 2;
      if (d > 9) d -= 9;
    }
    sum += d;
  }
  return sum;
}

function luhnValid(numStr) {
  const digits = numStr.replace(/[\s\-]/g, '').split('').map(Number);
  if (digits.length < 2 || digits.some(isNaN)) return null;
  return luhn(digits.reverse()) % 10 === 0;
}

function luhnSteps(numStr) {
  const cleaned = numStr.replace(/[\s\-]/g, '');
  const digits = cleaned.split('').map(Number);
  const n = digits.length;
  const steps = [];
  let total = 0;

  for (let i = 0; i < n; i++) {
    const posFromRight = n - i; // 1-indexed from right
    const isDouble = posFromRight % 2 === 0; // double every 2nd from right (excl. check digit)
    const orig = digits[i];
    let val = orig;
    let action = 'keep';
    if (isDouble) {
      val = orig * 2;
      action = `×2`;
      if (val > 9) { val -= 9; action = `×2−9`; }
    }
    steps.push({ pos: posFromRight, orig, isDouble, action, val });
    total += val;
  }
  return { steps, total, valid: total % 10 === 0 };
}

function luhnCheckDigit(prefix) {
  const digits = prefix.replace(/[\s\-]/g, '').split('').map(Number);
  if (digits.some(isNaN)) return null;
  // Append a 0 check digit, compute what digit makes sum % 10 === 0
  const full = [...digits, 0];
  const rev = full.reverse();
  const sumWithout = luhn(rev);
  const remainder = sumWithout % 10;
  return remainder === 0 ? 0 : 10 - remainder;
}

function detectCardType(num) {
  const n = num.replace(/[\s\-]/g, '');
  if (/^4/.test(n)) return 'Visa';
  if (/^5[1-5]/.test(n) || /^2(2[2-9][1-9]|[3-6]\d{2}|7[01]\d|720)/.test(n)) return 'Mastercard';
  if (/^3[47]/.test(n)) return 'American Express';
  if (/^6(?:011|5)/.test(n)) return 'Discover';
  if (/^35/.test(n)) return 'JCB';
  if (/^3(?:0[0-5]|[68])/.test(n)) return 'Diners Club';
  return '';
}

function validate() {
  const raw = document.getElementById('num-input').value;
  const cleaned = raw.replace(/[\s\-]/g, '');
  const banner = document.getElementById('result-banner');
  const stepsCard = document.getElementById('steps-card');
  const typeEl = document.getElementById('card-type');

  if (!cleaned) {
    banner.className = 'result-banner empty';
    banner.textContent = 'Enter a number above to validate';
    stepsCard.style.display = 'none';
    typeEl.textContent = '';
    return;
  }
  if (!/^\d+$/.test(cleaned) || cleaned.length < 2) {
    banner.className = 'result-banner invalid';
    banner.textContent = '✗ Enter at least 2 digits (0–9 only)';
    stepsCard.style.display = 'none';
    typeEl.textContent = '';
    return;
  }

  const res = luhnSteps(cleaned);
  banner.className = 'result-banner ' + (res.valid ? 'valid' : 'invalid');
  banner.textContent = res.valid ? '✓ Valid (Luhn check passes)' : '✗ Invalid (Luhn check fails)';

  const ct = detectCardType(cleaned);
  typeEl.textContent = ct ? `Detected: ${ct}` : '';

  // Steps table
  const tbody = document.getElementById('steps-body');
  tbody.innerHTML = res.steps.map(s =>
    `<tr><td class="pos">${s.pos}</td><td class="orig">${s.orig}</td><td>${s.isDouble ? `<span style="color:#f59e0b">${s.action}</span>` : '—'}</td><td class="${s.isDouble ? 'dbl' : 'orig'}">${s.val}</td></tr>`
  ).join('');
  document.getElementById('steps-foot').innerHTML =
    `<tr><td colspan="3" class="total-row" style="text-align:right;color:#64748b">Sum</td><td class="total-row sum">${res.total}</td></tr>
     <tr><td colspan="3" class="total-row" style="text-align:right;color:#64748b">Sum mod 10</td><td class="total-row ${res.valid?'sum':''}"> ${res.total % 10}</td></tr>`;
  stepsCard.style.display = '';
}

function generate() {
  const prefix = document.getElementById('gen-prefix').value;
  const check = luhnCheckDigit(prefix);
  const genRes = document.getElementById('gen-result');
  const genOut = document.getElementById('gen-output');
  if (check === null) { genOut.textContent = 'Invalid prefix'; genRes.style.display = ''; return; }
  const cleaned = prefix.replace(/[\s\-]/g, '');
  genOut.textContent = cleaned + check;
  genRes.style.display = '';
}

function copyGen() {
  const t = document.getElementById('gen-output').textContent;
  if (t) navigator.clipboard.writeText(t);
}

const EXAMPLES = [
  { num:'4111 1111 1111 1111', label:'Visa test' },
  { num:'5500 0000 0000 0004', label:'Mastercard test' },
  { num:'3714 496353 98431',   label:'Amex test' },
  { num:'6011 1111 1111 1117', label:'Discover test' },
  { num:'4111 1111 1111 1112', label:'Invalid Visa' },
  { num:'490154203237518',     label:'IMEI example' },
];
document.getElementById('examples').innerHTML = EXAMPLES.map(e =>
  `<span class="ex-chip" onclick="document.getElementById('num-input').value='${e.num}';validate()" title="${e.label}">${e.num}</span>`
).join('');
</script>
