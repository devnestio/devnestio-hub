<script>
/* ═══════════════════════════════════════════════════════════════
   Pure YAML parser — no CDN dependencies
   Supports: scalars, quoted strings, nested mappings, sequences,
   block scalars (| and >), comments
   ═══════════════════════════════════════════════════════════════ */

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ── Tokenizer ───────────────────────────────────────────────── */

function YamlError(message, line) {
  this.message = message;
  this.line = line || null;
}

/* Parse a single scalar value string into a JS primitive */
function parseScalar(s) {
  if (s === null || s === undefined) return null;
  var t = s.trim();
  if (t === '') return null;
  if (t === 'true' || t === 'yes' || t === 'on') return true;
  if (t === 'false' || t === 'no' || t === 'off') return false;
  if (t === 'null' || t === '~') return null;
  if (t === '.inf' || t === '.Inf' || t === '.INF') return Infinity;
  if (t === '-.inf' || t === '-.Inf' || t === '-.INF') return -Infinity;
  if (t === '.nan' || t === '.NaN' || t === '.NAN') return NaN;
  /* integer: decimal, octal 0o, hex 0x, binary 0b */
  if (/^-?0x[0-9a-fA-F_]+$/.test(t)) return parseInt(t.replace(/_/g,''), 16);
  if (/^-?0o[0-7_]+$/.test(t)) return parseInt(t.replace(/_/g,'').slice(t[0]==='-'?3:2), 8) * (t[0]==='-'?-1:1);
  if (/^-?0b[01_]+$/.test(t)) return parseInt(t.replace(/_/g,'').slice(t[0]==='-'?3:2), 2) * (t[0]==='-'?-1:1);
  if (/^-?[0-9][0-9_]*$/.test(t)) return parseInt(t.replace(/_/g,''), 10);
  if (/^-?[0-9][0-9_]*\.[0-9_]*([eE][+-]?[0-9]+)?$/.test(t) ||
      /^-?\.[0-9_]+([eE][+-]?[0-9]+)?$/.test(t) ||
      /^-?[0-9][0-9_]*[eE][+-]?[0-9]+$/.test(t)) {
    return parseFloat(t.replace(/_/g,''));
  }
  return s;
}

/* Unescape a double-quoted string */
function unescapeDouble(s) {
  return s.replace(/\\(["\\\/bfnrtu]|u[0-9a-fA-F]{4})/g, function(m, c) {
    switch(c) {
      case '"': return '"';
      case '\\': return '\\';
      case '/': return '/';
      case 'b': return '\b';
      case 'f': return '\f';
      case 'n': return '\n';
      case 'r': return '\r';
      case 't': return '\t';
      default:
        if (c.length === 5) return String.fromCharCode(parseInt(c.slice(1), 16));
        return m;
    }
  });
}

/* Parse a value that may be a quoted string, else fall back to parseScalar */
function parseValue(s) {
  if (s === null || s === undefined) return null;
  var t = s.trim();
  if (t.length >= 2 && t[0] === '"' && t[t.length - 1] === '"') {
    return unescapeDouble(t.slice(1, -1));
  }
  if (t.length >= 2 && t[0] === "'" && t[t.length - 1] === "'") {
    return t.slice(1, -1).replace(/''/g, "'");
  }
  return parseScalar(s);
}

/* Read a quoted scalar starting at pos, return {value, end} */
function readQuoted(lines, lineIdx, col) {
  var line = lines[lineIdx];
  var q = line[col];
  var result = '';
  var i = col + 1;
  var li = lineIdx;

  while (li < lines.length) {
    var ln = lines[li];
    var start = (li === lineIdx) ? i : 0;
    for (var ci = start; ci < ln.length; ci++) {
      var ch = ln[ci];
      if (q === '"') {
        if (ch === '\\') {
          var nc = ln[ci+1];
          if (nc === undefined) { result += '\n'; ci = ln.length; break; }
          result += '\\' + nc;
          ci++;
        } else if (ch === '"') {
          return { value: unescapeDouble(result), end: { line: li, col: ci + 1 } };
        } else {
          result += ch;
        }
      } else { /* single quote */
        if (ch === "'" && ln[ci+1] === "'") { result += "'"; ci++; }
        else if (ch === "'") {
          return { value: result, end: { line: li, col: ci + 1 } };
        } else {
          result += ch;
        }
      }
    }
    if (li > lineIdx) result += '\n';
    li++;
    i = 0;
  }
  return { value: result, end: { line: li, col: 0 } };
}

/* Read a block scalar (| or >) */
function readBlockScalar(lines, lineIdx, indicator, chomping, indentHint) {
  var baseIndent = -1;
  var collected = [];
  var li = lineIdx;

  while (li < lines.length) {
    var ln = lines[li];
    if (ln.trim() === '' || ln.trim() === '#' || /^\s*#/.test(ln) && collected.length > 0) {
      /* blank line inside block */
      if (baseIndent !== -1) collected.push('');
      li++;
      continue;
    }
    var leadingSpaces = ln.match(/^( *)/)[1].length;
    if (baseIndent === -1) {
      if (indentHint > 0) baseIndent = indentHint;
      else baseIndent = leadingSpaces;
    }
    if (leadingSpaces < baseIndent) break;
    collected.push(ln.slice(baseIndent));
    li++;
  }

  /* remove trailing blank lines for clip (default), strip removes all, keep for +  */
  if (chomping === '-') {
    while (collected.length > 0 && collected[collected.length-1] === '') collected.pop();
  } else if (chomping !== '+') {
    /* clip: keep exactly one trailing newline */
    while (collected.length > 1 && collected[collected.length-1] === '') collected.pop();
  }

  var joiner = indicator === '|' ? '\n' : ' ';
  var value;
  if (indicator === '|') {
    value = collected.join('\n');
    if (chomping !== '-') value += '\n';
  } else {
    /* folded: blank lines become newlines, others join with space */
    var parts = [];
    var i = 0;
    while (i < collected.length) {
      if (collected[i] === '') {
        parts.push('\n');
        i++;
      } else {
        var chunk = collected[i];
        i++;
        while (i < collected.length && collected[i] !== '') {
          chunk += ' ' + collected[i];
          i++;
        }
        parts.push(chunk);
      }
    }
    value = parts.join('');
    if (chomping !== '-') value += '\n';
  }

  return { value: value, nextLine: li };
}

/* ── Main parser ─────────────────────────────────────────────── */

function parseYAML(input) {
  if (!input || !input.trim()) throw new YamlError('Empty input', null);

  var lines = input.split('\n');
  var result = parseNode(lines, 0, 0);
  return result.value;
}

/*
 * parseNode: parses a YAML value starting at (lineIdx, indent).
 * Returns { value, nextLine }
 */
function parseNode(lines, lineIdx, parentIndent) {
  /* Skip blank lines and comments to find first content line */
  while (lineIdx < lines.length) {
    var trimmed = lines[lineIdx].trim();
    if (trimmed !== '' && !trimmed.startsWith('#')) break;
    lineIdx++;
  }

  if (lineIdx >= lines.length) return { value: null, nextLine: lineIdx };

  var line = lines[lineIdx];
  var indent = line.match(/^( *)/)[1].length;
  var content = line.slice(indent);

  /* document markers */
  if (content === '---' || content === '...') {
    return parseNode(lines, lineIdx + 1, parentIndent);
  }

  /* sequence (block) */
  if (content.startsWith('- ') || content === '-') {
    return parseSequence(lines, lineIdx, indent);
  }

  /* mapping */
  var colonIdx = findMappingColon(content);
  if (colonIdx !== -1) {
    return parseMapping(lines, lineIdx, indent);
  }

  /* scalar fallback */
  var scalar = parseScalarValue(lines, lineIdx, indent);
  return scalar;
}

function findMappingColon(content) {
  /* find ': ' or ':' at end of string, not inside quotes */
  var inSingle = false, inDouble = false;
  for (var i = 0; i < content.length; i++) {
    var c = content[i];
    if (c === "'" && !inDouble) inSingle = !inSingle;
    else if (c === '"' && !inSingle) inDouble = !inDouble;
    else if (!inSingle && !inDouble && c === ':') {
      if (i + 1 >= content.length || content[i+1] === ' ' || content[i+1] === '\t' || content[i+1] === '#') {
        return i;
      }
    }
  }
  return -1;
}

function parseMapping(lines, lineIdx, mappingIndent) {
  var obj = {};
  var li = lineIdx;

  while (li < lines.length) {
    /* skip blank + comment lines */
    while (li < lines.length && (lines[li].trim() === '' || lines[li].trim().startsWith('#'))) li++;
    if (li >= lines.length) break;

    var line = lines[li];
    var indent = line.match(/^( *)/)[1].length;
    if (indent < mappingIndent) break;
    if (indent > mappingIndent) { li++; continue; }

    var content = line.slice(indent);
    if (content === '---' || content === '...') { li++; break; }

    /* sequence item at this indent — stop mapping */
    if (content.startsWith('- ') || content === '-') break;

    var colonIdx = findMappingColon(content);
    if (colonIdx === -1) { li++; continue; }

    /* parse key */
    var keyRaw = content.slice(0, colonIdx);
    var key;
    if ((keyRaw.startsWith('"') && keyRaw.endsWith('"')) ||
        (keyRaw.startsWith("'") && keyRaw.endsWith("'"))) {
      key = keyRaw.slice(1, -1);
    } else {
      key = keyRaw.trim();
    }

    var afterColon = content.slice(colonIdx + 1).replace(/^\s+/, '');
    /* strip inline comment */
    var inlineComment = '';
    var acNoComment = stripInlineComment(afterColon);

    if (acNoComment === '' || acNoComment === null) {
      /* value is on next lines */
      li++;
      /* skip blank/comment lines to peek */
      var peekLi = li;
      while (peekLi < lines.length && (lines[peekLi].trim() === '' || lines[peekLi].trim().startsWith('#'))) peekLi++;

      if (peekLi >= lines.length) {
        obj[key] = null;
      } else {
        var nextIndent = lines[peekLi].match(/^( *)/)[1].length;
        if (nextIndent > mappingIndent) {
          var sub = parseNode(lines, peekLi, mappingIndent);
          obj[key] = sub.value;
          li = sub.nextLine;
        } else {
          obj[key] = null;
        }
      }
    } else if (acNoComment === '|' || acNoComment === '|-' || acNoComment === '|+' ||
               acNoComment === '>' || acNoComment === '>-' || acNoComment === '>+') {
      var indicator = acNoComment[0];
      var chomping = acNoComment[1] || '';
      var bs = readBlockScalar(lines, li + 1, indicator, chomping, 0);
      obj[key] = bs.value;
      li = bs.nextLine;
    } else {
      obj[key] = parseValue(acNoComment);
      li++;
    }
  }

  return { value: obj, nextLine: li };
}

function parseSequence(lines, lineIdx, seqIndent) {
  var arr = [];
  var li = lineIdx;

  while (li < lines.length) {
    while (li < lines.length && (lines[li].trim() === '' || lines[li].trim().startsWith('#'))) li++;
    if (li >= lines.length) break;

    var line = lines[li];
    var indent = line.match(/^( *)/)[1].length;
    if (indent < seqIndent) break;
    if (indent > seqIndent) { li++; continue; }

    var content = line.slice(indent);
    if (!content.startsWith('- ') && content !== '-') break;

    var itemContent = content === '-' ? '' : content.slice(2);
    var acNoComment = stripInlineComment(itemContent);

    if (acNoComment === '') {
      /* value is on next lines */
      li++;
      var peekLi = li;
      while (peekLi < lines.length && (lines[peekLi].trim() === '' || lines[peekLi].trim().startsWith('#'))) peekLi++;
      if (peekLi >= lines.length) {
        arr.push(null);
      } else {
        var nextIndent = lines[peekLi].match(/^( *)/)[1].length;
        if (nextIndent > seqIndent) {
          var sub = parseNode(lines, peekLi, seqIndent);
          arr.push(sub.value);
          li = sub.nextLine;
        } else {
          arr.push(null);
        }
      }
    } else if (acNoComment === '|' || acNoComment === '|-' || acNoComment === '|+' ||
               acNoComment === '>' || acNoComment === '>-' || acNoComment === '>+') {
      var indicator2 = acNoComment[0];
      var chomping2 = acNoComment[1] || '';
      var bs2 = readBlockScalar(lines, li + 1, indicator2, chomping2, 0);
      arr.push(bs2.value);
      li = bs2.nextLine;
    } else if (findMappingColon(acNoComment) !== -1) {
      /* inline mapping after dash */
      var fakeLine = line.slice(0, indent + 2) + acNoComment;
      var tempLines = lines.slice(0, li);
      tempLines.push(fakeLine);
      var restLines = lines.slice(li + 1);
      /* build a temporary lines array for sub-mapping */
      var subLines = [fakeLine].concat(lines.slice(li + 1));
      var subMap = parseSingleLineMapping(acNoComment, indent + 2);
      if (subMap !== null) {
        arr.push(subMap);
      } else {
        arr.push(parseValue(acNoComment));
      }
      li++;
    } else {
      arr.push(parseValue(acNoComment));
      li++;
    }
  }

  return { value: arr, nextLine: li };
}

function parseSingleLineMapping(content, indent) {
  var colonIdx = findMappingColon(content);
  if (colonIdx === -1) return null;
  var key = content.slice(0, colonIdx).trim();
  var val = stripInlineComment(content.slice(colonIdx + 1).trimLeft());
  var obj = {};
  obj[key] = parseValue(val);
  return obj;
}

function stripInlineComment(s) {
  if (!s) return '';
  var inSingle = false, inDouble = false;
  for (var i = 0; i < s.length; i++) {
    var c = s[i];
    if (c === "'" && !inDouble) inSingle = !inSingle;
    else if (c === '"' && !inSingle) inDouble = !inDouble;
    else if (!inSingle && !inDouble && c === '#') {
      return s.slice(0, i).trimRight();
    }
  }
  return s.trimRight();
}

function parseScalarValue(lines, lineIdx, indent) {
  var line = lines[lineIdx];
  var content = line.slice(indent);
  var val = stripInlineComment(content);
  return { value: parseValue(val), nextLine: lineIdx + 1 };
}

/* ── Validator ───────────────────────────────────────────────── */

function validateYAML(input) {
  if (!input || !input.trim()) {
    return { valid: false, error: { message: 'Empty input', line: null } };
  }
  try {
    parseYAML(input);
    return { valid: true };
  } catch(e) {
    return { valid: false, error: { message: e.message, line: e.line } };
  }
}

/* ── Formatter ───────────────────────────────────────────────── */

function formatYAML(input) {
  if (!input || !input.trim()) return { ok: false, error: { message: 'Empty input', line: null } };
  try {
    var parsed = parseYAML(input);
    return { ok: true, result: dumpYAML(parsed, 0) };
  } catch(e) {
    return { ok: false, error: { message: e.message, line: e.line } };
  }
}

function dumpYAML(value, depth) {
  var indent = repeat('  ', depth);
  var childIndent = repeat('  ', depth + 1);

  if (value === null || value === undefined) return 'null';
  if (value === true) return 'true';
  if (value === false) return 'false';
  if (typeof value === 'number') {
    if (!isFinite(value)) return value > 0 ? '.inf' : '-.inf';
    if (isNaN(value)) return '.nan';
    return String(value);
  }
  if (typeof value === 'string') {
    return dumpString(value);
  }
  if (Array.isArray(value)) {
    if (value.length === 0) return '[]';
    return value.map(function(item) {
      var dumped = dumpYAML(item, depth + 1);
      /* if dumped is multiline (object/array), put on next line */
      if (dumped.indexOf('\n') !== -1) {
        return indent + '-\n' + childIndent + dumped.split('\n').join('\n' + childIndent);
      }
      return indent + '- ' + dumped;
    }).join('\n');
  }
  if (typeof value === 'object') {
    var keys = Object.keys(value);
    if (keys.length === 0) return '{}';
    return keys.map(function(k) {
      var v = value[k];
      var keyStr = needsQuote(k) ? '"' + k.replace(/"/g, '\\"') + '"' : k;
      var dumped = dumpYAML(v, depth + 1);
      if (typeof v === 'object' && v !== null) {
        return indent + keyStr + ':\n' + dumped;
      }
      return indent + keyStr + ': ' + dumped;
    }).join('\n');
  }
  return String(value);
}

function dumpString(s) {
  if (s === '') return "''";
  /* check if it needs quoting */
  if (needsQuoteStr(s)) {
    return '"' + s.replace(/\\/g, '\\\\').replace(/"/g, '\\"')
                  .replace(/\n/g, '\\n').replace(/\r/g, '\\r')
                  .replace(/\t/g, '\\t') + '"';
  }
  return s;
}

function needsQuote(k) {
  /* keys with special chars */
  return /[:{}\[\],#&*!|>'"%@`]/.test(k) || k.trim() !== k || k === '' ||
         /^(true|false|yes|no|on|off|null|~)$/i.test(k) ||
         /^[-?]$/.test(k) || /^\d/.test(k);
}

function needsQuoteStr(s) {
  if (s.trim() !== s) return true;
  if (/^(true|false|yes|no|on|off|null|~)$/i.test(s)) return true;
  if (/^[-?:,\[\]{}#&*!|>'"%@`]/.test(s)) return true;
  if (/^\d/.test(s) && !/^[a-zA-Z]/.test(s)) {
    /* looks like a number — quote it if it IS the original string */
    if (String(parseScalar(s)) === s && typeof parseScalar(s) !== 'string') return true;
  }
  if (s.indexOf(': ') !== -1 || s.endsWith(':')) return true;
  if (s.indexOf(' #') !== -1) return true;
  if (/[\n\r]/.test(s)) return true;
  return false;
}

function repeat(s, n) {
  var r = '';
  for (var i = 0; i < n; i++) r += s;
  return r;
}

/* ── Minify ──────────────────────────────────────────────────── */

function minifyYAML(input) {
  if (!input || !input.trim()) return { ok: false, error: { message: 'Empty input', line: null } };
  try {
    var parsed = parseYAML(input);
    return { ok: true, result: JSON.stringify(parsed) };
  } catch(e) {
    return { ok: false, error: { message: e.message, line: e.line } };
  }
}

/* ── YAML → JSON ─────────────────────────────────────────────── */

function yaml2json(input) {
  if (!input || !input.trim()) return { ok: false, error: { message: 'Empty input', line: null } };
  try {
    var parsed = parseYAML(input);
    return { ok: true, result: JSON.stringify(parsed, null, 2) };
  } catch(e) {
    return { ok: false, error: { message: e.message, line: e.line } };
  }
}

/* ── JSON → YAML ─────────────────────────────────────────────── */

function json2yaml(input) {
  if (!input || !input.trim()) return { ok: false, error: { message: 'Empty input', line: null } };
  try {
    var parsed = JSON.parse(input);
    return { ok: true, result: dumpYAML(parsed, 0) };
  } catch(e) {
    return { ok: false, error: { message: e.message, line: null } };
  }
}

/* ── Stats ───────────────────────────────────────────────────── */

function countYamlKeys(obj) {
  if (obj === null || obj === undefined) return 0;
  if (typeof obj !== 'object') return 0;
  if (Array.isArray(obj)) {
    return obj.reduce(function(s, v) { return s + countYamlKeys(v); }, 0);
  }
  var keys = Object.keys(obj);
  return keys.length + keys.reduce(function(s, k) { return s + countYamlKeys(obj[k]); }, 0);
}

/* ── Syntax highlight ────────────────────────────────────────── */

function highlightYAML(text) {
  var lines = text.split('\n');
  return lines.map(function(line) {
    return highlightLine(line);
  }).join('\n');
}

function highlightLine(line) {
  /* comment line */
  var trimmed = line.trimLeft();
  if (trimmed.startsWith('#')) {
    return '<span class="yaml-comment">' + escHtml(line) + '</span>';
  }
  /* document markers */
  if (trimmed === '---' || trimmed === '...') {
    return '<span class="yaml-doc">' + escHtml(line) + '</span>';
  }

  /* indent part */
  var indentMatch = line.match(/^(\s*)/);
  var indentStr = indentMatch ? indentMatch[1] : '';
  var rest = line.slice(indentStr.length);

  /* sequence dash */
  if (rest.startsWith('- ') || rest === '-') {
    var dashPart = '<span class="yaml-dash">-</span>';
    var afterDash = rest.slice(1);
    return escHtml(indentStr) + dashPart + highlightValue(afterDash);
  }

  /* mapping key: value */
  var colonIdx = findMappingColon(rest);
  if (colonIdx !== -1) {
    var keyPart = rest.slice(0, colonIdx);
    var colonAndRest = rest.slice(colonIdx);
    var valPart = colonAndRest.slice(1); /* after : */

    var keyHtml = highlightKey(keyPart);
    var colonHtml = escHtml(':');
    var valHtml = highlightValue(valPart);
    return escHtml(indentStr) + keyHtml + colonHtml + valHtml;
  }

  return escHtml(line);
}

function highlightKey(k) {
  if ((k.startsWith('"') && k.endsWith('"')) || (k.startsWith("'") && k.endsWith("'"))) {
    return '<span class="yaml-key">' + escHtml(k) + '</span>';
  }
  return '<span class="yaml-key">' + escHtml(k) + '</span>';
}

function highlightValue(v) {
  if (!v || !v.trim()) return escHtml(v);

  /* inline comment */
  var commentIdx = -1;
  var inS = false, inD = false;
  for (var i = 0; i < v.length; i++) {
    if (v[i] === "'" && !inD) inS = !inS;
    else if (v[i] === '"' && !inS) inD = !inD;
    else if (!inS && !inD && v[i] === '#' && (i === 0 || v[i-1] === ' ')) {
      commentIdx = i; break;
    }
  }

  var comment = '';
  var val = v;
  if (commentIdx !== -1) {
    comment = '<span class="yaml-comment">' + escHtml(v.slice(commentIdx)) + '</span>';
    val = v.slice(0, commentIdx);
  }

  var trimVal = val.trim();
  var html;

  if ((trimVal.startsWith('"') && trimVal.endsWith('"')) ||
      (trimVal.startsWith("'") && trimVal.endsWith("'"))) {
    html = escHtml(val.slice(0, val.indexOf(trimVal[0]))) +
           '<span class="yaml-str">' + escHtml(trimVal) + '</span>';
  } else if (trimVal === 'true' || trimVal === 'false' ||
             trimVal === 'yes' || trimVal === 'no' ||
             trimVal === 'on' || trimVal === 'off') {
    html = '<span class="yaml-bool">' + escHtml(val) + '</span>';
  } else if (trimVal === 'null' || trimVal === '~') {
    html = '<span class="yaml-null">' + escHtml(val) + '</span>';
  } else if (trimVal === '|' || trimVal === '|-' || trimVal === '|+' ||
             trimVal === '>' || trimVal === '>-' || trimVal === '>+') {
    html = '<span class="yaml-tag">' + escHtml(val) + '</span>';
  } else if (/^\s*-?[0-9]/.test(val) || /^\s*\.[0-9]/.test(val) ||
             /^\s*\.inf/i.test(trimVal) || /^\s*\.nan/i.test(trimVal)) {
    html = '<span class="yaml-num">' + escHtml(val) + '</span>';
  } else if (trimVal.startsWith('&') || trimVal.startsWith('*')) {
    html = '<span class="yaml-anchor">' + escHtml(val) + '</span>';
  } else {
    html = escHtml(val);
  }

  return html + comment;
}

/* ── Sample YAML ─────────────────────────────────────────────── */

var SAMPLE_YAML = [
  '# devnestio sample configuration',
  'name: devnestio',
  'version: 2.0.0',
  'description: Free developer tools for engineers',
  '',
  'server:',
  '  host: localhost',
  '  port: 8080',
  '  debug: true',
  '  timeout: null',
  '',
  'features:',
  '  - format',
  '  - validate',
  '  - convert',
  '  - highlight',
  '',
  'database:',
  '  primary:',
  '    driver: postgres',
  '    host: db.example.com',
  '    port: 5432',
  '    name: devnestio_db',
  '  replica:',
  '    driver: postgres',
  '    host: replica.example.com',
  '    port: 5432',
  '',
  'tags:',
  '  - tools',
  '  - developer',
  '  - free',
  '',
  'meta:',
  '  created: 2026-01-01',
  '  author: devnestio team',
  '  license: MIT'
].join('\n');

/* ── DOM refs ────────────────────────────────────────────────── */

var yamlInput     = document.getElementById('yaml-input');
var btnFormat     = document.getElementById('btn-format');
var btnValidate   = document.getElementById('btn-validate');
var btnMinify     = document.getElementById('btn-minify');
var btnYaml2json  = document.getElementById('btn-yaml2json');
var btnJson2yaml  = document.getElementById('btn-json2yaml');
var btnSample     = document.getElementById('btn-sample');
var btnClear      = document.getElementById('btn-clear');
var btnCopy       = document.getElementById('btn-copy');
var validationBar = document.getElementById('validation-bar');
var yamlOutput    = document.getElementById('yaml-output');
var statsBar      = document.getElementById('stats-bar');
var statKeys      = document.getElementById('stat-keys');
var statLines     = document.getElementById('stat-lines');
var statChars     = document.getElementById('stat-chars');

var currentOutput = '';
var debounceTimer = null;

/* ── UI helpers ──────────────────────────────────────────────── */

function showValidation(valid, message, detail) {
  validationBar.className = 'validation-bar visible ' + (valid ? 'valid' : 'invalid');
  validationBar.innerHTML =
    '<span>' + (valid ? '✅' : '❌') + ' ' + escHtml(message) + '</span>' +
    (detail ? '<span class="val-detail">' + escHtml(detail) + '</span>' : '');
}

function hideValidation() {
  validationBar.className = 'validation-bar';
  validationBar.innerHTML = '';
}

function setOutput(text, isYaml) {
  currentOutput = text;
  if (isYaml !== false) {
    yamlOutput.innerHTML = highlightYAML(text);
  } else {
    /* JSON output — plain highlighted */
    yamlOutput.innerHTML = highlightYAML(text);
  }
  statsBar.className = 'stats-bar visible';
  statLines.textContent = text.split('\n').length;
  statChars.textContent = text.length;
  try {
    var parsed = parseYAML(text);
    statKeys.textContent = countYamlKeys(parsed);
  } catch(e) {
    try {
      var pj = JSON.parse(text);
      statKeys.textContent = countYamlKeys(pj);
    } catch(e2) {
      statKeys.textContent = '—';
    }
  }
}

function clearOutput() {
  currentOutput = '';
  yamlOutput.innerHTML = '<div class="empty-state">// Output appears here…</div>';
  statsBar.className = 'stats-bar';
  hideValidation();
}

/* ── Live validation ─────────────────────────────────────────── */

yamlInput.addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(function() {
    var raw = yamlInput.value;
    if (!raw.trim()) { clearOutput(); return; }
    var v = validateYAML(raw);
    if (v.valid) {
      var result = formatYAML(raw);
      if (result.ok) setOutput(result.result, true);
      showValidation(true, 'Valid YAML');
    } else {
      var err = v.error;
      var detail = err.line ? 'Line ' + err.line : '';
      showValidation(false, err.message, detail);
      statsBar.className = 'stats-bar';
    }
  }, 280);
});

/* ── Buttons ─────────────────────────────────────────────────── */

btnFormat.addEventListener('click', function() {
  var raw = yamlInput.value;
  if (!raw.trim()) return;
  var result = formatYAML(raw);
  if (result.ok) {
    setOutput(result.result, true);
    showValidation(true, 'Valid YAML — formatted');
  } else {
    var err = result.error;
    showValidation(false, err.message, err.line ? 'Line ' + err.line : '');
  }
});

btnValidate.addEventListener('click', function() {
  var raw = yamlInput.value;
  if (!raw.trim()) return;
  var v = validateYAML(raw);
  if (v.valid) {
    showValidation(true, 'Valid YAML');
  } else {
    var err = v.error;
    showValidation(false, err.message, err.line ? 'Line ' + err.line : '');
  }
});

btnMinify.addEventListener('click', function() {
  var raw = yamlInput.value;
  if (!raw.trim()) return;
  var result = minifyYAML(raw);
  if (result.ok) {
    setOutput(result.result, false);
    showValidation(true, 'Valid YAML — minified to JSON');
  } else {
    var err = result.error;
    showValidation(false, err.message, err.line ? 'Line ' + err.line : '');
  }
});

btnYaml2json.addEventListener('click', function() {
  var raw = yamlInput.value;
  if (!raw.trim()) return;
  var result = yaml2json(raw);
  if (result.ok) {
    setOutput(result.result, false);
    showValidation(true, 'Converted to JSON');
  } else {
    var err = result.error;
    showValidation(false, err.message, err.line ? 'Line ' + err.line : '');
  }
});

btnJson2yaml.addEventListener('click', function() {
  var raw = yamlInput.value;
  if (!raw.trim()) return;
  var result = json2yaml(raw);
  if (result.ok) {
    setOutput(result.result, true);
    showValidation(true, 'Converted to YAML');
  } else {
    showValidation(false, result.error.message, '');
  }
});

btnSample.addEventListener('click', function() {
  yamlInput.value = SAMPLE_YAML;
  yamlInput.dispatchEvent(new Event('input'));
});

btnClear.addEventListener('click', function() {
  yamlInput.value = '';
  clearOutput();
});

btnCopy.addEventListener('click', function() {
  if (!currentOutput) return;
  navigator.clipboard.writeText(currentOutput).then(function() {
    btnCopy.textContent = 'Copied!';
    btnCopy.classList.add('copied');
    setTimeout(function() {
      btnCopy.textContent = 'Copy';
      btnCopy.classList.remove('copied');
    }, 1800);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = currentOutput;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btnCopy.textContent = 'Copied!';
    setTimeout(function() { btnCopy.textContent = 'Copy'; }, 1800);
  });
});

/* ── Expose for test.js ──────────────────────────────────────── */

if (typeof window !== 'undefined') {
  window.__yamlFormatter = {
    parseYAML: parseYAML,
    validateYAML: validateYAML,
    formatYAML: formatYAML,
    minifyYAML: minifyYAML,
    yaml2json: yaml2json,
    json2yaml: json2yaml,
    parseScalar: parseScalar,
    dumpYAML: dumpYAML,
    countYamlKeys: countYamlKeys
  };
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    parseYAML: parseYAML,
    validateYAML: validateYAML,
    formatYAML: formatYAML,
    minifyYAML: minifyYAML,
    yaml2json: yaml2json,
    json2yaml: json2yaml,
    parseScalar: parseScalar,
    dumpYAML: dumpYAML,
    countYamlKeys: countYamlKeys
  };
}
