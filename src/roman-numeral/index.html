<body>
<div id="privacy-banner">🔒 All processing happens in your browser. No data is sent to any server.</div>
<header>
  <span class="badge">FREE</span>
  <h1>Roman Numeral Converter</h1>
  <a href="https://devnestio.pages.dev">← All Tools</a>
</header>
<main>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="to-roman" onclick="setMode('to-roman')">Arabic → Roman</button>
    <button class="mode-tab" data-mode="to-arabic" onclick="setMode('to-arabic')">Roman → Arabic</button>
  </div>

  <div class="card" id="panel-to-roman">
    <div class="card-title">Enter a Number (1 – 3,999,999)</div>
    <input type="number" id="arabic-input" value="2024" min="1" max="3999999" oninput="convertToRoman()" />
  </div>

  <div class="card" id="panel-to-arabic" style="display:none">
    <div class="card-title">Enter Roman Numerals</div>
    <input type="text" id="roman-input" value="" placeholder="e.g. MMXXIV" oninput="convertToArabic()" style="text-transform:uppercase" />
  </div>

  <div class="card">
    <div class="card-title">Result</div>
    <div class="result-box">
      <span class="result-val" id="result-val">—</span>
      <button class="copy-btn" onclick="copyResult()">Copy</button>
    </div>
  </div>

  <div class="card" id="steps-card" style="display:none">
    <div class="card-title">Breakdown</div>
    <table class="steps-table" id="steps-table"></table>
  </div>

  <div class="card">
    <div class="card-title">Examples</div>
    <div class="examples" id="examples"></div>
  </div>

  <div id="ad-slot" data-ea-publisher="devnestio" data-ea-type="image"></div>
</main>
<script>
// Standard + extended numerals (vinculum notation via parentheses convention)
const ROMAN_MAP = [
  [1000000,'M̄'],[900000,'C̄M̄'],[500000,'D̄'],[400000,'C̄D̄'],
  [100000,'C̄'],[90000,'X̄C̄'],[50000,'L̄'],[40000,'X̄L̄'],
  [10000,'X̄'],[9000,'MX̄'],[5000,'V̄'],[4000,'MV̄'],
  [1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],
  [100,'C'],[90,'XC'],[50,'L'],[40,'XL'],
  [10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']
];

// For parsing: standard only (1–3999)
const PARSE_MAP = [
  [1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],
  [100,'C'],[90,'XC'],[50,'L'],[40,'XL'],
  [10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']
];

function toRoman(n) {
  if (!Number.isInteger(n) || n < 1 || n > 3999999) return null;
  let result = '', rem = n;
  const steps = [];
  for (const [val, sym] of ROMAN_MAP) {
    while (rem >= val) {
      result += sym;
      steps.push({ sym, val, rem: rem - val });
      rem -= val;
    }
  }
  return { roman: result, steps };
}

function fromRoman(str) {
  const s = str.toUpperCase().trim();
  if (!s) return null;
  // Validate: only standard Roman numeral characters
  if (!/^[IVXLCDM]+$/.test(s)) return null;

  let total = 0, i = 0;
  for (const [val, sym] of PARSE_MAP) {
    while (s.startsWith(sym, i)) {
      total += val;
      i += sym.length;
    }
  }
  // Verify round-trip (catches invalid sequences)
  const check = toRoman(total);
  if (!check || check.roman !== s) return null;
  return total;
}

function renderSteps(steps, startN) {
  let rem = startN;
  let html = '';
  for (const step of steps) {
    html += `<tr><td>${step.sym}</td><td>${step.val.toLocaleString()}</td><td>rem: ${step.rem.toLocaleString()}</td></tr>`;
    rem = step.rem;
  }
  document.getElementById('steps-table').innerHTML = html;
  document.getElementById('steps-card').style.display = '';
}

let mode = 'to-roman';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  document.getElementById('panel-to-roman').style.display = m === 'to-roman' ? '' : 'none';
  document.getElementById('panel-to-arabic').style.display = m === 'to-arabic' ? '' : 'none';
  document.getElementById('steps-card').style.display = 'none';
  document.getElementById('result-val').textContent = '—';
  if (m === 'to-roman') convertToRoman();
  else convertToArabic();
}

function convertToRoman() {
  const inp = document.getElementById('arabic-input');
  const n = parseInt(inp.value);
  const el = document.getElementById('result-val');
  inp.classList.remove('err');
  if (!n || n < 1 || n > 3999999) {
    inp.classList.add('err');
    el.innerHTML = '<span class="err-msg">Enter a number from 1 to 3,999,999</span>';
    document.getElementById('steps-card').style.display = 'none';
    return;
  }
  const res = toRoman(n);
  el.textContent = res.roman;
  renderSteps(res.steps, n);
}

function convertToArabic() {
  const inp = document.getElementById('roman-input');
  const el = document.getElementById('result-val');
  inp.classList.remove('err');
  const s = inp.value.trim().toUpperCase();
  if (!s) { el.textContent = '—'; document.getElementById('steps-card').style.display = 'none'; return; }
  const n = fromRoman(s);
  if (n === null) {
    inp.classList.add('err');
    el.innerHTML = '<span class="err-msg">Invalid Roman numeral</span>';
    document.getElementById('steps-card').style.display = 'none';
    return;
  }
  el.textContent = n.toLocaleString();
  const res = toRoman(n);
  if (res) renderSteps(res.steps, n);
}

function copyResult() {
  const t = document.getElementById('result-val').textContent;
  if (t && t !== '—') navigator.clipboard.writeText(t);
}

// Examples
const EXAMPLES = [
  [1,'I'],[4,'IV'],[9,'IX'],[14,'XIV'],[40,'XL'],[49,'XLIX'],
  [99,'XCIX'],[400,'CD'],[900,'CM'],[1000,'M'],[1999,'MCMXCIX'],
  [2024,'MMXXIV'],[3999,'MMMCMXCIX']
];
document.getElementById('examples').innerHTML = EXAMPLES.map(([n,r]) =>
  `<span class="ex-chip" onclick="document.getElementById('arabic-input').value=${n};setMode('to-roman');convertToRoman()">${n} = ${r}</span>`
).join('');

// Init
convertToRoman();
</script>
