<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Response Formatter — Pretty Print JSON, XML, HTML</title>
  <meta name="description" content="Paste raw API responses and instantly pretty-print JSON, XML, or HTML with syntax highlighting. Collapse/expand nodes, copy formatted output. 100% in-browser." />
  <link rel="canonical" href="https://devnestio.pages.dev/api-response-formatter/" />
  <meta property="og:title" content="API Response Formatter" />
  <meta property="og:description" content="Auto-detect and pretty-print JSON, XML, or HTML. Syntax highlighting, collapse/expand, copy. 100% in-browser." />
  <meta property="og:type" content="website" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --purple: #bc8cff;
      --orange: #db6d28;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 28px 32px 20px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #e6edf3; }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-muted); margin-top: 6px; font-size: .9rem; }
    main { flex: 1; padding: 28px 32px; max-width: 1100px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .section-title { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 10px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; }

    textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'SFMono-Regular', Consolas, monospace; font-size: .85rem; padding: 14px; resize: vertical; min-height: 160px; outline: none; transition: border-color .15s; line-height: 1.5; }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
    .btn { padding: 9px 20px; border-radius: 6px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; border: none; }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }
    .btn-sm { padding: 6px 14px; font-size: .78rem; }

    .detect-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 100px; font-size: .78rem; font-weight: 600; }
    .badge-json { background: rgba(88,166,255,.15); color: var(--accent); }
    .badge-xml  { background: rgba(63,185,80,.15); color: var(--green); }
    .badge-html { background: rgba(210,153,34,.15); color: var(--yellow); }
    .badge-unk  { background: rgba(139,148,158,.1); color: var(--text-muted); }

    .output-wrap { position: relative; }
    .output-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .output-actions { display: flex; gap: 6px; }
    .output-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: .84rem; line-height: 1.65; overflow: auto; max-height: 540px; white-space: pre-wrap; word-break: break-word; }
    .output-box:empty::before { content: 'Formatted output will appear here.'; color: var(--text-muted); }

    /* JSON syntax */
    .j-key  { color: var(--accent); }
    .j-str  { color: var(--green); }
    .j-num  { color: var(--purple); }
    .j-bool { color: var(--orange); }
    .j-null { color: var(--text-muted); font-style: italic; }

    /* XML syntax */
    .x-tag  { color: var(--accent); }
    .x-attr { color: var(--yellow); }
    .x-val  { color: var(--green); }
    .x-cmt  { color: var(--text-muted); font-style: italic; }

    /* collapsible nodes */
    .j-toggle { cursor: pointer; user-select: none; color: var(--text-muted); padding: 0 2px; font-size: .8em; }
    .j-toggle:hover { color: var(--text); }
    .j-collapsed { display: none; }
    .j-ellipsis { color: var(--text-muted); }

    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; font-size: .8rem; color: var(--text-muted); }
    .stats-row span { color: var(--text); }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #1c2128; border: 1px solid var(--green); color: var(--green); padding: 8px 16px; border-radius: 6px; font-size: .82rem; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; }
    footer { text-align: center; padding: 24px; font-size: .82rem; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: auto; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<header>
  <h1>API Response <span>Formatter</span></h1>
  <p>Paste raw JSON, XML, or HTML — auto-detect format, pretty-print with syntax highlighting.</p>
</header>
<main>
  <div class="card">
    <div class="section-title">Raw Input</div>
    <textarea id="rawInput" placeholder='Paste JSON, XML, or HTML here…&#10;&#10;Example: {"status":"ok","data":{"id":1,"name":"Alice"}}'></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="format()">Format</button>
      <button class="btn btn-secondary" onclick="loadExample('json')">JSON Example</button>
      <button class="btn btn-secondary" onclick="loadExample('xml')">XML Example</button>
      <button class="btn btn-secondary" onclick="loadExample('html')">HTML Example</button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div id="outputSection" style="display:none">
    <div class="output-wrap">
      <div class="output-toolbar">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="section-title" style="margin:0">Formatted Output</div>
          <span id="detectBadge" class="detect-badge badge-unk">?</span>
        </div>
        <div class="output-actions">
          <button class="btn btn-secondary btn-sm" onclick="collapseAll()">Collapse All</button>
          <button class="btn btn-secondary btn-sm" onclick="expandAll()">Expand All</button>
          <button class="btn btn-secondary btn-sm" onclick="copyOutput()">Copy</button>
          <button class="btn btn-secondary btn-sm" onclick="minify()">Minify</button>
        </div>
      </div>
      <div class="stats-row" id="statsRow" style="margin-bottom:10px"></div>
      <div class="output-box" id="outputBox"></div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<footer>
  <p>API Response Formatter — 100% in-browser, no data transmitted &nbsp;|&nbsp; <a href="https://buymeacoffee.com/devnestio" target="_blank" rel="noopener">Buy me a coffee ☕</a></p>
</footer>
<script>
let detectedType = '';
let formattedRaw = '';

const EXAMPLES = {
  json: `{"status":"success","code":200,"data":{"users":[{"id":1,"name":"Alice","email":"alice@example.com","active":true,"score":9.5,"tags":["admin","editor"]},{"id":2,"name":"Bob","email":"bob@example.com","active":false,"score":null,"tags":["viewer"]}],"total":2,"page":1},"meta":{"requestId":"req_abc123","timestamp":"2025-01-01T00:00:00Z"}}`,
  xml: `<?xml version="1.0" encoding="UTF-8"?><response><status>success</status><data><users><user id="1"><name>Alice</name><email>alice@example.com</email><active>true</active></user><user id="2"><name>Bob</name><email>bob@example.com</email><active>false</active></user></users><total>2</total></data></response>`,
  html: `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Example</title></head><body><header><h1>Hello World</h1></header><main><p>This is an example paragraph with <strong>bold</strong> and <em>italic</em> text.</p><ul><li>Item one</li><li>Item two</li></ul></main></body></html>`,
};

function loadExample(type) {
  document.getElementById('rawInput').value = EXAMPLES[type];
  format();
}

function clearAll() {
  document.getElementById('rawInput').value = '';
  document.getElementById('outputSection').style.display = 'none';
}

function detectType(raw) {
  const t = raw.trim();
  if (t.startsWith('{') || t.startsWith('[')) return 'json';
  if (t.startsWith('<') && (t.includes('<?xml') || t.match(/<[a-zA-Z]/))) {
    if (t.toLowerCase().includes('<!doctype html') || t.toLowerCase().includes('<html')) return 'html';
    return 'xml';
  }
  if (t.toLowerCase().includes('<html') || t.toLowerCase().includes('<!doctype')) return 'html';
  // try JSON parse
  try { JSON.parse(t); return 'json'; } catch(e) {}
  return 'unknown';
}

function format() {
  const raw = document.getElementById('rawInput').value.trim();
  if (!raw) return;

  const type = detectType(raw);
  detectedType = type;

  const badge = document.getElementById('detectBadge');
  badge.textContent = type.toUpperCase();
  badge.className = `detect-badge badge-${type === 'unknown' ? 'unk' : type}`;

  const outputBox = document.getElementById('outputBox');
  document.getElementById('outputSection').style.display = 'block';

  let stats = '';
  if (type === 'json') {
    try {
      const parsed = JSON.parse(raw);
      formattedRaw = JSON.stringify(parsed, null, 2);
      outputBox.innerHTML = highlightJson(parsed, 0);
      const keys = countKeys(parsed);
      stats = `Lines: <span>${formattedRaw.split('\n').length.toLocaleString()}</span> &nbsp; Keys: <span>${keys}</span> &nbsp; Size: <span>${(new TextEncoder().encode(raw).length / 1024).toFixed(1)} KB</span>`;
    } catch(e) {
      outputBox.innerHTML = `<span style="color:var(--red)">JSON parse error: ${escHtml(e.message)}</span>\n\n${escHtml(raw)}`;
    }
  } else if (type === 'xml') {
    formattedRaw = formatXml(raw);
    outputBox.innerHTML = highlightXml(formattedRaw);
    stats = `Lines: <span>${formattedRaw.split('\n').length.toLocaleString()}</span> &nbsp; Size: <span>${(new TextEncoder().encode(raw).length / 1024).toFixed(1)} KB</span>`;
  } else if (type === 'html') {
    formattedRaw = formatXml(raw);
    outputBox.innerHTML = highlightXml(formattedRaw);
    stats = `Lines: <span>${formattedRaw.split('\n').length.toLocaleString()}</span> &nbsp; Size: <span>${(new TextEncoder().encode(raw).length / 1024).toFixed(1)} KB</span>`;
  } else {
    formattedRaw = raw;
    outputBox.textContent = raw;
    stats = `Size: <span>${(new TextEncoder().encode(raw).length / 1024).toFixed(1)} KB</span>`;
  }
  document.getElementById('statsRow').innerHTML = stats;
}

let nodeId = 0;
function highlightJson(val, depth) {
  const indent = '  '.repeat(depth);
  const indentInner = '  '.repeat(depth + 1);
  if (val === null) return `<span class="j-null">null</span>`;
  if (typeof val === 'boolean') return `<span class="j-bool">${val}</span>`;
  if (typeof val === 'number') return `<span class="j-num">${val}</span>`;
  if (typeof val === 'string') return `<span class="j-str">${escHtml(JSON.stringify(val))}</span>`;
  if (Array.isArray(val)) {
    if (val.length === 0) return `[]`;
    const id = 'jn' + (nodeId++);
    const items = val.map((v,i) => `${indentInner}${highlightJson(v, depth+1)}${i < val.length-1 ? ',' : ''}`).join('\n');
    return `<span class="j-toggle" onclick="toggleNode('${id}')">▾</span>[<span id="${id}c">\n${items}\n${indent}</span><span id="${id}e" class="j-ellipsis j-collapsed">…</span>]`;
  }
  if (typeof val === 'object') {
    const keys = Object.keys(val);
    if (keys.length === 0) return `{}`;
    const id = 'jn' + (nodeId++);
    const items = keys.map((k,i) => `${indentInner}<span class="j-key">${escHtml(JSON.stringify(k))}</span>: ${highlightJson(val[k], depth+1)}${i < keys.length-1 ? ',' : ''}`).join('\n');
    return `<span class="j-toggle" onclick="toggleNode('${id}')">▾</span>{<span id="${id}c">\n${items}\n${indent}</span><span id="${id}e" class="j-ellipsis j-collapsed">…</span>}`;
  }
  return escHtml(String(val));
}

function toggleNode(id) {
  const content = document.getElementById(id+'c');
  const ellipsis = document.getElementById(id+'e');
  const toggle = content?.previousElementSibling;
  if (!content) return;
  const collapsed = content.classList.toggle('j-collapsed');
  ellipsis?.classList.toggle('j-collapsed', !collapsed);
  if (toggle) toggle.textContent = collapsed ? '▸' : '▾';
}

function collapseAll() {
  document.querySelectorAll('[id$="c"]').forEach(el => { if(el.id.startsWith('jn')) { el.classList.add('j-collapsed'); const e = document.getElementById(el.id.replace(/c$/,'e')); if(e) e.classList.remove('j-collapsed'); const t = el.previousElementSibling; if(t && t.classList.contains('j-toggle')) t.textContent = '▸'; }});
}
function expandAll() {
  document.querySelectorAll('[id$="c"]').forEach(el => { if(el.id.startsWith('jn')) { el.classList.remove('j-collapsed'); const e = document.getElementById(el.id.replace(/c$/,'e')); if(e) e.classList.add('j-collapsed'); const t = el.previousElementSibling; if(t && t.classList.contains('j-toggle')) t.textContent = '▾'; }});
}

function formatXml(xml) {
  let formatted = '';
  let indent = 0;
  const INDENT = '  ';
  xml.replace(/>\s*</g,'>|<').split('|').forEach(node => {
    if (node.match(/^<\/\w/)) indent--;
    formatted += INDENT.repeat(Math.max(0, indent)) + node.trim() + '\n';
    if (node.match(/^<\w[^>]*[^\/]>.*$/) && !node.match(/<.*>.*<\/.*>/)) indent++;
  });
  return formatted.trim();
}

function highlightXml(xml) {
  return escHtml(xml)
    .replace(/(&lt;\?[^?]*\?&gt;)/g, '<span class="x-cmt">$1</span>')
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="x-cmt">$1</span>')
    .replace(/(&lt;\/?)([a-zA-Z0-9:_-]+)/g, '$1<span class="x-tag">$2</span>')
    .replace(/([a-zA-Z0-9:_-]+)(=&quot;[^&]*&quot;)/g, '<span class="x-attr">$1</span><span class="x-val">$2</span>');
}

function countKeys(obj, count = 0) {
  if (typeof obj === 'object' && obj !== null) {
    for (const k of Object.keys(obj)) { count++; count = countKeys(obj[k], count); }
  }
  return count;
}

function copyOutput() {
  navigator.clipboard.writeText(formattedRaw).then(() => showToast('Copied formatted output!'));
}

function minify() {
  if (detectedType === 'json') {
    try {
      const m = JSON.stringify(JSON.parse(formattedRaw));
      navigator.clipboard.writeText(m).then(() => showToast('Minified JSON copied!'));
    } catch(e) {}
  } else {
    const m = formattedRaw.replace(/\n\s*/g,'').trim();
    navigator.clipboard.writeText(m).then(() => showToast('Minified output copied!'));
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
</body>
</html>
