<script>
// ============================================================
// STATE
// ============================================================
let state = {
  type: 'linear',
  angle: 135,
  radialShape: 'ellipse',
  radialSize: 'farthest-corner',
  radialPosition: 'center',
  conicAngle: 0,
  conicPosition: 'center',
  stops: [
    { hex: '#6c63ff', alpha: 1, position: 0 },
    { hex: '#ff6584', alpha: 1, position: 100 }
  ]
};

// ============================================================
// PURE CSS GENERATION FUNCTIONS (exported for testing)
// ============================================================

function hexToRgba(hex, alpha) {
  const clean = hex.replace('#', '');
  const full = clean.length === 3
    ? clean.split('').map(c => c + c).join('')
    : clean;
  const r = parseInt(full.slice(0, 2), 16);
  const g = parseInt(full.slice(2, 4), 16);
  const b = parseInt(full.slice(4, 6), 16);
  if (alpha >= 1) return `#${full.toLowerCase()}`;
  return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
}

function buildColorStop(stop) {
  const color = hexToRgba(stop.hex, stop.alpha);
  return `${color} ${stop.position}%`;
}

function buildLinearCSS(angle, stops) {
  const stopsStr = stops.map(buildColorStop).join(', ');
  return `linear-gradient(${angle}deg, ${stopsStr})`;
}

function buildRadialCSS(shape, size, position, stops) {
  const stopsStr = stops.map(buildColorStop).join(', ');
  return `radial-gradient(${shape} ${size} at ${position}, ${stopsStr})`;
}

function buildConicCSS(fromAngle, position, stops) {
  const stopsStr = stops.map(buildColorStop).join(', ');
  return `conic-gradient(from ${fromAngle}deg at ${position}, ${stopsStr})`;
}

function buildFullCSS(s) {
  let gradient;
  if (s.type === 'linear') {
    gradient = buildLinearCSS(s.angle, s.stops);
  } else if (s.type === 'radial') {
    gradient = buildRadialCSS(s.radialShape, s.radialSize, s.radialPosition, s.stops);
  } else {
    gradient = buildConicCSS(s.conicAngle, s.conicPosition, s.stops);
  }
  return `background: ${gradient};\nbackground: -webkit-${gradient};`;
}

function sortStops(stops) {
  return [...stops].sort((a, b) => a.position - b.position);
}

function validateHex(hex) {
  return /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(hex);
}

function clamp(val, min, max) {
  return Math.min(max, Math.max(min, val));
}

function alphaToPercent(alpha) {
  return Math.round(alpha * 100);
}

function percentToAlpha(pct) {
  return clamp(pct / 100, 0, 1);
}

function roundAlpha(alpha, decimals) {
  return parseFloat(alpha.toFixed(decimals));
}

// ============================================================
// PRESETS
// ============================================================
const PRESETS = [
  { name: 'Sunset', type: 'linear', angle: 135, stops: [{ hex: '#f97316', alpha: 1, position: 0 }, { hex: '#ec4899', alpha: 1, position: 50 }, { hex: '#8b5cf6', alpha: 1, position: 100 }] },
  { name: 'Ocean', type: 'linear', angle: 180, stops: [{ hex: '#06b6d4', alpha: 1, position: 0 }, { hex: '#3b82f6', alpha: 1, position: 100 }] },
  { name: 'Forest', type: 'linear', angle: 145, stops: [{ hex: '#10b981', alpha: 1, position: 0 }, { hex: '#065f46', alpha: 1, position: 100 }] },
  { name: 'Purple Rain', type: 'linear', angle: 160, stops: [{ hex: '#a855f7', alpha: 1, position: 0 }, { hex: '#3b82f6', alpha: 1, position: 100 }] },
  { name: 'Fire', type: 'radial', radialShape: 'ellipse', radialSize: 'farthest-corner', radialPosition: 'center', stops: [{ hex: '#fbbf24', alpha: 1, position: 0 }, { hex: '#ef4444', alpha: 1, position: 60 }, { hex: '#7f1d1d', alpha: 1, position: 100 }] },
  { name: 'Arctic', type: 'linear', angle: 200, stops: [{ hex: '#e0f2fe', alpha: 1, position: 0 }, { hex: '#7dd3fc', alpha: 1, position: 50 }, { hex: '#0369a1', alpha: 1, position: 100 }] },
  { name: 'Peach', type: 'linear', angle: 120, stops: [{ hex: '#fde68a', alpha: 1, position: 0 }, { hex: '#fb7185', alpha: 1, position: 100 }] },
  { name: 'Mint', type: 'linear', angle: 90, stops: [{ hex: '#a7f3d0', alpha: 1, position: 0 }, { hex: '#059669', alpha: 1, position: 100 }] },
  { name: 'Dusk', type: 'linear', angle: 170, stops: [{ hex: '#1e1b4b', alpha: 1, position: 0 }, { hex: '#7c3aed', alpha: 1, position: 50 }, { hex: '#db2777', alpha: 1, position: 100 }] },
  { name: 'Candy', type: 'conic', conicAngle: 0, conicPosition: 'center', stops: [{ hex: '#f472b6', alpha: 1, position: 0 }, { hex: '#facc15', alpha: 1, position: 33 }, { hex: '#34d399', alpha: 1, position: 66 }, { hex: '#f472b6', alpha: 1, position: 100 }] },
  { name: 'Chrome', type: 'linear', angle: 135, stops: [{ hex: '#e2e8f0', alpha: 1, position: 0 }, { hex: '#94a3b8', alpha: 1, position: 50 }, { hex: '#e2e8f0', alpha: 1, position: 100 }] },
  { name: 'Aurora', type: 'linear', angle: 135, stops: [{ hex: '#00ffcc', alpha: 1, position: 0 }, { hex: '#00c8ff', alpha: 1, position: 40 }, { hex: '#9b5de5', alpha: 1, position: 100 }] }
];

// ============================================================
// UI RENDERING
// ============================================================
function renderStops() {
  const list = document.getElementById('stop-list');
  list.innerHTML = '';
  state.stops.forEach((stop, i) => {
    const div = document.createElement('div');
    div.className = 'stop-item';
    div.innerHTML = `
      <div class="stop-top">
        <div class="color-swatch-wrap" title="Pick color">
          <div class="swatch-bg" id="swatch-bg-${i}" style="background:${stop.hex}"></div>
          <input type="color" value="${stop.hex}" oninput="onStopColor(${i},this.value)">
        </div>
        <span class="stop-hex" id="stop-hex-${i}">${stop.hex}</span>
        ${state.stops.length > 2 ? `<button class="btn-small danger" onclick="removeStop(${i})">✕</button>` : ''}
      </div>
      <div class="stop-alpha-row">
        <span class="stop-alpha-label">Alpha</span>
        <input type="range" min="0" max="100" value="${alphaToPercent(stop.alpha)}"
          style="flex:1;accent-color:var(--accent)"
          oninput="onStopAlpha(${i},this.value)">
        <span class="range-val">${alphaToPercent(stop.alpha)}%</span>
      </div>
      <div class="stop-alpha-row" style="margin-top:6px">
        <span class="stop-alpha-label">Position</span>
        <input type="range" min="0" max="100" value="${stop.position}"
          style="flex:1;accent-color:var(--accent2)"
          oninput="onStopPosition(${i},this.value)">
        <span class="range-val">${stop.position}%</span>
      </div>`;
    list.appendChild(div);
  });
}

function renderPresets() {
  const grid = document.getElementById('presets-grid');
  grid.innerHTML = '';
  PRESETS.forEach((p, i) => {
    let bg;
    if (p.type === 'linear') {
      bg = buildLinearCSS(p.angle, p.stops);
    } else if (p.type === 'radial') {
      bg = buildRadialCSS(p.radialShape, p.radialSize, p.radialPosition, p.stops);
    } else {
      bg = buildConicCSS(p.conicAngle, p.conicPosition, p.stops);
    }
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.style.background = bg;
    btn.innerHTML = `<span>${p.name}</span>`;
    btn.onclick = () => applyPreset(i);
    grid.appendChild(btn);
  });
}

function updateGradient() {
  // sync state from DOM
  state.angle = parseInt(document.getElementById('angle').value);
  state.radialShape = document.getElementById('radial-shape').value;
  state.radialSize = document.getElementById('radial-size').value;
  state.radialPosition = document.getElementById('radial-position').value;
  state.conicAngle = parseInt(document.getElementById('conic-angle').value);
  state.conicPosition = document.getElementById('conic-position').value;

  const css = buildFullCSS(state);
  const gradientValue = state.type === 'linear'
    ? buildLinearCSS(state.angle, state.stops)
    : state.type === 'radial'
      ? buildRadialCSS(state.radialShape, state.radialSize, state.radialPosition, state.stops)
      : buildConicCSS(state.conicAngle, state.conicPosition, state.stops);

  document.getElementById('preview-box').style.background = gradientValue;
  document.getElementById('css-output').value = css;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function setType(type) {
  state.type = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-type="${type}"]`).classList.add('active');
  document.querySelectorAll('.type-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`section-${type}`).classList.add('active');
  updateGradient();
}

function onAngle(el) {
  state.angle = parseInt(el.value);
  document.getElementById('angle-label').textContent = state.angle;
  document.getElementById('angle-val').textContent = state.angle + '°';
  updateGradient();
}

function onConicAngle(el) {
  state.conicAngle = parseInt(el.value);
  document.getElementById('conic-angle-label').textContent = state.conicAngle;
  document.getElementById('conic-angle-val').textContent = state.conicAngle + '°';
  updateGradient();
}

function onStopColor(i, hex) {
  state.stops[i].hex = hex;
  const bg = document.getElementById(`swatch-bg-${i}`);
  const hexEl = document.getElementById(`stop-hex-${i}`);
  if (bg) bg.style.background = hex;
  if (hexEl) hexEl.textContent = hex;
  updateGradient();
}

function onStopAlpha(i, val) {
  state.stops[i].alpha = percentToAlpha(parseInt(val));
  renderStops();
  updateGradient();
}

function onStopPosition(i, val) {
  state.stops[i].position = parseInt(val);
  renderStops();
  updateGradient();
}

function addStop() {
  const positions = state.stops.map(s => s.position);
  let newPos = 50;
  if (positions.length >= 2) {
    let maxGap = 0, gapPos = 50;
    const sorted = [...positions].sort((a, b) => a - b);
    for (let i = 0; i < sorted.length - 1; i++) {
      const gap = sorted[i + 1] - sorted[i];
      if (gap > maxGap) { maxGap = gap; gapPos = Math.round((sorted[i] + sorted[i + 1]) / 2); }
    }
    newPos = gapPos;
  }
  state.stops.push({ hex: '#ffffff', alpha: 1, position: newPos });
  renderStops();
  updateGradient();
}

function removeStop(i) {
  if (state.stops.length <= 2) return;
  state.stops.splice(i, 1);
  renderStops();
  updateGradient();
}

function applyPreset(i) {
  const p = PRESETS[i];
  state.type = p.type;
  state.stops = JSON.parse(JSON.stringify(p.stops));
  if (p.type === 'linear') state.angle = p.angle;
  if (p.type === 'radial') {
    state.radialShape = p.radialShape;
    state.radialSize = p.radialSize;
    state.radialPosition = p.radialPosition;
  }
  if (p.type === 'conic') {
    state.conicAngle = p.conicAngle;
    state.conicPosition = p.conicPosition;
  }

  // update DOM
  setType(p.type);
  if (p.type === 'linear') {
    document.getElementById('angle').value = p.angle;
    document.getElementById('angle-label').textContent = p.angle;
    document.getElementById('angle-val').textContent = p.angle + '°';
  }
  if (p.type === 'radial') {
    document.getElementById('radial-shape').value = p.radialShape;
    document.getElementById('radial-size').value = p.radialSize;
    document.getElementById('radial-position').value = p.radialPosition;
  }
  if (p.type === 'conic') {
    document.getElementById('conic-angle').value = p.conicAngle;
    document.getElementById('conic-angle-label').textContent = p.conicAngle;
    document.getElementById('conic-angle-val').textContent = p.conicAngle + '°';
    document.getElementById('conic-position').value = p.conicPosition;
  }
  renderStops();
  updateGradient();
}

function copyCSS() {
  const out = document.getElementById('css-output').value;
  navigator.clipboard.writeText(out).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

// ============================================================
// INIT
// ============================================================
function init() {
  renderStops();
  renderPresets();
  updateGradient();
}

init();
</script>
</body>
</html>
