<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Editor — Live Preview, Templates, Download & Copy</title>
  <meta name="description" content="Simple online SVG editor with live preview. Write SVG code on the left, see the rendered result instantly on the right. Download as .svg, copy code, built-in templates." />
  <link rel="canonical" href="https://devnestio.pages.dev/svg-editor/" />
  <meta property="og:title" content="SVG Editor — Live Preview" />
  <meta property="og:description" content="Edit SVG code with live preview. Download .svg, copy code, starter templates." />
  <meta property="og:type" content="website" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .header-left h1 { font-size: 1.2rem; font-weight: 700; color: #e6edf3; }
    .header-left h1 span { color: var(--accent); }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn { padding: 7px 16px; border-radius: 6px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .15s; border: none; }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }
    .btn-success { background: transparent; color: var(--green); border: 1px solid var(--border); }
    .btn-success:hover { border-color: var(--green); }
    select { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 12px; font-size: .82rem; cursor: pointer; outline: none; }

    .editor-area { flex: 1; display: flex; overflow: hidden; }
    .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .pane:first-child { border-right: 1px solid var(--border); }
    .pane-header { padding: 8px 14px; background: var(--bg-card); border-bottom: 1px solid var(--border); font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); display: flex; align-items: center; justify-content: space-between; }
    .code-area { flex: 1; overflow: auto; }
    textarea.code { width: 100%; height: 100%; background: var(--bg); border: none; color: var(--text); font-family: 'SFMono-Regular', Consolas, monospace; font-size: .85rem; padding: 16px; resize: none; outline: none; line-height: 1.6; }
    .preview-pane { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; position: relative; }
    .preview-inner { background: #fff; border-radius: 6px; box-shadow: 0 0 0 1px rgba(255,255,255,.08); max-width: 100%; max-height: 100%; display: flex; align-items: center; justify-content: center; padding: 4px; }
    .preview-inner svg { max-width: 100%; height: auto; }
    .preview-inner.dark-bg { background: #1a1a1a; }
    .preview-inner.transparent-bg { background: transparent; }
    .preview-error { color: #f85149; font-size: .82rem; font-family: 'SFMono-Regular', Consolas, monospace; text-align: center; padding: 20px; }
    .char-info { font-size: .72rem; color: var(--text-muted); }
    .bg-toggle { display: flex; gap: 4px; }
    .bg-btn { width: 20px; height: 20px; border-radius: 3px; border: 1px solid var(--border); cursor: pointer; transition: border-color .15s; }
    .bg-btn.active { border-color: var(--accent); }
    .bg-btn-white { background: #fff; }
    .bg-btn-dark { background: #1a1a1a; }
    .bg-btn-checker { background: repeating-conic-gradient(#aaa 0% 25%, #eee 0% 50%) 0 0/10px 10px; }

    footer { text-align: center; padding: 10px 24px; font-size: .78rem; color: var(--text-muted); border-top: 1px solid var(--border); flex-shrink: 0; }
    footer a { color: var(--accent); text-decoration: none; }

    .toast { position: fixed; bottom: 20px; right: 20px; background: #1c2128; border: 1px solid var(--green); color: var(--green); padding: 8px 16px; border-radius: 6px; font-size: .82rem; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<header>
  <div class="header-left"><h1>SVG <span>Editor</span></h1></div>
  <div class="toolbar">
    <select id="templateSelect" onchange="loadTemplate()">
      <option value="">— Templates —</option>
      <option value="circle">Circle</option>
      <option value="rect">Rectangle</option>
      <option value="line">Lines</option>
      <option value="path">Path / Arrow</option>
      <option value="text">Text</option>
      <option value="star">Star</option>
      <option value="gradient">Gradient</option>
      <option value="icon">Icon (search)</option>
    </select>
    <button class="btn btn-secondary" onclick="copyCode()">Copy Code</button>
    <button class="btn btn-success" onclick="downloadSvg()">Download .svg</button>
  </div>
</header>
<div class="editor-area">
  <div class="pane">
    <div class="pane-header">
      <span>SVG Code</span>
      <span class="char-info" id="charInfo">0 chars</span>
    </div>
    <div class="code-area">
      <textarea class="code" id="codeInput" spellcheck="false" oninput="updatePreview()"></textarea>
    </div>
  </div>
  <div class="pane">
    <div class="pane-header">
      <span>Preview</span>
      <div class="bg-toggle">
        <div class="bg-btn bg-btn-white active" title="White bg" onclick="setBg('white',this)"></div>
        <div class="bg-btn bg-btn-dark" title="Dark bg" onclick="setBg('dark',this)"></div>
        <div class="bg-btn bg-btn-checker" title="Transparent" onclick="setBg('transparent',this)"></div>
      </div>
    </div>
    <div class="preview-pane" id="previewPane">
      <div class="preview-inner" id="previewInner">
        <div style="color:#8b949e;font-size:.85rem">Enter SVG code to preview</div>
      </div>
    </div>
  </div>
</div>
<footer>
  SVG Editor — 100% in-browser &nbsp;|&nbsp; <a href="https://buymeacoffee.com/devnestio" target="_blank" rel="noopener">Buy me a coffee ☕</a>
</footer>
<div class="toast" id="toast"></div>
<script>
const TEMPLATES = {
  circle: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <circle cx="100" cy="100" r="80" fill="#58a6ff" stroke="#0d1117" stroke-width="4"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="8 4"/>
</svg>`,
  rect: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 160" width="220" height="160">
  <rect x="20" y="20" width="180" height="120" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <rect x="40" y="50" width="80" height="12" rx="4" fill="#58a6ff" opacity=".8"/>
  <rect x="40" y="74" width="140" height="8" rx="4" fill="#c9d1d9" opacity=".4"/>
  <rect x="40" y="94" width="110" height="8" rx="4" fill="#c9d1d9" opacity=".3"/>
</svg>`,
  line: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <line x1="20" y1="20" x2="180" y2="180" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="20" x2="20" y2="180" stroke="#3fb950" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="10" x2="100" y2="190" stroke="#d29922" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="10" y1="100" x2="190" y2="100" stroke="#d29922" stroke-width="2" stroke-dasharray="6 4"/>
</svg>`,
  path: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>
  <path d="M 20 60 C 60 20, 140 100, 180 60" stroke="#58a6ff" stroke-width="2.5" fill="none"
    stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <circle cx="20" cy="60" r="5" fill="#3fb950"/>
</svg>`,
  text: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" width="260" height="100">
  <text x="130" y="42" text-anchor="middle" font-family="system-ui, sans-serif"
    font-size="28" font-weight="700" fill="#58a6ff">Hello, SVG!</text>
  <text x="130" y="68" text-anchor="middle" font-family="system-ui, sans-serif"
    font-size="13" fill="#8b949e">Scalable Vector Graphics</text>
  <line x1="40" y1="78" x2="220" y2="78" stroke="#30363d" stroke-width="1"/>
</svg>`,
  star: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <polygon points="100,15 120,70 180,70 130,105 150,165 100,130 50,165 70,105 20,70 80,70"
    fill="#d29922" stroke="#f0a500" stroke-width="2"/>
</svg>`,
  gradient: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d29922;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f85149;stop-opacity:.6"/>
    </radialGradient>
  </defs>
  <rect x="10" y="10" width="100" height="140" rx="8" fill="url(#grad1)"/>
  <circle cx="180" cy="80" r="60" fill="url(#grad2)"/>
</svg>`,
  icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64"
  fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="11" cy="11" r="8"/>
  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
</svg>`,
};

let bgClass = '';

function loadTemplate() {
  const key = document.getElementById('templateSelect').value;
  if (!key) return;
  document.getElementById('codeInput').value = TEMPLATES[key];
  document.getElementById('templateSelect').value = '';
  updatePreview();
}

function updatePreview() {
  const code = document.getElementById('codeInput').value;
  document.getElementById('charInfo').textContent = code.length.toLocaleString() + ' chars';
  const preview = document.getElementById('previewInner');
  if (!code.trim()) {
    preview.innerHTML = '<div style="color:#8b949e;font-size:.85rem">Enter SVG code to preview</div>';
    preview.className = 'preview-inner' + (bgClass ? ' ' + bgClass : '');
    return;
  }
  // Sanitize: only allow SVG content
  if (!code.trim().toLowerCase().startsWith('<svg')) {
    preview.innerHTML = '<div class="preview-error">⚠ Content must start with &lt;svg&gt;</div>';
    return;
  }
  try {
    preview.innerHTML = code;
    preview.className = 'preview-inner' + (bgClass ? ' ' + bgClass : '');
  } catch(e) {
    preview.innerHTML = '<div class="preview-error">⚠ Invalid SVG</div>';
  }
}

function setBg(type, el) {
  document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  bgClass = type === 'white' ? '' : type === 'dark' ? 'dark-bg' : 'transparent-bg';
  const inner = document.getElementById('previewInner');
  inner.className = 'preview-inner' + (bgClass ? ' ' + bgClass : '');
}

function copyCode() {
  const code = document.getElementById('codeInput').value;
  if (!code) return;
  navigator.clipboard.writeText(code).then(() => showToast('SVG code copied!'));
}

function downloadSvg() {
  const code = document.getElementById('codeInput').value;
  if (!code) return;
  const blob = new Blob([code], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'image.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1600);
}

// Load default template
document.getElementById('codeInput').value = TEMPLATES.circle;
updatePreview();
</script>
</body>
</html>
