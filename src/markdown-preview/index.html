/* ═══════════════════════════════════════════════════════════════
   MARKDOWN PARSER — core functions (exported for tests)

function escapeHtml(str) {
  return String(str === null || str === undefined ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function parseCells(line) {
  return line.replace(/^\s*\||\|\s*$/g, '').split('|');
}

function isBlockStart(line) {
  if (/^#{1,6}\s/.test(line)) return true;
  if (/^(`{3,}|~{3,})/.test(line)) return true;
  if (/^>\s?/.test(line)) return true;
  if (/^[ \t]*[*+\-]\s/.test(line)) return true;
  if (/^\d+\.\s/.test(line)) return true;
  if (/^\|/.test(line)) return true;
  if (/^[ \t]*([-*_])([ \t]*\1[ \t]*){2,}[ \t]*$/.test(line)) return true;
  return false;
}

function getHighlightPatterns(lang) {
  var norm = String(lang || '').toLowerCase().split(/[\s{]/)[0];
  var JS_KW = /\b(async|await|break|case|catch|class|const|continue|debugger|default|delete|do|else|export|extends|finally|for|function|if|import|in|instanceof|let|new|null|of|return|static|super|switch|this|throw|true|false|try|typeof|undefined|var|void|while|with|yield|get|set)\b/;
  var PY_KW = /\b(False|None|True|and|as|assert|async|await|break|class|continue|def|del|elif|else|except|finally|for|from|global|if|import|in|is|lambda|nonlocal|not|or|pass|raise|return|try|while|with|yield)\b/;
  var RUST_KW = /\b(as|async|await|break|const|continue|crate|dyn|else|enum|extern|false|fn|for|if|impl|in|let|loop|match|mod|move|mut|pub|ref|return|self|Self|static|struct|super|trait|true|type|union|unsafe|use|where|while)\b/;
  var SQL_KW = /\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AS|GROUP|BY|ORDER|HAVING|LIMIT|OFFSET|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|INDEX|DROP|ALTER|ADD|COLUMN|PRIMARY|KEY|FOREIGN|REFERENCES|UNIQUE|NOT|NULL|AND|OR|IN|LIKE|BETWEEN|EXISTS|UNION|ALL|DISTINCT|COUNT|SUM|AVG|MAX|MIN|CASE|WHEN|THEN|ELSE|END)\b/i;
  var JS_STR = /"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`/;
  var JS_CMT_L = /\/\/.*/;
  var JS_CMT_B = /\/\*[\s\S]*?\*\//;
  var JS_NUM = /\b\d+(?:\.\d+)?\b/;
  var map = {
    js:         { comment_line: JS_CMT_L, comment_block: JS_CMT_B, string: JS_STR, number: JS_NUM, keyword: JS_KW },
    javascript: { comment_line: JS_CMT_L, comment_block: JS_CMT_B, string: JS_STR, number: JS_NUM, keyword: JS_KW },
    ts:         { comment_line: JS_CMT_L, comment_block: JS_CMT_B, string: JS_STR, number: JS_NUM, keyword: /\b(as|async|await|break|case|catch|class|const|continue|debugger|default|delete|do|else|enum|export|extends|finally|for|function|if|implements|import|in|instanceof|interface|let|new|null|of|package|private|protected|public|return|static|super|switch|this|throw|true|false|try|type|typeof|undefined|var|void|while|with|yield)\b/ },
    typescript: { comment_line: JS_CMT_L, comment_block: JS_CMT_B, string: JS_STR, number: JS_NUM, keyword: /\b(as|async|await|break|case|catch|class|const|continue|debugger|default|delete|do|else|enum|export|extends|finally|for|function|if|implements|import|in|instanceof|interface|let|new|null|of|package|private|protected|public|return|static|super|switch|this|throw|true|false|try|type|typeof|undefined|var|void|while|with|yield)\b/ },
    py:         { comment_line: /#.*/, string: /"""[\s\S]*?"""|'''[\s\S]*?'''|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/, number: /\b\d+(?:\.\d+)?\b/, keyword: PY_KW },
    python:     { comment_line: /#.*/, string: /"""[\s\S]*?"""|'''[\s\S]*?'''|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/, number: /\b\d+(?:\.\d+)?\b/, keyword: PY_KW },
    rust:       { comment_line: JS_CMT_L, comment_block: JS_CMT_B, string: /"(?:[^"\\]|\\.)*"/, number: /\b\d+(?:\.\d+)?\b/, keyword: RUST_KW },
    go:         { comment_line: JS_CMT_L, comment_block: JS_CMT_B, string: /"(?:[^"\\]|\\.)*"/, number: /\b\d+(?:\.\d+)?\b/, keyword: /\b(break|case|chan|const|continue|default|defer|else|fallthrough|for|func|go|goto|if|import|interface|map|package|range|return|select|struct|switch|type|var|true|false|nil)\b/ },
    bash:       { comment_line: /#.*/, string: /"(?:[^"\\]|\\.)*"|'[^']*'/, number: /\b\d+\b/, keyword: /\b(if|then|else|elif|fi|for|while|do|done|case|esac|function|return|local|export|echo|cd|ls|grep|awk|sed|cat|mkdir|rm|cp|mv|source|readonly|declare)\b/ },
    sh:         { comment_line: /#.*/, string: /"(?:[^"\\]|\\.)*"|'[^']*'/, number: /\b\d+\b/, keyword: /\b(if|then|else|elif|fi|for|while|do|done|case|esac|function|return|local|export|echo|cd|ls|grep|awk|sed|cat|mkdir|rm|cp|mv|source|readonly|declare)\b/ },
    css:        { comment_block: JS_CMT_B, string: /"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/, number: /\b\d+(?:\.\d+)?(?:px|em|rem|%|vh|vw|pt|ex|ch|vmin|vmax|s|ms)?\b/, selector: /[.#:][a-zA-Z][\w-]*/, property: /(?<![a-zA-Z])[a-z][\w-]*(?=\s*:)/ },
    html:       { comment: /<!--[\s\S]*?-->/, tag: /<\/?[a-zA-Z][a-zA-Z0-9-]*(?:\s[^>]*)?\/?>/,  string: /"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/ },
    xml:        { comment: /<!--[\s\S]*?-->/, tag: /<\/?[a-zA-Z][a-zA-Z0-9:.-]*(?:\s[^>]*)?\/?>/,  string: /"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/ },
    sql:        { comment_line: /--[^\r\n]*/, comment_block: JS_CMT_B, string: /'(?:[^'\\]|\\.)*'/, number: /\b\d+(?:\.\d+)?\b/, keyword: SQL_KW },
    json:       { string: /"(?:[^"\\]|\\.)*"/, number: /-?\b\d+(?:\.\d+)?\b/, keyword: /\b(true|false|null)\b/ }
  };
  return map[norm] || null;
}

function highlightSyntax(code, lang) {
  var patterns = getHighlightPatterns(lang);
  if (!patterns) return escapeHtml(code);
  var remaining = code;
  var result = '';
  while (remaining.length > 0) {
    var earliest = null;
    var earliestIdx = Infinity;
    var earliestType = null;
    var keys = Object.keys(patterns);
    for (var ki = 0; ki < keys.length; ki++) {
      var type = keys[ki];
      var re = patterns[type];
      var flags = re.flags && re.flags.includes('i') ? 'i' : '';
      var r = new RegExp(re.source, flags);
      var m = r.exec(remaining);
      if (m !== null && m.index < earliestIdx) {
        earliest = m;
        earliestIdx = m.index;
        earliestType = type;
      }
    }
    if (earliest !== null) {
      if (earliestIdx > 0) result += escapeHtml(remaining.slice(0, earliestIdx));
      result += '<span class="hl-' + earliestType + '">' + escapeHtml(earliest[0]) + '</span>';
      remaining = remaining.slice(earliestIdx + earliest[0].length);
    } else {
      result += escapeHtml(remaining);
      break;
    }
  }
  return result;
}

function parseInline(text) {
  if (!text) return '';
  var codeSpans = [];
  text = text.replace(/`([^`]+)`/g, function(_, code) {
    var idx = codeSpans.length;
    codeSpans.push('<code>' + escapeHtml(code) + '</code>');
    return '\x02CODE' + idx + '\x03';
  });
  text = text.replace(/!\[([^\]]*)\]\(([^)]*)\)/g, function(_, alt, src) {
    return '<img src="' + escapeHtml(src) + '" alt="' + escapeHtml(alt) + '">';
  });
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, label, href) {
    return '<a href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + label + '</a>';
  });
  text = text.replace(/\*{3}(.+?)\*{3}/g, '<strong><em>$1</em></strong>');
  text = text.replace(/_{3}(.+?)_{3}/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*{2}(.+?)\*{2}/g, '<strong>$1</strong>');
  text = text.replace(/_{2}(.+?)_{2}/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_([^_\n]+)_/g, '<em>$1</em>');
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
  text = text.replace(/\x02CODE(\d+)\x03/g, function(_, i) { return codeSpans[+i]; });
  return text;
}

function parseMarkdown(text) {
  if (!text || text.trim() === '') return '';
  var lines = text.split('\n');
  var html = '';
  var i = 0;
  while (i < lines.length) {
    var line = lines[i];

    /* fenced code block */
    var fenceM = line.match(/^(`{3,}|~{3,})(.*)/);
    if (fenceM) {
      var fenceCh = fenceM[1][0];
      var fenceLen = fenceM[1].length;
      var fence = fenceCh.repeat(fenceLen);
      var lang = fenceM[2].trim().split(/\s+/)[0];
      var codeLines = [];
      i++;
      while (i < lines.length && !lines[i].startsWith(fence)) {
        codeLines.push(lines[i]);
        i++;
      }
      i++;
      var langAttr = lang ? ' class="language-' + escapeHtml(lang) + '"' : '';
      var highlighted = highlightSyntax(codeLines.join('\n'), lang);
      html += '<pre><code' + langAttr + '>' + highlighted + '</code></pre>\n';
      continue;
    }

    /* ATX heading */
    var headM = line.match(/^(#{1,6})\s+(.*)/);
    if (headM) {
      var lvl = headM[1].length;
      html += '<h' + lvl + '>' + parseInline(headM[2].trim()) + '</h' + lvl + '>\n';
      i++;
      continue;
    }

    /* setext heading */
    if (i + 1 < lines.length && line.trim() !== '' && !isBlockStart(line)) {
      var nxt = lines[i + 1];
      if (/^=+\s*$/.test(nxt)) {
        html += '<h1>' + parseInline(line.trim()) + '</h1>\n';
        i += 2;
        continue;
      }
      if (/^-{2,}\s*$/.test(nxt) && !/^[ \t]*[*+\-]\s/.test(line)) {
        html += '<h2>' + parseInline(line.trim()) + '</h2>\n';
        i += 2;
        continue;
      }
    }

    /* horizontal rule */
    if (/^[ \t]*([-*_])([ \t]*\1[ \t]*){2,}[ \t]*$/.test(line)) {
      html += '<hr>\n';
      i++;
      continue;
    }

    /* blockquote */
    if (/^>/.test(line)) {
      var qLines = [];
      while (i < lines.length && /^>/.test(lines[i])) {
        qLines.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      html += '<blockquote>\n' + parseMarkdown(qLines.join('\n')) + '</blockquote>\n';
      continue;
    }

    /* table */
    if (/^\|/.test(line) && i + 1 < lines.length && /^\|?[ \t]*:?-+:?[ \t]*(\|[ \t]*:?-+:?[ \t]*)*\|?\s*$/.test(lines[i + 1])) {
      var hdrCells = parseCells(line);
      var sepCells = parseCells(lines[i + 1]);
      var aligns = sepCells.map(function(c) {
        var t = c.trim();
        if (t.startsWith(':') && t.endsWith(':')) return 'center';
        if (t.endsWith(':')) return 'right';
        if (t.startsWith(':')) return 'left';
        return '';
      });
      var tbl = '<table>\n<thead>\n<tr>\n';
      hdrCells.forEach(function(cell, j) {
        var al = aligns[j] ? ' style="text-align:' + aligns[j] + '"' : '';
        tbl += '<th' + al + '>' + parseInline(cell.trim()) + '</th>\n';
      });
      tbl += '</tr>\n</thead>\n<tbody>\n';
      i += 2;
      while (i < lines.length && /^\|/.test(lines[i])) {
        var cells = parseCells(lines[i]);
        tbl += '<tr>\n';
        cells.forEach(function(cell, j) {
          var al = aligns[j] ? ' style="text-align:' + aligns[j] + '"' : '';
          tbl += '<td' + al + '>' + parseInline(cell.trim()) + '</td>\n';
        });
        tbl += '</tr>\n';
        i++;
      }
      tbl += '</tbody>\n</table>\n';
      html += tbl;
      continue;
    }

    /* unordered list */
    if (/^[ \t]*[*+\-]\s/.test(line)) {
      var ulIndent = (line.match(/^([ \t]*)/) || ['',''])[1].length;
      html += '<ul>\n';
      while (i < lines.length && /^[ \t]*[*+\-]\s/.test(lines[i])) {
        var liIndent = (lines[i].match(/^([ \t]*)/) || ['',''])[1].length;
        if (liIndent > ulIndent + 3) break;
        var liContent = lines[i].replace(/^[ \t]*[*+\-]\s+/, '');
        html += '<li>' + parseInline(liContent) + '</li>\n';
        i++;
      }
      html += '</ul>\n';
      continue;
    }

    /* ordered list */
    if (/^\d+\.\s/.test(line)) {
      html += '<ol>\n';
      while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
        var olContent = lines[i].replace(/^\d+\.\s+/, '');
        html += '<li>' + parseInline(olContent) + '</li>\n';
        i++;
      }
      html += '</ol>\n';
      continue;
    }

    /* empty line */
    if (line.trim() === '') {
      i++;
      continue;
    }

    /* paragraph */
    var paraLines = [];
    while (i < lines.length && lines[i].trim() !== '' && !isBlockStart(lines[i])) {
      if (i + 1 < lines.length && (/^=+\s*$/.test(lines[i + 1]) || /^-{2,}\s*$/.test(lines[i + 1]))) {
        break;
      }
      paraLines.push(lines[i]);
      i++;
    }
    if (paraLines.length > 0) {
      html += '<p>' + parseInline(paraLines.join(' ').trim()) + '</p>\n';
    } else {
      i++;
    }
  }
  return html;
}

/* ── Expose for tests ──────────────────────────────────────── */
if (typeof window !== 'undefined') {
  window.__markdownPreview = { escapeHtml: escapeHtml, parseCells: parseCells, parseMarkdown: parseMarkdown, parseInline: parseInline, highlightSyntax: highlightSyntax, isBlockStart: isBlockStart };
}
if (typeof module !== 'undefined' && module.exports) {
  module.exports = { escapeHtml: escapeHtml, parseCells: parseCells, parseMarkdown: parseMarkdown, parseInline: parseInline, highlightSyntax: highlightSyntax, isBlockStart: isBlockStart };
}

/* ═══════════════════════════════════════════════════════════════
   UI — browser only (wrapped in try/catch for test safety)
   ═══════════════════════════════════════════════════════════════ */
try {
  var editor   = document.getElementById('editor');
  var preview  = document.getElementById('preview');
  var statusEl = document.getElementById('status');
  var themeBtn = document.getElementById('theme-btn');
  var splitter = document.getElementById('splitter');
  var edPane   = document.getElementById('editor-pane');

  var DEFAULT_MD = [
    '# Welcome to Markdown Preview',
    '',
    'A **real-time** Markdown editor that runs *entirely in your browser*.',
    'Zero dependencies. Zero server. Just pure JavaScript.',
    '',
    '## Features',
    '',
    '- **Headings** (H1–H6)',
    '- **Bold**, *Italic*, ***Bold Italic***',
    '- `Inline code` and fenced code blocks',
    '- Tables with alignment',
    '- Blockquotes',
    '- Ordered and unordered lists',
    '- ~~Strikethrough~~',
    '- [Links](https://devnestio.pages.dev) and images',
    '- Horizontal rules',
    '',
    '## Code Example',
    '',
    '```javascript',
    'function greet(name) {',
    '  const msg = `Hello, ${name}!`;',
    '  return msg; // return greeting',
    '}',
    '```',
    '',
    '## Table',
    '',
    '| Feature | Support |',
    '|---------|:-------:|',
    '| Headings | ✅ |',
    '| Bold/Italic | ✅ |',
    '| Tables | ✅ |',
    '| Code blocks | ✅ |',
    '',
    '## Blockquote',
    '',
    '> "Any fool can write code that a computer can understand.',
    '> Good programmers write code that humans can understand."',
    '> — Martin Fowler',
    '',
    '---',
    '',
    '*Built with ❤️ by [devnestio](https://devnestio.pages.dev)*'
  ].join('\n');

  function showStatus(msg) {
    statusEl.textContent = msg;
    setTimeout(function() { statusEl.textContent = ''; }, 2000);
  }

  function render() {
    try { preview.innerHTML = parseMarkdown(editor.value); } catch(e) {}
  }

  editor.addEventListener('input', render);

  /* theme toggle */
  var isDark = false;
  themeBtn.addEventListener('click', function() {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    themeBtn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
  });

  /* toolbar buttons */
  document.getElementById('btn-copy-html').addEventListener('click', function() {
    var html = parseMarkdown(editor.value);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(html).then(function() { showStatus('Copied HTML!'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = html;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showStatus('Copied HTML!');
    }
  });

  document.getElementById('btn-copy-md').addEventListener('click', function() {
    var md = editor.value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(md).then(function() { showStatus('Copied Markdown!'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = md;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showStatus('Copied Markdown!');
    }
  });

  document.getElementById('btn-download').addEventListener('click', function() {
    var blob = new Blob([editor.value], { type: 'text/markdown' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'document.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus('Downloaded!');
  });

  document.getElementById('btn-clear').addEventListener('click', function() {
    if (editor.value && window.confirm('Clear the editor?')) {
      editor.value = '';
      preview.innerHTML = '';
    }
  });

  /* splitter drag */
  var dragging = false;
  var dragStartX = 0;
  var dragStartW = 0;

  splitter.addEventListener('mousedown', function(e) {
    dragging = true;
    dragStartX = e.clientX;
    dragStartW = edPane.getBoundingClientRect().width;
    splitter.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var main = document.getElementById('split-pane');
    var totalW = main.getBoundingClientRect().width;
    var delta = e.clientX - dragStartX;
    var newW = Math.max(120, Math.min(dragStartW + delta, totalW - 120));
    edPane.style.flex = 'none';
    edPane.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    splitter.classList.remove('dragging');
  });

  /* init */
  editor.value = DEFAULT_MD;
  render();

} catch (_) { /* test environment */ }
</script>
</body>
</html>
