<main>

    <input class="search-input" type="text" id="search" placeholder="Search port, service, or keyword…" oninput="render()" />
    <div class="filter-tabs">

      <button class="filter-tab" data-proto="TCP" onclick="setProto('TCP')">TCP</button>
      <button class="filter-tab" data-proto="UDP" onclick="setProto('UDP')">UDP</button>
    </div>
    <span class="count-label" id="count-label"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('port')">Port ↕</th>
        <th>Protocol</th>
        <th onclick="sortBy('name')">Service ↕</th>
        <th>Description</th>
        <th>Category</th>
      </tr>
    </thead>
    <tbody id="port-tbody"></tbody>
  </table>
  <div id="no-results" class="no-results" style="display:none">No matching ports found.</div>
  <div id="ad-slot" data-ea-publisher="devnestio" data-ea-type="image"></div>
</main>

let sortField = 'port', sortAsc = true, protoFilter = 'all';

function setProto(p) {
  protoFilter = p;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.proto === p));
  render();
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  render();
}

function getProtoLabel(p) {
  if (p === 'TCP') return '<span class="proto-badge proto-tcp">TCP</span>';
  if (p === 'UDP') return '<span class="proto-badge proto-udp">UDP</span>';
  return '<span class="proto-badge proto-both">TCP</span><span class="proto-badge proto-both">UDP</span>';
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let rows = PORTS.filter(([port, proto, name, desc, cat]) => {
    if (protoFilter !== 'all') {
      if (!proto.includes(protoFilter)) return false;
    }
    if (!q) return true;
    return String(port) === q || String(port).startsWith(q) ||
      name.toLowerCase().includes(q) || desc.toLowerCase().includes(q) ||
      cat.toLowerCase().includes(q) || proto.toLowerCase().includes(q);
  });

  rows.sort((a, b) => {
    let va = sortField === 'port' ? a[0] : a[2];
    let vb = sortField === 'port' ? b[0] : b[2];
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('count-label').textContent = `${rows.length} of ${PORTS.length} ports`;
  document.getElementById('no-results').style.display = rows.length ? 'none' : '';
  document.getElementById('port-tbody').innerHTML = rows.map(([port, proto, name, desc, cat]) =>
    `<tr>
      <td><span class="port-num">${port}</span></td>
      <td>${getProtoLabel(proto)}</td>
      <td><span class="svc-name">${name}</span></td>
      <td><span class="svc-desc">${desc}</span></td>
      <td><span class="cat-badge">${cat}</span></td>
    </tr>`
  ).join('');
}

render();
</script>
