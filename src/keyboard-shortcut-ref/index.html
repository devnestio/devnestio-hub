  <style>

    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    .search-box { flex: 1; min-width: 200px; position: relative; }
    .search-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: .5rem 1rem .5rem 2.2rem; font-size: .9rem; outline: none; transition: border-color .2s; }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before { content: '⌕'; position: absolute; left: .7rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; }
    .filter-group { display: flex; gap: .4rem; flex-wrap: wrap; }
    .filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; padding: .35rem .85rem; font-size: .8rem; cursor: pointer; transition: all .15s; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn.vscode.active { background: #007acc; border-color: #007acc; }
    .filter-btn.chrome.active { background: #f4a219; border-color: #f4a219; color: #000; }
    .filter-btn.mac.active { background: #555; border-color: #888; color: #fff; }
    .main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
    .stats { font-size: .8rem; color: var(--text-muted); margin-bottom: 1rem; }
    .category-section { margin-bottom: 2rem; }
    .category-title { font-size: 1rem; font-weight: 600; color: var(--accent2); margin-bottom: .75rem; padding-bottom: .4rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .5rem; }
    .shortcuts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: .6rem; }
    .shortcut-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .7rem 1rem; display: flex; align-items: center; gap: .75rem; transition: border-color .15s; cursor: default; }
    .shortcut-card:hover { border-color: var(--accent); }
    .shortcut-card.hidden { display: none; }
    .sc-keys { display: flex; gap: .25rem; flex-shrink: 0; }
    kbd { background: var(--surface2); border: 1px solid var(--border); border-bottom: 3px solid var(--border); color: var(--text); border-radius: 4px; padding: .15rem .4rem; font-family: monospace; font-size: .8rem; white-space: nowrap; }
    .sc-info { flex: 1; min-width: 0; }
    .sc-action { font-size: .85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sc-meta { display: flex; gap: .4rem; margin-top: .2rem; align-items: center; }
    .app-badge { font-size: .7rem; padding: .1rem .45rem; border-radius: 4px; font-weight: 600; }
    .app-badge.vscode { background: #007acc22; color: #007acc; }
    .app-badge.chrome { background: #f4a21922; color: #f4a219; }
    .app-badge.mac { background: #88888822; color: #aaa; }
    .copy-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: .75rem; padding: .2rem .4rem; border-radius: 4px; transition: all .15s; white-space: nowrap; flex-shrink: 0; }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .empty { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 1rem; }
    footer { text-align: center; padding: 2rem; color: var(--text-muted); font-size: .8rem; border-top: 1px solid var(--border); margin-top: 2rem; }
    @media (max-width: 600px) {
      .shortcuts-grid { grid-template-columns: 1fr; }
      .controls { padding: .75rem 1rem; }
      .main { padding: 1rem; }
    }

  // Text
  { app:"mac", cat:"Text", action:"Move to beginning of line", keys:["⌘","←"] },
  { app:"mac", cat:"Text", action:"Move to end of line", keys:["⌘","→"] },
  { app:"mac", cat:"Text", action:"Move to beginning of doc", keys:["⌘","↑"] },
  { app:"mac", cat:"Text", action:"Move to end of doc", keys:["⌘","↓"] },
  { app:"mac", cat:"Text", action:"Select to beginning of line", keys:["⌘","Shift","←"] },
  { app:"mac", cat:"Text", action:"Select to end of line", keys:["⌘","Shift","→"] },
  { app:"mac", cat:"Text", action:"Delete word backward", keys:["Opt","Delete"] },
  { app:"mac", cat:"Text", action:"Delete to beginning of line", keys:["⌘","Delete"] },

let activeApp = 'all';
let searchTerm = '';

function keysToText(keys) {
  return keys.join('+');
}

function renderKeys(keys) {
  return keys.map(k => `<kbd>${k}</kbd>`).join('<span style="color:var(--text-muted);font-size:.8rem;margin:0 .1rem">+</span>');
}

function render() {
  const filtered = SHORTCUTS.filter(s => {
    const appOk = activeApp === 'all' || s.app === activeApp;
    const term = searchTerm.toLowerCase();
    const textOk = !term || s.action.toLowerCase().includes(term) || s.cat.toLowerCase().includes(term) || keysToText(s.keys).toLowerCase().includes(term);
    return appOk && textOk;
  });

  document.getElementById('stats').textContent = `Showing ${filtered.length} of ${SHORTCUTS.length} shortcuts`;

  const groups = {};
  filtered.forEach(s => {
    const key = s.app + '|' + s.cat;
    if (!groups[key]) groups[key] = { app: s.app, cat: s.cat, items: [] };
    groups[key].items.push(s);
  });

  const appOrder = ['vscode', 'chrome', 'mac'];
  const appLabels = { vscode: 'VS Code', chrome: 'Chrome', mac: 'Mac' };
  const appIcons = { vscode: '🟦', chrome: '🔵', mac: '🍎' };

  const output = document.getElementById('output');
  if (!filtered.length) {
    output.innerHTML = '<div class="empty">No shortcuts found. Try a different search term.</div>';
    return;
  }

  let html = '';
  const sorted = Object.values(groups).sort((a, b) => {
    const ai = appOrder.indexOf(a.app), bi = appOrder.indexOf(b.app);
    if (ai !== bi) return ai - bi;
    return a.cat.localeCompare(b.cat);
  });

  sorted.forEach(g => {
    html += `<div class="category-section">
      <div class="category-title">${appIcons[g.app]} ${appLabels[g.app]} — ${g.cat}</div>
      <div class="shortcuts-grid">`;
    g.items.forEach(s => {
      const keysText = keysToText(s.keys);
      html += `<div class="shortcut-card">
        <div class="sc-keys">${renderKeys(s.keys)}</div>
        <div class="sc-info">
          <div class="sc-action">${s.action}</div>
        </div>
        <button class="copy-btn" onclick="copy(this,'${keysText.replace(/'/g,"\\'")}')">Copy</button>
      </div>`;
    });
    html += `</div></div>`;
  });
  output.innerHTML = html;
}

function copy(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1200);
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

document.getElementById('appFilter').addEventListener('click', e => {
  const btn = e.target.closest('[data-app]');
  if (!btn) return;
  activeApp = btn.dataset.app;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

render();
</script>
