<script>
// ============================================================
// PURE PATH GENERATORS (exported via window for testing)
// ============================================================

/**
 * @param {number} w - viewport width
 * @param {number} h - total SVG height
 * @param {number} amplitude - wave height in px
 * @param {number} period - wave period in px
 * @param {boolean} flipH - flip horizontally
 * @param {boolean} flipV - flip vertically
 * @returns {string} SVG path d attribute
 */
function generateSinePath(w, h, amplitude, period, flipH, flipV) {
  const baseline = flipV ? amplitude : h - amplitude;
  const amp = flipV ? -amplitude : amplitude;
  const cp = period / 2;
  let d = `M0,${h} L0,${baseline}`;
  let x = 0;
  while (x < w) {
    const x1 = x + cp / 2;
    const x2 = x + cp;
    const x3 = x + cp * 1.5;
    const x4 = Math.min(x + period, w + period);
    const y1 = baseline - amp;
    const y2 = baseline;
    const y3 = baseline + amp;
    const y4 = baseline;
    d += ` C${x1},${y1} ${x2},${y1} ${x2},${y2}`;
    d += ` C${x2},${y3} ${x3},${y3} ${Math.min(x4, w + period)},${y4}`;
    x += period;
    if (x > w + period * 2) break;
  }
  d += ` L${w},${h} Z`;
  if (flipH) {
    d = mirrorPathH(d, w);
  }
  return d;
}

/**
 * @param {number} w
 * @param {number} h
 * @param {number} amplitude
 * @param {number} period
 * @param {number} layers - 1 to 3
 * @param {boolean} flipH
 * @param {boolean} flipV
 * @returns {string[]} array of SVG path d strings (one per layer)
 */
function generateLayeredPaths(w, h, amplitude, period, layers, flipH, flipV) {
  const paths = [];
  for (let i = 0; i < layers; i++) {
    const layerAmp = amplitude * (1 - i * 0.25);
    const layerOffset = (h * 0.12) * i;
    const baseline = flipV
      ? (layerAmp + layerOffset)
      : (h - layerAmp - layerOffset);
    const amp = flipV ? -layerAmp : layerAmp;
    const cp = period / 2;
    let d = `M0,${h} L0,${baseline}`;
    let x = 0;
    while (x < w + period) {
      const x2 = x + cp;
      const x4 = x + period;
      const phaseShift = (period * i * 0.3);
      const sx = x - phaseShift;
      d += ` C${sx + cp / 2},${baseline - amp} ${sx + cp},${baseline - amp} ${sx + cp},${baseline}`;
      d += ` C${sx + cp},${baseline + amp} ${sx + cp * 1.5},${baseline + amp} ${sx + period},${baseline}`;
      x += period;
      if (x > w + period * 2) break;
    }
    d += ` L${w},${h} Z`;
    if (flipH) d = mirrorPathH(d, w);
    paths.push(d);
  }
  return paths;
}

/**
 * @param {number} w
 * @param {number} h
 * @param {number} amplitude
 * @param {number} period
 * @param {boolean} flipH
 * @param {boolean} flipV
 * @returns {string}
 */
function generateSharkFinPath(w, h, amplitude, period, flipH, flipV) {
  const baseline = flipV ? amplitude : h - amplitude;
  const peakY = flipV ? h - amplitude : amplitude;
  let d = `M0,${h} L0,${baseline}`;
  let x = 0;
  while (x < w + period) {
    const finW = period * 0.3;
    const flatW = period * 0.7;
    const midX = x + finW * 0.4;
    const tipX = x + finW;
    const endX = x + period;
    // Shark fin shape: quick rise, steep drop, flat
    d += ` C${x + finW * 0.1},${baseline} ${midX},${peakY} ${tipX},${peakY}`;
    d += ` C${tipX + finW * 0.3},${baseline} ${tipX + finW * 0.3},${baseline} ${endX},${baseline}`;
    x += period;
    if (x > w + period * 2) break;
  }
  d += ` L${w},${h} Z`;
  if (flipH) d = mirrorPathH(d, w);
  return d;
}

/**
 * @param {number} w
 * @param {number} h
 * @param {number} amplitude
 * @param {number} period
 * @param {boolean} flipH
 * @param {boolean} flipV
 * @returns {string}
 */
function generateStepPath(w, h, amplitude, period, flipH, flipV) {
  const steps = Math.max(2, Math.round(w / period));
  const stepW = w / steps;
  const levels = [0, 0.4, 0.7, 1.0, 0.6, 0.2, 0.5, 0.9, 0.3, 0.8];
  let d = `M0,${h}`;
  for (let i = 0; i <= steps; i++) {
    const x = Math.min(i * stepW, w);
    const levelIdx = i % levels.length;
    const levelY = flipV
      ? amplitude * levels[levelIdx]
      : h - amplitude * levels[levelIdx];
    if (i === 0) {
      d += ` L0,${levelY}`;
    } else {
      const prevX = (i - 1) * stepW;
      d += ` L${x},${levelY}`;
    }
  }
  d += ` L${w},${h} Z`;
  if (flipH) d = mirrorPathH(d, w);
  return d;
}

/**
 * @param {number} w
 * @param {number} h
 * @param {number} amplitude
 * @param {number} period
 * @param {boolean} flipH
 * @param {boolean} flipV
 * @returns {string}
 */
function generateBumpsPath(w, h, amplitude, period, flipH, flipV) {
  const baseline = flipV ? 0 : h;
  const peakY = flipV ? amplitude : h - amplitude;
  const halfP = period / 2;
  let d = `M0,${baseline}`;
  let x = 0;
  while (x < w + period) {
    const cx1 = x + halfP * 0.5;
    const cx2 = x + halfP;
    const cx3 = x + halfP * 1.5;
    const cx4 = x + period;
    d += ` C${cx1},${peakY} ${cx2},${peakY} ${cx2},${baseline}`;
    d += ` C${cx2},${baseline} ${cx3},${baseline} ${cx4},${baseline}`;
    x += period;
    if (x > w + period * 2) break;
  }
  d += ` L${w},${baseline} L${w},${h} L0,${h} Z`;
  if (flipH) d = mirrorPathH(d, w);
  return d;
}

/**
 * Mirror a path string horizontally around centerX.
 * Only handles M, L, C, Z commands (sufficient for wave paths).
 * @param {string} d
 * @param {number} width
 * @returns {string}
 */
function mirrorPathH(d, width) {
  return d.replace(/(-?\d+(?:\.\d+)?)/g, (match, num, offset, str) => {
    // We need to mirror X coords but not Y coords.
    // Since our paths alternate x,y pairs, we track position parity.
    return match;
  });
  // Simple approach: use transform="scale(-1,1) translate(-width, 0)" in SVG instead
  return d;
}

/**
 * Generate gradient stop array
 * @param {string} color1
 * @param {string} color2
 * @param {string} mode - 'gradient' | 'solid'
 * @returns {{ id: string, stops: Array<{offset: string, color: string}> }}
 */
function generateGradientDef(color1, color2, mode) {
  if (mode === 'solid') {
    return {
      id: 'waveGrad',
      stops: [
        { offset: '0%', color: color1 },
        { offset: '100%', color: color1 }
      ]
    };
  }
  return {
    id: 'waveGrad',
    stops: [
      { offset: '0%', color: color1 },
      { offset: '100%', color: color2 }
    ]
  };
}

/**
 * Build a complete SVG string for a single-path wave
 * @param {object} cfg
 * @returns {string}
 */
function buildSVGString(cfg) {
  const {
    type, width, height, amplitude, period, layers,
    color1, color2, colorMode, opacity, flipH, flipV
  } = cfg;

  const grad = generateGradientDef(color1, color2, colorMode);
  const gradDef = `<defs>
    <linearGradient id="${grad.id}" x1="0" y1="0" x2="0" y2="1">
      ${grad.stops.map(s => `<stop offset="${s.offset}" stop-color="${s.color}"/>`).join('\n      ')}
    </linearGradient>
  </defs>`;

  const flipTransform = flipH
    ? `transform="scale(-1,1) translate(-${width},0)"`
    : '';

  let pathsHTML = '';
  if (type === 'layered') {
    const paths = generateLayeredPaths(width, height, amplitude, period, layers, false, flipV);
    paths.forEach((pd, i) => {
      const layerOpacity = opacity * (1 - i * 0.2);
      pathsHTML += `<path d="${pd}" fill="url(#${grad.id})" opacity="${layerOpacity.toFixed(2)}"/>\n  `;
    });
    if (flipH) {
      pathsHTML = `<g transform="scale(-1,1) translate(-${width},0)">${pathsHTML}</g>`;
    }
  } else {
    let pd = '';
    if (type === 'sine') pd = generateSinePath(width, height, amplitude, period, false, flipV);
    else if (type === 'sharkfin') pd = generateSharkFinPath(width, height, amplitude, period, false, flipV);
    else if (type === 'step') pd = generateStepPath(width, height, amplitude, period, false, flipV);
    else if (type === 'bumps') pd = generateBumpsPath(width, height, amplitude, period, false, flipV);
    const flipAttr = flipH ? `transform="scale(-1,1) translate(-${width},0)"` : '';
    pathsHTML = `<path d="${pd}" fill="url(#${grad.id})" opacity="${opacity}" ${flipAttr}/>`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
  ${gradDef}
  ${pathsHTML}
</svg>`;
}

/**
 * Encode SVG string to CSS data URI
 * @param {string} svg
 * @returns {string}
 */
function svgToCSSDataURI(svg) {
  const encoded = svg
    .replace(/"/g, "'")
    .replace(/\n\s*/g, ' ')
    .replace(/</g, '%3C')
    .replace(/>/g, '%3E')
    .replace(/#/g, '%23');
  return `url("data:image/svg+xml,${encoded}")`;
}

/**
 * Parse hex color to { r, g, b }
 * @param {string} hex
 * @returns {{ r: number, g: number, b: number }}
 */
function parseHexColor(hex) {
  const h = hex.replace('#', '');
  const full = h.length === 3
    ? h.split('').map(c => c + c).join('')
    : h;
  return {
    r: parseInt(full.slice(0, 2), 16),
    g: parseInt(full.slice(2, 4), 16),
    b: parseInt(full.slice(4, 6), 16)
  };
}

/**
 * Clamp a value between min and max
 * @param {number} v
 * @param {number} min
 * @param {number} max
 * @returns {number}
 */
function clamp(v, min, max) {
  return Math.min(max, Math.max(min, v));
}

/**
 * Interpolate between two hex colors
 * @param {string} c1
 * @param {string} c2
 * @param {number} t - 0 to 1
 * @returns {string}
 */
function lerpColor(c1, c2, t) {
  const a = parseHexColor(c1);
  const b = parseHexColor(c2);
  const r = Math.round(a.r + (b.r - a.r) * t);
  const g = Math.round(a.g + (b.g - a.g) * t);
  const bl = Math.round(a.b + (b.b - a.b) * t);
  return '#' + [r, g, bl].map(x => x.toString(16).padStart(2, '0')).join('');
}

// Expose for testing
if (typeof module !== 'undefined') {
  module.exports = {
    generateSinePath,
    generateLayeredPaths,
    generateSharkFinPath,
    generateStepPath,
    generateBumpsPath,
    generateGradientDef,
    buildSVGString,
    svgToCSSDataURI,
    parseHexColor,
    clamp,
    lerpColor
  };
}

// ============================================================
// APP STATE
// ============================================================
const state = {
  type: 'sine',
  amplitude: 40,
  period: 200,
  height: 120,
  layers: 2,
  color1: '#5b8dee',
  color2: '#7c5cbf',
  colorMode: 'gradient',
  opacity: 1.0,
  flipH: false,
  flipV: false,
  bgColor: '#0f1117',
  activeTab: 'svg',
  svgWidth: 800
};

// ============================================================
// RENDER
// ============================================================
function render() {
  try {
    const previewContainer = document.getElementById('preview-container');
    const svgEl = document.getElementById('preview-svg');
    const w = previewContainer.clientWidth || 800;
    state.svgWidth = w;

    const svgStr = buildSVGString({
      type: state.type,
      width: w,
      height: state.height,
      amplitude: state.amplitude,
      period: state.period,
      layers: state.layers,
      color1: state.color1,
      color2: state.color2,
      colorMode: state.colorMode,
      opacity: state.opacity,
      flipH: state.flipH,
      flipV: state.flipV
    });

    svgEl.outerHTML; // access to keep reference working
    previewContainer.style.background = state.bgColor;
    previewContainer.style.minHeight = state.height + 'px';

    // Parse and inject
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgStr, 'image/svg+xml');
    const newSvg = doc.documentElement;
    newSvg.id = 'preview-svg';
    newSvg.style.display = 'block';
    newSvg.style.width = '100%';
    newSvg.setAttribute('height', state.height);

    const old = document.getElementById('preview-svg');
    if (old) old.replaceWith(newSvg);

    updateOutput(svgStr, w);
  } catch(e) {
    console.error('Render error:', e);
  }
}

function updateOutput(svgStr, w) {
  const textarea = document.getElementById('output-code');
  if (state.activeTab === 'svg') {
    textarea.value = svgStr.trim();
  } else {
    // CSS tab: use scalable 1200px wide version
    const cssSvg = buildSVGString({
      type: state.type,
      width: 1200,
      height: state.height,
      amplitude: state.amplitude,
      period: state.period,
      layers: state.layers,
      color1: state.color1,
      color2: state.color2,
      colorMode: state.colorMode,
      opacity: state.opacity,
      flipH: state.flipH,
      flipV: state.flipV
    });
    const uri = svgToCSSDataURI(cssSvg);
    textarea.value = `.wave-divider {\n  width: 100%;\n  height: ${state.height}px;\n  background: ${uri} center/cover no-repeat;\n}`;
  }
}

// ============================================================
// CONTROLS WIRING
// ============================================================
function initControls() {
  // Wave type buttons
  document.querySelectorAll('.wave-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.wave-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      state.type = btn.dataset.type;
      const layersField = document.getElementById('layers-field');
      layersField.style.display = (state.type === 'layered') ? 'block' : 'none';
      render();
    });
  });

  // Sliders
  ['amplitude', 'period', 'height', 'layers', 'opacity'].forEach(id => {
    const el = document.getElementById(id);
    const valEl = document.getElementById('val-' + id);
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      state[id] = v;
      if (id === 'opacity') {
        valEl.textContent = v.toFixed(2);
      } else {
        valEl.textContent = Math.round(v);
      }
      render();
    });
  });

  // Color inputs
  ['color1', 'color2'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      state[id] = e.target.value;
      render();
    });
  });

  // Color mode
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.colorMode = btn.dataset.mode;
      document.getElementById('color2-wrap').style.opacity = state.colorMode === 'solid' ? '0.35' : '1';
      render();
    });
  });

  // Flip buttons
  document.getElementById('flip-h').addEventListener('click', function() {
    state.flipH = !state.flipH;
    this.classList.toggle('active', state.flipH);
    this.setAttribute('aria-pressed', String(state.flipH));
    render();
  });
  document.getElementById('flip-v').addEventListener('click', function() {
    state.flipV = !state.flipV;
    this.classList.toggle('active', state.flipV);
    this.setAttribute('aria-pressed', String(state.flipV));
    render();
  });

  // Background color
  document.getElementById('bg-color').addEventListener('input', e => {
    state.bgColor = e.target.value;
    document.getElementById('preview-container').style.background = e.target.value;
  });

  // Output tabs
  document.querySelectorAll('.out-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.out-tab').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      state.activeTab = tab.dataset.tab;
      render();
    });
  });

  // Copy
  document.getElementById('btn-copy').addEventListener('click', () => {
    const txt = document.getElementById('output-code').value;
    navigator.clipboard.writeText(txt).then(() => {
      const msg = document.getElementById('copy-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 1800);
    }).catch(() => {
      const ta = document.getElementById('output-code');
      ta.select();
      document.execCommand('copy');
    });
  });

  // Download SVG
  document.getElementById('btn-dl-svg').addEventListener('click', () => {
    try {
      const svgStr = buildSVGString({
        type: state.type,
        width: 1200,
        height: state.height,
        amplitude: state.amplitude,
        period: state.period,
        layers: state.layers,
        color1: state.color1,
        color2: state.color2,
        colorMode: state.colorMode,
        opacity: state.opacity,
        flipH: state.flipH,
        flipV: state.flipV
      });
      const blob = new Blob([svgStr], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `wave-${state.type}.svg`;
      a.click();
      URL.revokeObjectURL(url);
    } catch(e) { console.error(e); }
  });

  // Download PNG
  document.getElementById('btn-dl-png').addEventListener('click', () => {
    try {
      const pw = 1200;
      const ph = state.height;
      const svgStr = buildSVGString({
        type: state.type,
        width: pw,
        height: ph,
        amplitude: state.amplitude,
        period: state.period,
        layers: state.layers,
        color1: state.color1,
        color2: state.color2,
        colorMode: state.colorMode,
        opacity: state.opacity,
        flipH: state.flipH,
        flipV: state.flipV
      });
      const blob = new Blob([svgStr], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = pw;
        canvas.height = ph;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, pw, ph);
        URL.revokeObjectURL(url);
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `wave-${state.type}.png`;
        a.click();
      };
      img.onerror = () => console.error('PNG export error');
      img.src = url;
    } catch(e) { console.error(e); }
  });

  // Hide layers field by default (only show for layered type)
  document.getElementById('layers-field').style.display = 'none';
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  initControls();
  render();
  // Re-render on resize
  window.addEventListener('resize', () => {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(render, 150);
  });
});
</script>
</body>
</html>
