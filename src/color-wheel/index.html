<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Theory Wheel — devnestio</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{padding:24px 32px;border-bottom:1px solid #1e2535}
h1{font-size:1.5rem;font-weight:700;color:#f8fafc}
h1 span{color:#60a5fa}
.desc{color:#94a3b8;margin-top:4px;font-size:.9rem}
.main{max-width:900px;margin:0 auto;padding:32px;display:grid;grid-template-columns:280px 1fr;gap:24px}
@media(max-width:640px){.main{grid-template-columns:1fr}}
.wheel-card{background:#141924;border:1px solid #1e2535;border-radius:10px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px}
canvas{border-radius:50%;cursor:crosshair;display:block}
.base-row{display:flex;gap:8px;align-items:center;width:100%}
.base-row label{font-size:.82rem;color:#94a3b8;flex:1}
#base-hex{width:100%;background:#1e2535;border:1px solid #334155;color:#e2e8f0;padding:8px 10px;border-radius:6px;font-size:.85rem;outline:none;font-family:monospace;text-transform:uppercase}
#base-hex:focus{border-color:#60a5fa}
.harmony-tabs{display:flex;flex-wrap:wrap;gap:6px;width:100%}
.h-tab{padding:5px 10px;border-radius:99px;border:1px solid #334155;background:#1e2535;color:#94a3b8;font-size:.78rem;cursor:pointer}
.h-tab.active{background:#2563eb;border-color:#2563eb;color:#fff}
.results-card{background:#141924;border:1px solid #1e2535;border-radius:10px;padding:20px}
.result-title{font-size:.85rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.palette{display:flex;flex-direction:column;gap:10px}
.palette-row{display:flex;gap:8px;align-items:center}
.swatch{width:52px;height:52px;border-radius:8px;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:border-color .15s}
.swatch:hover{border-color:#60a5fa}
.swatch.base-swatch{border-color:#f8fafc}
.swatch-info{flex:1}
.swatch-name{font-size:.85rem;font-weight:600;color:#e2e8f0}
.swatch-hex{font-family:monospace;font-size:.78rem;color:#60a5fa;margin:2px 0}
.swatch-hsl{font-family:monospace;font-size:.75rem;color:#64748b}
.copy-hint{font-size:.72rem;color:#64748b;margin-top:2px}
.harmony-desc{font-size:.82rem;color:#94a3b8;line-height:1.5;margin-bottom:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:8px 18px;border-radius:6px;font-size:.85rem;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.css-output{margin-top:16px}
.css-label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.css-pre{background:#0f1117;border:1px solid #1e2535;border-radius:6px;padding:10px;font-family:monospace;font-size:.78rem;color:#7dd3fc;line-height:1.6;position:relative}
.css-copy{position:absolute;top:8px;right:8px;background:#1e2535;border:1px solid #334155;color:#64748b;padding:3px 8px;border-radius:4px;font-size:.73rem;cursor:pointer}
.css-copy:hover{color:#e2e8f0;background:#334155}
</style>
</head>
<body>
<header>
  <h1>Color Theory <span>Wheel</span></h1>
  <p class="desc">Pick a base color and generate complementary, analogous, triadic, and other harmonies</p>
</header>
<div class="main">
  <div class="wheel-card">
    <canvas id="wheel" width="240" height="240"></canvas>
    <div class="base-row">
      <label>Base Color</label>
    </div>
    <input type="text" id="base-hex" value="#3B82F6" maxlength="7" spellcheck="false">
    <div class="harmony-tabs" id="harmony-tabs"></div>
  </div>
  <div class="results-card">
    <div class="result-title" id="result-title">Complementary</div>
    <div class="harmony-desc" id="harmony-desc"></div>
    <div class="palette" id="palette"></div>
    <div class="css-output">
      <div class="css-label">CSS Variables</div>
      <div class="css-pre" id="css-out"><button class="css-copy" onclick="copyCss()">Copy</button><span id="css-vars"></span></div>
    </div>
  </div>
</div>
<div class="toast" id="toast">Copied!</div>
<script>
// Color conversion
function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255;
  let g=parseInt(hex.slice(3,5),16)/255;
  let b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=(g-b)/d+(g<b?6:0);break;
      case g:h=(b-r)/d+2;break;
      default:h=(r-g)/d+4;
    }
    h/=6;
  }
  return{h:h*360,s:s*100,l:l*100};
}
function hslToHex(h,s,l){
  h=((h%360)+360)%360;
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return '#'+f(0)+f(8)+f(4);
}
function hslStr(h,s,l){return `hsl(${Math.round(h)}, ${Math.round(s)}%, ${Math.round(l)}%)`;}

const HARMONIES = [
  {key:'complementary',name:'Complementary',desc:'Two colors directly opposite on the color wheel (180° apart). Creates high contrast and visual vibration. Great for call-to-action buttons and highlights.',
   fn:(h,s,l)=>[{h,s,l,label:'Base'},{h:h+180,s,l,label:'Complement'}]},
  {key:'split',name:'Split Complementary',desc:'The base color plus two colors adjacent to its complement (150° and 210° away). High contrast with more variety than complementary.',
   fn:(h,s,l)=>[{h,s,l,label:'Base'},{h:h+150,s,l,label:'Split 1'},{h:h+210,s,l,label:'Split 2'}]},
  {key:'analogous',name:'Analogous',desc:'Three colors adjacent on the wheel (±30° and ±60°). Creates a harmonious, unified look. Common in nature.',
   fn:(h,s,l)=>[{h:h-60,s,l,label:'-60°'},{h:h-30,s,l,label:'-30°'},{h,s,l,label:'Base'},{h:h+30,s,l,label:'+30°'},{h:h+60,s,l,label:'+60°'}]},
  {key:'triadic',name:'Triadic',desc:'Three colors evenly spaced around the wheel (120° apart). Vibrant and balanced. Works well when one color dominates.',
   fn:(h,s,l)=>[{h,s,l,label:'Base'},{h:h+120,s,l,label:'Triadic 2'},{h:h+240,s,l,label:'Triadic 3'}]},
  {key:'tetradic',name:'Tetradic',desc:'Four colors evenly spaced (90° apart). Rich palette. Let one color dominate, use others as accents.',
   fn:(h,s,l)=>[{h,s,l,label:'Base'},{h:h+90,s,l,label:'+90°'},{h:h+180,s,l,label:'+180°'},{h:h+270,s,l,label:'+270°'}]},
  {key:'shades',name:'Tints & Shades',desc:'Variations of the same hue at different lightness levels. Useful for creating color scales for design systems.',
   fn:(h,s)=>[10,25,40,55,70,85].map((ll,i)=>({h,s,l:ll,label:`${i===0?'Dark':i===5?'Light':'L'+ll}`}))},
];

let activeHarmony='complementary';
let baseHex='#3B82F6';
let toastTimer;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1600);
}

function drawWheel(){
  const canvas=document.getElementById('wheel');
  const ctx=canvas.getContext('2d');
  const cx=120,cy=120,r=115;
  ctx.clearRect(0,0,240,240);
  for(let a=0;a<360;a++){
    const start=(a-0.5)*Math.PI/180;
    const end=(a+1.5)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle=`hsl(${a},100%,50%)`;
    ctx.fill();
  }
  // Center circle (white/dark)
  ctx.beginPath();ctx.arc(cx,cy,40,0,2*Math.PI);
  ctx.fillStyle='#0f1117';ctx.fill();
  // Base color dot
  const {h}=hexToHsl(baseHex);
  const bx=cx+80*Math.cos((h-90)*Math.PI/180);
  const by=cy+80*Math.sin((h-90)*Math.PI/180);
  ctx.beginPath();ctx.arc(bx,by,8,0,2*Math.PI);
  ctx.fillStyle=baseHex;ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
}

function update(){
  const hex=baseHex;
  if(!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  const {h,s,l}=hexToHsl(hex);
  drawWheel();
  const harm=HARMONIES.find(x=>x.key===activeHarmony);
  document.getElementById('result-title').textContent=harm.name;
  document.getElementById('harmony-desc').textContent=harm.desc;
  const colors=harm.fn(h,s,l);
  const palette=document.getElementById('palette');
  palette.innerHTML=colors.map((c,i)=>{
    const ch=((c.h%360)+360)%360;
    const hx=hslToHex(ch,c.s,c.l);
    const isBase=c.label==='Base'||i===0;
    return `<div class="palette-row">
      <div class="swatch${isBase?' base-swatch':''}" style="background:${hx}" onclick="copySwatch('${hx}')"></div>
      <div class="swatch-info">
        <div class="swatch-name">${c.label}</div>
        <div class="swatch-hex">${hx.toUpperCase()}</div>
        <div class="swatch-hsl">${hslStr(ch,c.s,c.l)}</div>
        <div class="copy-hint">Click swatch to copy HEX</div>
      </div>
    </div>`;
  }).join('');
  // CSS vars
  const vars=colors.map((c,i)=>{
    const ch=((c.h%360)+360)%360;
    const hx=hslToHex(ch,c.s,c.l);
    const name=c.label.toLowerCase().replace(/[^a-z0-9]/g,'-');
    return `  --color-${name}: ${hx.toUpperCase()};`;
  }).join('\n');
  document.getElementById('css-vars').textContent=`:root {\n${vars}\n}`;
}

function copySwatch(hex){
  navigator.clipboard.writeText(hex.toUpperCase());
  showToast('Copied '+hex.toUpperCase());
}
function copyCss(){
  const text=document.getElementById('css-vars').textContent;
  navigator.clipboard.writeText(text);
  showToast('CSS copied!');
}

// Wheel click
document.getElementById('wheel').addEventListener('click',e=>{
  const rect=e.target.getBoundingClientRect();
  const x=e.clientX-rect.left-120;
  const y=e.clientY-rect.top-120;
  const dist=Math.sqrt(x*x+y*y);
  if(dist>40&&dist<115){
    const angle=(Math.atan2(y,x)*180/Math.PI+90+360)%360;
    const {s,l}=hexToHsl(baseHex);
    const newHex=hslToHex(angle,Math.max(s,70),Math.min(Math.max(l,40),60));
    baseHex=newHex;
    document.getElementById('base-hex').value=newHex.toUpperCase();
    update();
  }
});

document.getElementById('base-hex').addEventListener('input',e=>{
  const v=e.target.value.trim();
  const hex=v.startsWith('#')?v:'#'+v;
  if(/^#[0-9a-fA-F]{6}$/.test(hex)){baseHex=hex;update();}
});

document.getElementById('harmony-tabs').innerHTML=HARMONIES.map(h=>`
  <button class="h-tab${h.key===activeHarmony?' active':''}" onclick="setHarmony('${h.key}')">${h.name}</button>`).join('');

function setHarmony(key){
  activeHarmony=key;
  document.querySelectorAll('.h-tab').forEach(b=>b.classList.toggle('active',b.textContent===HARMONIES.find(h=>h.key===key).name));
  update();
}

drawWheel();
update();
</script>
</body>
</html>
