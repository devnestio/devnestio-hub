<body>
<div id="privacy-banner">🔒 All processing happens in your browser. No data is sent to any server.</div>
<header>
  <span class="badge">FREE</span>
  <h1>Bitwise Calculator</h1>
  <a href="https://devnestio.pages.dev">← All Tools</a>
</header>
<main>

  <!-- Inputs -->
  <div class="card">
    <div class="card-title">Inputs</div>
    <div class="inputs-row">
      <div class="inp-group">
        <label>Operand A</label>
        <input id="inp-a" type="text" value="0xFF" oninput="recalc()" />
        <div class="base-tabs" id="base-tabs-a">
          <button class="base-tab active" data-base="auto" onclick="setBase('a','auto')">Auto</button>
          <button class="base-tab" data-base="10" onclick="setBase('a','10')">Dec</button>
          <button class="base-tab" data-base="16" onclick="setBase('a','16')">Hex</button>
          <button class="base-tab" data-base="2" onclick="setBase('a','2')">Bin</button>
          <button class="base-tab" data-base="8" onclick="setBase('a','8')">Oct</button>
        </div>
      </div>
      <div class="inp-group">
        <label>Operand B</label>
        <input id="inp-b" type="text" value="0x0F" oninput="recalc()" />
        <div class="base-tabs" id="base-tabs-b">
          <button class="base-tab active" data-base="auto" onclick="setBase('b','auto')">Auto</button>
          <button class="base-tab" data-base="10" onclick="setBase('b','10')">Dec</button>
          <button class="base-tab" data-base="16" onclick="setBase('b','16')">Hex</button>
          <button class="base-tab" data-base="2" onclick="setBase('b','2')">Bin</button>
          <button class="base-tab" data-base="8" onclick="setBase('b','8')">Oct</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Operations -->
  <div class="card">
    <div class="card-title">Operation</div>
    <div class="ops-grid" id="ops-grid">
      <button class="op-btn active" data-op="AND" onclick="setOp('AND')">AND<div class="op-sub">A &amp; B</div></button>
      <button class="op-btn" data-op="OR" onclick="setOp('OR')">OR<div class="op-sub">A | B</div></button>
      <button class="op-btn" data-op="XOR" onclick="setOp('XOR')">XOR<div class="op-sub">A ^ B</div></button>
      <button class="op-btn" data-op="NOT_A" onclick="setOp('NOT_A')">NOT A<div class="op-sub">~A</div></button>
      <button class="op-btn" data-op="NOT_B" onclick="setOp('NOT_B')">NOT B<div class="op-sub">~B</div></button>
      <button class="op-btn" data-op="NAND" onclick="setOp('NAND')">NAND<div class="op-sub">~(A&amp;B)</div></button>
      <button class="op-btn" data-op="NOR" onclick="setOp('NOR')">NOR<div class="op-sub">~(A|B)</div></button>
      <button class="op-btn" data-op="XNOR" onclick="setOp('XNOR')">XNOR<div class="op-sub">~(A^B)</div></button>
      <button class="op-btn" data-op="SHL" onclick="setOp('SHL')">SHL<div class="op-sub">A &lt;&lt; n</div></button>
      <button class="op-btn" data-op="SHR" onclick="setOp('SHR')">SHR<div class="op-sub">A &gt;&gt; n</div></button>
      <button class="op-btn" data-op="SHRA" onclick="setOp('SHRA')">SHRA<div class="op-sub">A &gt;&gt;&gt; n</div></button>
      <button class="op-btn" data-op="ROTL" onclick="setOp('ROTL')">ROTL<div class="op-sub">rotate ←</div></button>
      <button class="op-btn" data-op="ROTR" onclick="setOp('ROTR')">ROTR<div class="op-sub">rotate →</div></button>
    </div>
    <div class="shift-row" id="shift-row" style="display:none">
      <label>Shift amount (n):</label>
      <input id="shift-n" type="number" min="0" max="31" value="1" oninput="recalc()" />
      <span style="font-size:12px;color:#64748b">0–31 bits</span>
    </div>
  </div>

  <!-- Result -->
  <div class="card">
    <div class="card-title">Result</div>
    <div class="result-grid" id="result-grid">
      <span class="result-label">HEX</span>
      <span class="result-val" id="r-hex">—</span>
      <button class="result-copy" onclick="copyResult('hex')">Copy</button>
      <span class="result-label">DEC</span>
      <span class="result-val" id="r-dec">—</span>
      <button class="result-copy" onclick="copyResult('dec')">Copy</button>
      <span class="result-label">BIN</span>
      <span class="result-val" id="r-bin">—</span>
      <button class="result-copy" onclick="copyResult('bin')">Copy</button>
      <span class="result-label">OCT</span>
      <span class="result-val" id="r-oct">—</span>
      <button class="result-copy" onclick="copyResult('oct')">Copy</button>
    </div>
  </div>

  <!-- Bit viewer -->
  <div class="card">
    <div class="card-title">32-bit Viewer</div>
    <div class="mode-row">
      <span style="font-size:12px;color:#64748b">Click bits to toggle A</span>
      <button class="mode-btn active" id="view-a-btn" onclick="setBitView('a')">View A</button>
      <button class="mode-btn" id="view-r-btn" onclick="setBitView('r')">View Result</button>
    </div>
    <div class="bit-section">
      <div class="bit-indices" id="bit-indices"></div>
      <div class="bit-grid" id="bit-grid"></div>
    </div>
  </div>

  <div id="ad-slot" data-ea-publisher="devnestio" data-ea-type="image"></div>
</main>
<script>
let currentOp = 'AND';
let baseA = 'auto';
let baseB = 'auto';
let valA = 0, valB = 0, valR = 0;
let bitView = 'a';

const MASK32 = 0xFFFFFFFF;

function parseNum(str, base) {
  str = str.trim();
  if (!str) return NaN;
  if (base === 'auto') {
    if (/^0x/i.test(str)) return parseInt(str, 16);
    if (/^0b/i.test(str)) return parseInt(str.slice(2), 2);
    if (/^0o/i.test(str)) return parseInt(str.slice(2), 8);
    if (/^-?\d+$/.test(str)) return parseInt(str, 10);
    return NaN;
  }
  return parseInt(str, parseInt(base));
}

function compute(a, b, op) {
  a = a | 0;
  b = b | 0;
  const n = (parseInt(document.getElementById('shift-n').value) || 0) & 31;
  switch(op) {
    case 'AND':   return (a & b) >>> 0;
    case 'OR':    return (a | b) >>> 0;
    case 'XOR':   return (a ^ b) >>> 0;
    case 'NOT_A': return (~a) >>> 0;
    case 'NOT_B': return (~b) >>> 0;
    case 'NAND':  return (~(a & b)) >>> 0;
    case 'NOR':   return (~(a | b)) >>> 0;
    case 'XNOR':  return (~(a ^ b)) >>> 0;
    case 'SHL':   return (a << n) >>> 0;
    case 'SHR':   return (a >>> n) >>> 0;
    case 'SHRA':  return (a >> n) >>> 0;
    case 'ROTL':  { const s = n & 31; return ((a << s) | (a >>> (32 - s))) >>> 0; }
    case 'ROTR':  { const s = n & 31; return ((a >>> s) | (a << (32 - s))) >>> 0; }
    default: return 0;
  }
}

function recalc() {
  const rawA = document.getElementById('inp-a').value;
  const rawB = document.getElementById('inp-b').value;
  const a = parseNum(rawA, baseA);
  const b = parseNum(rawB, baseB);

  const inpA = document.getElementById('inp-a');
  const inpB = document.getElementById('inp-b');
  inpA.className = isNaN(a) ? 'invalid' : '';
  inpB.className = isNaN(b) ? 'invalid' : '';

  if (isNaN(a) || isNaN(b)) {
    document.getElementById('r-hex').textContent = '—';
    document.getElementById('r-dec').textContent = '—';
    document.getElementById('r-bin').textContent = '—';
    document.getElementById('r-oct').textContent = '—';
    return;
  }

  valA = a >>> 0;
  valB = b >>> 0;
  valR = compute(valA, valB, currentOp);

  document.getElementById('r-hex').textContent = '0x' + valR.toString(16).toUpperCase().padStart(8, '0');
  document.getElementById('r-dec').textContent = String(valR >>> 0);
  document.getElementById('r-bin').textContent = valR.toString(2).padStart(32, '0').match(/.{4}/g).join(' ');
  document.getElementById('r-oct').textContent = '0o' + valR.toString(8);

  renderBits(bitView === 'a' ? valA : valR);
}

function renderBits(val) {
  val = val >>> 0;
  const grid = document.getElementById('bit-grid');
  const idx = document.getElementById('bit-indices');
  grid.innerHTML = '';
  idx.innerHTML = '';

  for (let g = 0; g < 4; g++) {
    const idxGrp = document.createElement('div');
    idxGrp.className = 'bit-idx-group';
    const bitGrp = document.createElement('div');
    bitGrp.className = 'bit-group';

    for (let b = 0; b < 8; b++) {
      const bit = 31 - (g * 8 + b);
      const on = (val >>> bit) & 1;

      const idxEl = document.createElement('div');
      idxEl.className = 'bit-idx';
      idxEl.textContent = bit;
      idxGrp.appendChild(idxEl);

      const bitEl = document.createElement('div');
      bitEl.className = 'bit ' + (on ? 'on' : 'off');
      bitEl.textContent = on ? '1' : '0';
      bitEl.title = `Bit ${bit}`;
      if (bitView === 'a') {
        bitEl.onclick = () => toggleBit(bit);
      }
      bitGrp.appendChild(bitEl);
    }
    idx.appendChild(idxGrp);
    grid.appendChild(bitGrp);
  }
}

function toggleBit(bit) {
  valA ^= (1 << bit);
  const hex = '0x' + valA.toString(16).toUpperCase();
  document.getElementById('inp-a').value = hex;
  recalc();
}

function setOp(op) {
  currentOp = op;
  document.querySelectorAll('.op-btn').forEach(b => b.classList.toggle('active', b.dataset.op === op));
  const needsShift = ['SHL','SHR','SHRA','ROTL','ROTR'].includes(op);
  document.getElementById('shift-row').style.display = needsShift ? 'flex' : 'none';
  recalc();
}

function setBase(ab, base) {
  if (ab === 'a') baseA = base;
  else baseB = base;
  const container = document.getElementById('base-tabs-' + ab);
  container.querySelectorAll('.base-tab').forEach(b => b.classList.toggle('active', b.dataset.base === base));
  recalc();
}

function setBitView(v) {
  bitView = v;
  document.getElementById('view-a-btn').classList.toggle('active', v === 'a');
  document.getElementById('view-r-btn').classList.toggle('active', v === 'r');
  renderBits(v === 'a' ? valA : valR);
}

const results = {};
function copyResult(type) {
  const map = { hex: 'r-hex', dec: 'r-dec', bin: 'r-bin', oct: 'r-oct' };
  const val = document.getElementById(map[type]).textContent;
  if (val !== '—') navigator.clipboard.writeText(val);
}

recalc();
</script>
</body>
</html>
