<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Cheat Sheet — devnestio</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{padding:24px 32px;border-bottom:1px solid #1e2535}
h1{font-size:1.5rem;font-weight:700;color:#f8fafc}
h1 span{color:#60a5fa}
.desc{color:#94a3b8;margin-top:4px;font-size:.9rem}
.controls{display:flex;gap:12px;flex-wrap:wrap;padding:16px 32px;border-bottom:1px solid #1e2535;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b}
#search{width:100%;background:#1e2535;border:1px solid #334155;color:#e2e8f0;padding:8px 12px 8px 34px;border-radius:6px;font-size:.9rem;outline:none}
#search:focus{border-color:#60a5fa}
.cat-filters{display:flex;gap:8px;flex-wrap:wrap}
.cat-btn{padding:5px 12px;border-radius:99px;border:1px solid #334155;background:#1e2535;color:#94a3b8;font-size:.8rem;cursor:pointer}
.cat-btn.active,.cat-btn:hover{background:#2563eb;border-color:#2563eb;color:#fff}
.content{max-width:1000px;margin:0 auto;padding:24px 32px}
.section{margin-bottom:28px}
.section-title{font-size:.95rem;font-weight:700;color:#60a5fa;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #1e2535}
.prop-card{background:#141924;border:1px solid #1e2535;border-radius:8px;margin-bottom:10px;overflow:hidden}
.prop-card:hover{border-color:#334155}
.prop-header{display:flex;align-items:baseline;gap:12px;padding:12px 16px;border-bottom:1px solid #1e2535}
.prop-name{font-family:monospace;font-size:.9rem;color:#7dd3fc;font-weight:700}
.prop-applies{font-size:.73rem;color:#64748b;margin-left:auto}
.prop-applies span{padding:2px 7px;border-radius:99px;border:1px solid}
.applies-container{border-color:#1d4ed8;background:#1e3a5f;color:#93c5fd}
.applies-item{border-color:#7c3aed;background:#3b0764;color:#c4b5fd}
.prop-body{padding:12px 16px}
.prop-desc{font-size:.85rem;color:#94a3b8;line-height:1.5;margin-bottom:10px}
.values-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.val-chip{background:#1e2535;border:1px solid #334155;border-radius:4px;padding:3px 8px;font-family:monospace;font-size:.78rem;color:#e2e8f0;cursor:pointer}
.val-chip:hover{background:#2563eb;border-color:#2563eb;color:#fff}
.example-wrap{position:relative}
.example-label{font-size:.73rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
pre{background:#0f1117;border:1px solid #1e2535;border-radius:4px;padding:8px 10px;font-size:.8rem;overflow:auto;line-height:1.5}
code{font-family:monospace;color:#7dd3fc}
.copy-btn{position:absolute;top:20px;right:8px;background:#1e2535;border:1px solid #334155;color:#64748b;padding:3px 8px;border-radius:4px;font-size:.73rem;cursor:pointer}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.no-results{text-align:center;color:#64748b;padding:48px}
</style>
</head>
<body>
<header>
  <h1>CSS Grid <span>Cheat Sheet</span></h1>
  <p class="desc">CSS Grid Layout properties — container and item, with values and examples</p>
</header>
<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search properties…">
  </div>
  <div class="cat-filters" id="cats"></div>
</div>
<div class="content" id="content"></div>
<script>
const PROPS = [
  {cat:'Container',name:'display',applies:'container',
   desc:'Defines a grid formatting context. Use grid for block-level or inline-grid for inline.',
   values:['grid','inline-grid'],
   example:'display: grid;'},
  {cat:'Container',name:'grid-template-columns',applies:'container',
   desc:'Defines the columns of the grid. Accepts lengths, percentages, fr units, repeat(), minmax(), and auto.',
   values:['200px 1fr','repeat(3, 1fr)','repeat(auto-fill, minmax(200px, 1fr))','auto 1fr auto','none'],
   example:'grid-template-columns: repeat(3, 1fr);\ngrid-template-columns: 200px 1fr 200px;\ngrid-template-columns: repeat(auto-fill, minmax(200px, 1fr));'},
  {cat:'Container',name:'grid-template-rows',applies:'container',
   desc:'Defines the rows of the grid. Same syntax as grid-template-columns.',
   values:['auto','100px 1fr','repeat(3, minmax(100px, auto))','none'],
   example:'grid-template-rows: auto;\ngrid-template-rows: 64px 1fr 48px;'},
  {cat:'Container',name:'grid-template-areas',applies:'container',
   desc:'Defines named grid areas using string syntax. Use a period (.) for empty cells.',
   values:['"header header"'],
   example:'grid-template-areas:\n  "header header"\n  "sidebar main"\n  "footer footer";'},
  {cat:'Container',name:'grid-template',applies:'container',
   desc:'Shorthand for grid-template-rows, grid-template-columns, and grid-template-areas.',
   values:['auto / 1fr 1fr','none'],
   example:'grid-template: 64px auto 48px / 200px 1fr;'},
  {cat:'Container',name:'gap',applies:'container',
   desc:'Shorthand for row-gap and column-gap. Sets spacing between grid tracks.',
   values:['16px','1rem 2rem','0'],
   example:'gap: 16px;\ngap: 1rem 2rem; /* row column */'},
  {cat:'Container',name:'row-gap',applies:'container',
   desc:'Sets spacing between rows.',
   values:['16px','1rem','normal'],
   example:'row-gap: 16px;'},
  {cat:'Container',name:'column-gap',applies:'container',
   desc:'Sets spacing between columns.',
   values:['16px','1rem','normal'],
   example:'column-gap: 24px;'},
  {cat:'Container',name:'justify-items',applies:'container',
   desc:'Aligns grid items along the inline (row) axis inside their cell.',
   values:['start','end','center','stretch'],
   example:'justify-items: center;\njustify-items: stretch; /* default */'},
  {cat:'Container',name:'align-items',applies:'container',
   desc:'Aligns grid items along the block (column) axis inside their cell.',
   values:['start','end','center','stretch','baseline'],
   example:'align-items: center;\nalign-items: stretch; /* default */'},
  {cat:'Container',name:'place-items',applies:'container',
   desc:'Shorthand for align-items and justify-items.',
   values:['center','start end','stretch'],
   example:'place-items: center; /* both axes */\nplace-items: start end; /* align justify */'},
  {cat:'Container',name:'justify-content',applies:'container',
   desc:'Aligns the grid tracks along the inline axis when the grid is smaller than the container.',
   values:['start','end','center','stretch','space-around','space-between','space-evenly'],
   example:'justify-content: space-between;\njustify-content: center;'},
  {cat:'Container',name:'align-content',applies:'container',
   desc:'Aligns the grid tracks along the block axis when the grid is smaller than the container.',
   values:['start','end','center','stretch','space-around','space-between','space-evenly'],
   example:'align-content: space-between;\nalign-content: center;'},
  {cat:'Container',name:'place-content',applies:'container',
   desc:'Shorthand for align-content and justify-content.',
   values:['center','space-between start'],
   example:'place-content: center;\nplace-content: space-between start;'},
  {cat:'Container',name:'grid-auto-columns',applies:'container',
   desc:'Specifies the size of implicitly created columns.',
   values:['auto','200px','minmax(100px, 1fr)','1fr'],
   example:'grid-auto-columns: 200px;\ngrid-auto-columns: minmax(100px, 1fr);'},
  {cat:'Container',name:'grid-auto-rows',applies:'container',
   desc:'Specifies the size of implicitly created rows.',
   values:['auto','100px','minmax(80px, auto)'],
   example:'grid-auto-rows: 100px;\ngrid-auto-rows: minmax(80px, auto);'},
  {cat:'Container',name:'grid-auto-flow',applies:'container',
   desc:'Controls how auto-placed items fill the grid. dense packs items to fill holes.',
   values:['row','column','row dense','column dense'],
   example:'grid-auto-flow: row; /* default */\ngrid-auto-flow: column dense;'},
  {cat:'Item',name:'grid-column',applies:'item',
   desc:'Shorthand for grid-column-start and grid-column-end. Determines item\'s column placement.',
   values:['1 / 3','1 / -1','span 2','auto'],
   example:'grid-column: 1 / 3;\ngrid-column: 1 / -1; /* full width */\ngrid-column: span 2;'},
  {cat:'Item',name:'grid-row',applies:'item',
   desc:'Shorthand for grid-row-start and grid-row-end. Determines item\'s row placement.',
   values:['1 / 3','2 / span 2','auto'],
   example:'grid-row: 1 / 3;\ngrid-row: 2 / span 2;'},
  {cat:'Item',name:'grid-column-start',applies:'item',
   desc:'Sets the starting line for the item in the column direction.',
   values:['1','header-start','span 2','auto'],
   example:'grid-column-start: 2;\ngrid-column-start: header-start;'},
  {cat:'Item',name:'grid-column-end',applies:'item',
   desc:'Sets the ending line for the item in the column direction.',
   values:['3','-1','span 2','auto'],
   example:'grid-column-end: -1; /* to last line */\ngrid-column-end: span 2;'},
  {cat:'Item',name:'grid-row-start',applies:'item',
   desc:'Sets the starting line for the item in the row direction.',
   values:['1','2','auto'],
   example:'grid-row-start: 2;'},
  {cat:'Item',name:'grid-row-end',applies:'item',
   desc:'Sets the ending line for the item in the row direction.',
   values:['3','-1','span 2','auto'],
   example:'grid-row-end: span 2;'},
  {cat:'Item',name:'grid-area',applies:'item',
   desc:'Assigns an item to a named grid area, or is a shorthand for row-start / col-start / row-end / col-end.',
   values:['header','sidebar','1 / 1 / 3 / 3'],
   example:'grid-area: header; /* use named area */\ngrid-area: 1 / 1 / 3 / -1; /* r-start/c-start/r-end/c-end */'},
  {cat:'Item',name:'justify-self',applies:'item',
   desc:'Overrides justify-items for this item specifically.',
   values:['start','end','center','stretch'],
   example:'justify-self: center;\njustify-self: end;'},
  {cat:'Item',name:'align-self',applies:'item',
   desc:'Overrides align-items for this item specifically.',
   values:['start','end','center','stretch','baseline'],
   example:'align-self: start;\nalign-self: center;'},
  {cat:'Item',name:'place-self',applies:'item',
   desc:'Shorthand for align-self and justify-self.',
   values:['center','start end'],
   example:'place-self: center;\nplace-self: start end;'},
  {cat:'Functions',name:'repeat()',applies:'container',
   desc:'Repeats track definitions. Use auto-fill or auto-fit with minmax() for responsive grids.',
   values:['repeat(3, 1fr)','repeat(auto-fill, minmax(200px, 1fr))','repeat(auto-fit, minmax(200px, 1fr))'],
   example:'/* Fixed columns */\ngrid-template-columns: repeat(4, 1fr);\n/* Responsive */\ngrid-template-columns: repeat(auto-fill, minmax(200px, 1fr));'},
  {cat:'Functions',name:'minmax()',applies:'container',
   desc:'Defines a size range for a track. Minimum and maximum values.',
   values:['minmax(100px, 1fr)','minmax(200px, auto)','minmax(0, 1fr)'],
   example:'grid-template-rows: minmax(100px, auto);\ngrid-template-columns: minmax(200px, 1fr);'},
  {cat:'Functions',name:'fit-content()',applies:'container',
   desc:'Clamps the track size to a maximum. Equivalent to min(max-content, max(auto, <value>)).',
   values:['fit-content(200px)','fit-content(50%)'],
   example:'grid-template-columns: fit-content(200px) 1fr;'},
];

const CATS=['All','Container','Item','Functions'];
let activeCat='All', query='';

function render(){
  const visible=PROPS.filter(p=>{
    const mc=activeCat==='All'||p.cat===activeCat;
    const mq=!query||p.name.includes(query)||p.desc.toLowerCase().includes(query)||p.values.some(v=>v.includes(query));
    return mc&&mq;
  });
  const el=document.getElementById('content');
  if(!visible.length){el.innerHTML='<div class="no-results">No results found</div>';return;}
  const byCat={};
  visible.forEach(p=>{(byCat[p.cat]=byCat[p.cat]||[]).push(p);});
  el.innerHTML=Object.entries(byCat).map(([cat,props])=>`
    <div class="section">
      <div class="section-title">${cat}</div>
      ${props.map(p=>`
        <div class="prop-card">
          <div class="prop-header">
            <span class="prop-name">${p.name}</span>
            <span class="prop-applies"><span class="${p.applies==='container'?'applies-container':'applies-item'}">${p.applies==='container'?'Container':'Item'}</span></span>
          </div>
          <div class="prop-body">
            <div class="prop-desc">${p.desc}</div>
            <div class="values-row">${p.values.map(v=>`<span class="val-chip" onclick="cp('${p.name}: ${v.split('\\n')[0]};',this)">${v}</span>`).join('')}</div>
            <div class="example-wrap">
              <div class="example-label">Example</div>
              <pre><code>${escHtml(p.example)}</code></pre>
              <button class="copy-btn" onclick="cp(${JSON.stringify(p.example)},this)">Copy</button>
            </div>
          </div>
        </div>`).join('')}
    </div>`).join('');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cp(text,btn){
  navigator.clipboard.writeText(text);
  if(btn){const orig=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=orig,1400);}
}
document.getElementById('cats').innerHTML=CATS.map(c=>`
  <button class="cat-btn${c==='All'?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
function setCat(c){
  activeCat=c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));
  render();
}
document.getElementById('search').addEventListener('input',e=>{query=e.target.value.toLowerCase();render();});
render();
</script>
</body>
</html>
