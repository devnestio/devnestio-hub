<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Array Methods Reference — devnestio</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{padding:24px 32px;border-bottom:1px solid #1e2535}
h1{font-size:1.5rem;font-weight:700;color:#f8fafc}
h1 span{color:#60a5fa}
.desc{color:#94a3b8;margin-top:4px;font-size:.9rem}
.controls{display:flex;gap:12px;flex-wrap:wrap;padding:16px 32px;border-bottom:1px solid #1e2535;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b}
#search{width:100%;background:#1e2535;border:1px solid #334155;color:#e2e8f0;padding:8px 12px 8px 34px;border-radius:6px;font-size:.9rem;outline:none}
#search:focus{border-color:#60a5fa}
.cat-filters{display:flex;gap:8px;flex-wrap:wrap}
.cat-btn{padding:5px 12px;border-radius:99px;border:1px solid #334155;background:#1e2535;color:#94a3b8;font-size:.8rem;cursor:pointer}
.cat-btn.active,.cat-btn:hover{background:#2563eb;border-color:#2563eb;color:#fff}
.content{max-width:1000px;margin:0 auto;padding:24px 32px}
.section{margin-bottom:28px}
.section-title{font-size:.95rem;font-weight:700;color:#60a5fa;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #1e2535}
.method-card{background:#141924;border:1px solid #1e2535;border-radius:8px;margin-bottom:10px;overflow:hidden}
.method-card:hover{border-color:#334155}
.method-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #1e2535}
.method-name{font-family:monospace;font-size:.9rem;color:#7dd3fc;font-weight:700;flex:1}
.badge{font-size:.72rem;padding:2px 7px;border-radius:99px;border:1px solid}
.badge-mutates{background:#450a0a;border-color:#dc2626;color:#f87171}
.badge-pure{background:#14532d;border-color:#16a34a;color:#4ade80}
.badge-es{background:#1e2535;border-color:#334155;color:#94a3b8}
.method-body{padding:12px 16px}
.method-desc{font-size:.83rem;color:#94a3b8;line-height:1.5;margin-bottom:8px}
.sig{font-family:monospace;font-size:.8rem;color:#c4b5fd;background:#1e2535;border:1px solid #334155;border-radius:4px;padding:4px 8px;margin-bottom:8px}
pre{background:#0f1117;border:1px solid #1e2535;border-radius:4px;padding:10px;font-size:.8rem;overflow:auto;line-height:1.6;position:relative}
code{font-family:monospace;color:#7dd3fc}
.copy-btn{position:absolute;top:8px;right:8px;background:#1e2535;border:1px solid #334155;color:#64748b;padding:3px 8px;border-radius:4px;font-size:.73rem;cursor:pointer}
.copy-btn:hover{color:#e2e8f0;background:#334155}
.returns{font-size:.78rem;color:#64748b;margin-top:4px}
.returns strong{color:#fb923c}
.no-results{text-align:center;color:#64748b;padding:48px}
</style>
</head>
<body>
<header>
  <h1>JavaScript <span>Array Methods</span> Reference</h1>
  <p class="desc">All built-in Array methods — mutating vs. pure, signatures, and copy-ready examples</p>
</header>
<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search methods…">
  </div>
  <div class="cat-filters" id="cats"></div>
</div>
<div class="content" id="content"></div>
<script>
const METHODS = [
  // Iteration
  {cat:'Iteration',name:'forEach()',mutates:false,es:'ES5',
   desc:'Executes a function for each element. Returns undefined — use for side effects only.',
   sig:'array.forEach((element, index, array) => void)',
   returns:'undefined',
   code:`[1, 2, 3].forEach((n, i) => console.log(i, n));
// 0 1 / 1 2 / 2 3`},
  {cat:'Iteration',name:'map()',mutates:false,es:'ES5',
   desc:'Creates a new array by applying a function to each element. Pure — does not modify the original.',
   sig:'array.map((element, index, array) => newValue)',
   returns:'new Array',
   code:`const doubled = [1, 2, 3].map(n => n * 2);
// [2, 4, 6]

const names = users.map(u => u.name);`},
  {cat:'Iteration',name:'filter()',mutates:false,es:'ES5',
   desc:'Creates a new array with elements that pass a test function.',
   sig:'array.filter((element, index, array) => boolean)',
   returns:'new Array',
   code:`const evens = [1, 2, 3, 4].filter(n => n % 2 === 0);
// [2, 4]

const active = users.filter(u => u.active);`},
  {cat:'Iteration',name:'reduce()',mutates:false,es:'ES5',
   desc:'Reduces the array to a single value by applying a function to an accumulator and each element.',
   sig:'array.reduce((accumulator, element, index, array) => value, initialValue)',
   returns:'single value',
   code:`const sum = [1, 2, 3, 4].reduce((acc, n) => acc + n, 0);
// 10

// Group by
const byCity = users.reduce((acc, u) => {
  (acc[u.city] ??= []).push(u);
  return acc;
}, {});`},
  {cat:'Iteration',name:'reduceRight()',mutates:false,es:'ES5',
   desc:'Like reduce() but processes from right to left.',
   sig:'array.reduceRight((acc, element) => value, initialValue)',
   returns:'single value',
   code:`[[1,2],[3,4],[5,6]].reduceRight((acc, arr) => acc.concat(arr), []);
// [5, 6, 3, 4, 1, 2]`},
  {cat:'Iteration',name:'flatMap()',mutates:false,es:'ES2019',
   desc:'Maps each element, then flattens the result by one level. Equivalent to map().flat().',
   sig:'array.flatMap((element, index) => value)',
   returns:'new Array',
   code:`[1, 2, 3].flatMap(n => [n, n * 2]);
// [1, 2, 2, 4, 3, 6]

['hello world', 'foo bar'].flatMap(s => s.split(' '));
// ['hello', 'world', 'foo', 'bar']`},
  // Search
  {cat:'Search',name:'find()',mutates:false,es:'ES2015',
   desc:'Returns the first element that satisfies the test function. Returns undefined if not found.',
   sig:'array.find((element, index) => boolean)',
   returns:'element | undefined',
   code:`const user = users.find(u => u.id === 42);
// { id: 42, name: 'Alice', ... } or undefined`},
  {cat:'Search',name:'findIndex()',mutates:false,es:'ES2015',
   desc:'Returns the index of the first element that satisfies the test. Returns -1 if not found.',
   sig:'array.findIndex((element, index) => boolean)',
   returns:'number (-1 if not found)',
   code:`const idx = [10, 20, 30].findIndex(n => n > 15);
// 1`},
  {cat:'Search',name:'findLast()',mutates:false,es:'ES2023',
   desc:'Like find() but searches from the end of the array.',
   sig:'array.findLast((element, index) => boolean)',
   returns:'element | undefined',
   code:`[1, 2, 3, 4].findLast(n => n % 2 === 0);
// 4`},
  {cat:'Search',name:'indexOf()',mutates:false,es:'ES5',
   desc:'Returns the first index of a value (strict equality). Returns -1 if not found.',
   sig:'array.indexOf(searchValue, fromIndex?)',
   returns:'number (-1 if not found)',
   code:`['a', 'b', 'c', 'b'].indexOf('b');    // 1
['a', 'b', 'c', 'b'].indexOf('b', 2); // 3`},
  {cat:'Search',name:'includes()',mutates:false,es:'ES2016',
   desc:'Returns true if the array contains the value (handles NaN correctly).',
   sig:'array.includes(searchValue, fromIndex?)',
   returns:'boolean',
   code:`[1, 2, 3].includes(2);   // true
[1, NaN].includes(NaN); // true (unlike indexOf!)`},
  {cat:'Search',name:'some()',mutates:false,es:'ES5',
   desc:'Returns true if at least one element satisfies the test.',
   sig:'array.some((element, index) => boolean)',
   returns:'boolean',
   code:`[1, 2, 3].some(n => n > 2);  // true
users.some(u => u.role === 'admin');`},
  {cat:'Search',name:'every()',mutates:false,es:'ES5',
   desc:'Returns true if all elements satisfy the test. Returns true for empty arrays.',
   sig:'array.every((element, index) => boolean)',
   returns:'boolean',
   code:`[2, 4, 6].every(n => n % 2 === 0); // true
[].every(n => n > 0);               // true (vacuous truth)`},
  // Transformation
  {cat:'Transformation',name:'flat()',mutates:false,es:'ES2019',
   desc:'Creates a new array with sub-arrays flattened to the specified depth.',
   sig:'array.flat(depth?)',
   returns:'new Array',
   code:`[1, [2, [3, [4]]]].flat();    // [1, 2, [3, [4]]]
[1, [2, [3, [4]]]].flat(2);  // [1, 2, 3, [4]]
[1, [2, [3, [4]]]].flat(Infinity); // [1, 2, 3, 4]`},
  {cat:'Transformation',name:'slice()',mutates:false,es:'ES3',
   desc:'Returns a shallow copy of a portion. Negative indices count from the end.',
   sig:'array.slice(start?, end?)',
   returns:'new Array',
   code:`[0, 1, 2, 3, 4].slice(1, 3);  // [1, 2]
[0, 1, 2, 3, 4].slice(-2);    // [3, 4]
[0, 1, 2, 3, 4].slice();      // shallow copy`},
  {cat:'Transformation',name:'concat()',mutates:false,es:'ES3',
   desc:'Returns a new array combining the original with other arrays or values.',
   sig:'array.concat(...values)',
   returns:'new Array',
   code:`[1, 2].concat([3, 4]);        // [1, 2, 3, 4]
[1, 2].concat([3], 4, [5]);  // [1, 2, 3, 4, 5]`},
  {cat:'Transformation',name:'join()',mutates:false,es:'ES1',
   desc:'Joins all elements into a string. Default separator is comma.',
   sig:'array.join(separator?)',
   returns:'string',
   code:`['a', 'b', 'c'].join('-');  // 'a-b-c'
['a', 'b', 'c'].join('');   // 'abc'`},
  {cat:'Transformation',name:'reverse()',mutates:true,es:'ES1',
   desc:'Reverses the array IN PLACE and returns the same array. Mutates! Use toReversed() for pure version.',
   sig:'array.reverse()',
   returns:'same Array (mutated)',
   code:`const arr = [1, 2, 3];
arr.reverse();   // arr is now [3, 2, 1]

// Pure alternative (ES2023)
const rev = [1, 2, 3].toReversed(); // [3, 2, 1]`},
  {cat:'Transformation',name:'sort()',mutates:true,es:'ES1',
   desc:'Sorts IN PLACE. Without a comparator, sorts as strings. Mutates! Use toSorted() for pure version.',
   sig:'array.sort((a, b) => number)',
   returns:'same Array (mutated)',
   code:`[3, 1, 2].sort();                    // [1, 2, 3] (numeric by luck)
[10, 9, 2].sort();                   // [10, 2, 9] (string sort!)
[10, 9, 2].sort((a, b) => a - b);   // [2, 9, 10]

// Pure alternative (ES2023)
const sorted = arr.toSorted((a, b) => a - b);`},
  // Mutating
  {cat:'Mutating',name:'push()',mutates:true,es:'ES3',
   desc:'Adds one or more elements to the END of the array. Returns new length.',
   sig:'array.push(...elements)',
   returns:'new length',
   code:`const arr = [1, 2];
arr.push(3, 4);  // arr is [1, 2, 3, 4], returns 4`},
  {cat:'Mutating',name:'pop()',mutates:true,es:'ES3',
   desc:'Removes and returns the last element. Returns undefined if empty.',
   sig:'array.pop()',
   returns:'removed element',
   code:`const arr = [1, 2, 3];
arr.pop();  // returns 3, arr is [1, 2]`},
  {cat:'Mutating',name:'shift()',mutates:true,es:'ES3',
   desc:'Removes and returns the first element. Returns undefined if empty. O(n) operation.',
   sig:'array.shift()',
   returns:'removed element',
   code:`const arr = [1, 2, 3];
arr.shift(); // returns 1, arr is [2, 3]`},
  {cat:'Mutating',name:'unshift()',mutates:true,es:'ES3',
   desc:'Adds one or more elements to the BEGINNING of the array. Returns new length.',
   sig:'array.unshift(...elements)',
   returns:'new length',
   code:`const arr = [3, 4];
arr.unshift(1, 2);  // arr is [1, 2, 3, 4], returns 4`},
  {cat:'Mutating',name:'splice()',mutates:true,es:'ES3',
   desc:'Removes/replaces/inserts elements at a position. Most powerful mutating method.',
   sig:'array.splice(start, deleteCount?, ...items)',
   returns:'Array of removed elements',
   code:`const arr = [1, 2, 3, 4];
arr.splice(1, 2);       // removes 2,3 → arr = [1, 4]
arr.splice(1, 0, 'a');  // insert → arr = [1, 'a', 4]
arr.splice(1, 1, 'b');  // replace → arr = [1, 'b', 4]`},
  {cat:'Mutating',name:'fill()',mutates:true,es:'ES2015',
   desc:'Fills a range of elements with a static value. Mutates the original array.',
   sig:'array.fill(value, start?, end?)',
   returns:'same Array (mutated)',
   code:`new Array(5).fill(0);         // [0, 0, 0, 0, 0]
[1, 2, 3, 4].fill(0, 1, 3); // [1, 0, 0, 4]`},
  {cat:'Mutating',name:'copyWithin()',mutates:true,es:'ES2015',
   desc:'Copies part of the array to another location within it. Mutates in place.',
   sig:'array.copyWithin(target, start?, end?)',
   returns:'same Array (mutated)',
   code:`[1, 2, 3, 4, 5].copyWithin(0, 3); // [4, 5, 3, 4, 5]`},
  // Creation
  {cat:'Creation',name:'Array.from()',mutates:false,es:'ES2015',
   desc:'Creates an array from iterables (strings, Sets, Maps, NodeLists) or array-like objects.',
   sig:'Array.from(iterable, mapFn?)',
   returns:'new Array',
   code:`Array.from('hello');           // ['h','e','l','l','o']
Array.from({length: 5}, (_, i) => i); // [0,1,2,3,4]
Array.from(new Set([1,2,2,3]));        // [1,2,3]`},
  {cat:'Creation',name:'Array.of()',mutates:false,es:'ES2015',
   desc:'Creates an array from its arguments. Avoids the single-number bug of new Array().',
   sig:'Array.of(...elements)',
   returns:'new Array',
   code:`Array.of(3);     // [3]   ← not new Array(3) which gives []
new Array(3);    // [,,]  ← 3 empty slots!`},
  {cat:'Creation',name:'Array.isArray()',mutates:false,es:'ES5',
   desc:'Returns true if the argument is an Array. More reliable than instanceof for cross-realm checks.',
   sig:'Array.isArray(value)',
   returns:'boolean',
   code:`Array.isArray([1, 2, 3]); // true
Array.isArray('hello');   // false
Array.isArray({length:2}); // false`},
  {cat:'Creation',name:'entries() / keys() / values()',mutates:false,es:'ES2015',
   desc:'Returns iterators for index-value pairs, keys (indices), or values respectively.',
   sig:'array.entries() | array.keys() | array.values()',
   returns:'Iterator',
   code:`for (const [i, v] of ['a','b','c'].entries()) {
  console.log(i, v); // 0 a / 1 b / 2 c
}

[...['a','b','c'].keys()];   // [0, 1, 2]
[...['a','b','c'].values()]; // ['a', 'b', 'c']`},
];

const CATS=['All',...new Set(METHODS.map(m=>m.cat))];
let activeCat='All', query='';

function render(){
  const visible=METHODS.filter(m=>{
    const mc=activeCat==='All'||m.cat===activeCat;
    const mq=!query||m.name.toLowerCase().includes(query)||m.desc.toLowerCase().includes(query)||m.cat.toLowerCase().includes(query);
    return mc&&mq;
  });
  const el=document.getElementById('content');
  if(!visible.length){el.innerHTML='<div class="no-results">No results</div>';return;}
  const byCat={};
  visible.forEach(m=>{(byCat[m.cat]=byCat[m.cat]||[]).push(m);});
  el.innerHTML=Object.entries(byCat).map(([cat,items])=>`
    <div class="section">
      <div class="section-title">${cat}</div>
      ${items.map(m=>`
        <div class="method-card">
          <div class="method-header">
            <span class="method-name">${m.name}</span>
            <span class="badge badge-${m.mutates?'mutates':'pure'}">${m.mutates?'mutates':'pure'}</span>
            <span class="badge badge-es">${m.es}</span>
          </div>
          <div class="method-body">
            <div class="method-desc">${m.desc}</div>
            <div class="sig">${escHtml(m.sig)}</div>
            <pre><code>${escHtml(m.code)}</code><button class="copy-btn" onclick="cp(${JSON.stringify(m.code)},this)">Copy</button></pre>
            <div class="returns">Returns: <strong>${m.returns}</strong></div>
          </div>
        </div>`).join('')}
    </div>`).join('');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cp(text,btn){
  navigator.clipboard.writeText(text);
  const orig=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=orig,1400);
}
document.getElementById('cats').innerHTML=CATS.map(c=>`
  <button class="cat-btn${c==='All'?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
function setCat(c){
  activeCat=c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));
  render();
}
document.getElementById('search').addEventListener('input',e=>{query=e.target.value.toLowerCase();render();});
render();
</script>
</body>
</html>
