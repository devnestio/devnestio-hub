<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Tester — devnestio</title>
  <meta name="description" content="Live regex tester with match highlighting, capture groups, and flag toggles (g/i/m/s). Test regular expressions in real time, browser-only.">
  <link rel="canonical" href="https://devnestio.pages.dev/regex-tester/">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --text: #c9d1d9; --muted: #8b949e;
      --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; }
    header nav a { color: var(--accent); text-decoration: none; font-size: 0.9em; }
    header h1 { font-size: 1.6rem; margin: 8px 0 4px; }
    header p { color: var(--muted); font-size: 0.95em; }
    main { flex: 1; padding: 24px; max-width: 900px; width: 100%; margin: 0 auto; }
    footer { background: var(--surface); border-top: 1px solid var(--border); padding: 16px 24px; text-align: center; color: var(--muted); font-size: 0.875rem; }
    footer a { color: var(--accent); text-decoration: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }

    /* Pattern row */
    .pattern-row { display: flex; align-items: center; gap: 0; margin-bottom: 14px; }
    .pattern-slash { font-family: 'SF Mono', monospace; font-size: 1.2em; color: var(--muted); padding: 0 4px; }
    .pattern-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 11px 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 1em;
      transition: border-color .15s; outline: none; border-radius: 8px 0 0 8px;
    }
    .pattern-input:focus { border-color: var(--accent); }
    .pattern-input.error { border-color: var(--red); }
    .flags-end { background: var(--surface2); border: 1px solid var(--border); border-left: none; border-radius: 0 8px 8px 0; padding: 11px 8px; display: flex; gap: 4px; align-items: center; }
    .flag-btn {
      font-family: 'SF Mono', monospace; font-size: 0.9em; font-weight: 700;
      width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .flag-btn:hover { border-color: var(--accent); color: var(--accent); }
    .flag-btn.on { background: rgba(88,166,255,.15); border-color: var(--accent); color: var(--accent); }
    .err-msg { font-size: 0.82em; color: var(--red); min-height: 18px; margin-bottom: 6px; }

    /* Test string */
    .test-label { font-size: 0.8em; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 6px; }
    .test-area {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 12px 14px; border-radius: 8px; font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9em; resize: vertical; min-height: 120px; transition: border-color .15s; outline: none;
    }
    .test-area:focus { border-color: var(--accent); }

    /* Highlighted output */
    .highlight-wrap {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9em;
      line-height: 1.7; white-space: pre-wrap; word-break: break-all; min-height: 60px;
      margin-top: 12px;
    }
    .m0 { background: rgba(88,166,255,.25); border-bottom: 2px solid var(--accent); border-radius: 2px; }
    .m1 { background: rgba(63,185,80,.2); border-bottom: 2px solid var(--green); border-radius: 2px; }
    .m2 { background: rgba(210,153,34,.2); border-bottom: 2px solid var(--yellow); border-radius: 2px; }
    .m3 { background: rgba(188,140,255,.2); border-bottom: 2px solid var(--purple); border-radius: 2px; }
    .m4 { background: rgba(248,81,73,.2); border-bottom: 2px solid var(--red); border-radius: 2px; }

    /* Stats bar */
    .stats { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin: 12px 0 0; font-size: 0.82em; color: var(--muted); }
    .stats strong { color: var(--text); }

    /* Groups */
    .groups-title { font-size: 0.8em; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 10px; }
    .match-list { display: flex; flex-direction: column; gap: 8px; }
    .match-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .match-header { font-size: 0.78em; color: var(--muted); margin-bottom: 6px; }
    .match-full { font-family: 'SF Mono', monospace; font-size: 0.88em; color: var(--text); margin-bottom: 6px; word-break: break-all; }
    .match-full mark { background: rgba(88,166,255,.25); color: var(--text); border-bottom: 2px solid var(--accent); border-radius: 2px; padding: 0; }
    .groups-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .group-chip { font-family: 'SF Mono', monospace; font-size: 0.8em; padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); }
    .group-idx { color: var(--muted); margin-right: 4px; }
    .group-val { color: var(--accent); }
  </style>
</head>
<body>
<header>
  <nav><a href="https://devnestio.pages.dev">← devnestio</a></nav>
  <h1>Regex Tester</h1>
  <p>Live regular expression tester — highlights matches, shows capture groups, flag toggles (g/i/m/s).</p>
</header>
<main>
  <div class="card">
    <div class="pattern-row">
      <span class="pattern-slash">/</span>
      <input class="pattern-input" id="pattern" type="text" placeholder="(\w+)@([\w.-]+\.\w{2,})" spellcheck="false" autocomplete="off" autocorrect="off">
      <span class="pattern-slash">/</span>
      <div class="flags-end">
        <button class="flag-btn on" data-flag="g" title="Global — find all matches">g</button>
        <button class="flag-btn on" data-flag="i" title="Case-insensitive">i</button>
        <button class="flag-btn" data-flag="m" title="Multiline — ^ and $ match line boundaries">m</button>
        <button class="flag-btn" data-flag="s" title="Dot-all — . matches newlines too">s</button>
      </div>
    </div>
    <div class="err-msg" id="err-msg"></div>

    <div class="test-label">Test string</div>
    <textarea class="test-area" id="test-str" placeholder="Type or paste your test string here…&#10;&#10;Matches will be highlighted below in real time."></textarea>

    <div id="stats" class="stats" style="display:none"></div>
    <div class="highlight-wrap" id="highlight" style="display:none"></div>
  </div>

  <div class="card" id="groups-card" style="display:none">
    <div class="groups-title">Matches &amp; Capture Groups</div>
    <div class="match-list" id="match-list"></div>
  </div>
</main>
<footer>
  <a href="https://www.buymeacoffee.com/devnestio" target="_blank" rel="noopener">☕ Buy me a coffee</a>
  &nbsp;·&nbsp;
  <a href="https://devnestio.pages.dev">devnestio — free developer tools</a>
</footer>
<script>
const flags = { g: true, i: true, m: false, s: false };

function getFlags() {
  return Object.entries(flags).filter(([,v])=>v).map(([k])=>k).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function run() {
  const pat = document.getElementById('pattern').value;
  const str = document.getElementById('test-str').value;
  const errEl = document.getElementById('err-msg');
  const highlightEl = document.getElementById('highlight');
  const statsEl = document.getElementById('stats');
  const groupsCard = document.getElementById('groups-card');
  const matchList = document.getElementById('match-list');
  const patEl = document.getElementById('pattern');

  errEl.textContent = '';
  patEl.classList.remove('error');

  if (!pat) {
    highlightEl.style.display = 'none';
    statsEl.style.display = 'none';
    groupsCard.style.display = 'none';
    return;
  }

  let re;
  try {
    const f = getFlags().replace('g','') + 'g';
    re = new RegExp(pat, f);
  } catch(e) {
    patEl.classList.add('error');
    errEl.textContent = e.message;
    highlightEl.style.display = 'none';
    statsEl.style.display = 'none';
    groupsCard.style.display = 'none';
    return;
  }

  const matches = [];
  let m;
  let safety = 0;
  re.lastIndex = 0;
  while ((m = re.exec(str)) !== null && safety++ < 2000) {
    matches.push({
      index: m.index,
      end: m.index + m[0].length,
      full: m[0],
      groups: Array.from(m).slice(1),
      named: m.groups || {}
    });
    if (m[0].length === 0) re.lastIndex++;
  }

  statsEl.style.display = '';
  statsEl.innerHTML = `
    <span><strong>${matches.length}</strong> match${matches.length !== 1 ? 'es' : ''}</span>
    <span><strong>${str.length}</strong> chars</span>
    <span>flags: <strong>/${getFlags() || '(none)'}/</strong></span>
    ${flags.g ? '' : '<span style="color:var(--yellow)">⚠ g flag off — only first match</span>'}
  `;

  if (str.length > 0) {
    highlightEl.style.display = '';
    let html = '';
    let pos = 0;
    matches.forEach((mx, i) => {
      if (mx.index > pos) html += esc(str.slice(pos, mx.index));
      html += `<mark class="m${i % 5}">${esc(mx.full)}</mark>`;
      pos = mx.end;
    });
    if (pos < str.length) html += esc(str.slice(pos));
    highlightEl.innerHTML = html || `<span style="color:var(--muted)">${esc(str)}</span>`;
  } else {
    highlightEl.style.display = 'none';
  }

  if (matches.length === 0) {
    groupsCard.style.display = 'none';
    return;
  }
  groupsCard.style.display = '';
  matchList.innerHTML = '';

  const limit = Math.min(matches.length, 50);
  for (let i = 0; i < limit; i++) {
    const mx = matches[i];
    const item = document.createElement('div');
    item.className = 'match-item';

    const hasGroups = mx.groups.length > 0 || Object.keys(mx.named).length > 0;
    let groupsHtml = '';
    if (hasGroups) {
      groupsHtml = '<div class="groups-grid">';
      mx.groups.forEach((g, gi) => {
        const val = g === undefined ? '<em style="color:var(--muted)">undefined</em>' : esc(g);
        groupsHtml += `<div class="group-chip"><span class="group-idx">$${gi + 1}</span><span class="group-val">${val}</span></div>`;
      });
      Object.entries(mx.named).forEach(([name, val]) => {
        const v = val === undefined ? '<em style="color:var(--muted)">undefined</em>' : esc(val);
        groupsHtml += `<div class="group-chip"><span class="group-idx">?&lt;${esc(name)}&gt;</span><span class="group-val">${v}</span></div>`;
      });
      groupsHtml += '</div>';
    }

    item.innerHTML = `
      <div class="match-header">Match ${i + 1} &middot; index ${mx.index}–${mx.end} &middot; length ${mx.full.length}</div>
      <div class="match-full"><mark>${esc(mx.full)}</mark></div>
      ${hasGroups ? groupsHtml : '<span style="font-size:.8em;color:var(--muted)">No capture groups</span>'}
    `;
    matchList.appendChild(item);
  }

  if (matches.length > 50) {
    const more = document.createElement('div');
    more.style.cssText = 'text-align:center;padding:10px;color:var(--muted);font-size:.85em';
    more.textContent = `… and ${matches.length - 50} more matches`;
    matchList.appendChild(more);
  }
}

document.getElementById('pattern').addEventListener('input', run);
document.getElementById('test-str').addEventListener('input', run);

document.querySelectorAll('.flag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.flag;
    flags[f] = !flags[f];
    btn.classList.toggle('on', flags[f]);
    run();
  });
});

document.getElementById('pattern').value = '(\\w+)@([\\w.-]+\\.\\w{2,})';
document.getElementById('test-str').value = 'Contact us at hello@devnestio.com or support@example.org\nInvalid: notanemail, @nouser.com, missing@';
run();
</script>
</body>
</html>
