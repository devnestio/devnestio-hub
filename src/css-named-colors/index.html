<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>CSS Named Colors Reference — devnestio</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{padding:24px 32px;border-bottom:1px solid #1e2535}
h1{font-size:1.5rem;font-weight:700;color:#f8fafc}
h1 span{color:#60a5fa}
.desc{color:#94a3b8;margin-top:4px;font-size:.9rem}
.controls{display:flex;gap:12px;flex-wrap:wrap;padding:20px 32px;border-bottom:1px solid #1e2535;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b}
#search{width:100%;background:#1e2535;border:1px solid #334155;color:#e2e8f0;padding:8px 12px 8px 34px;border-radius:6px;font-size:.9rem;outline:none}
#search:focus{border-color:#60a5fa}
.sort-wrap{display:flex;gap:8px;align-items:center}
.sort-wrap label{font-size:.85rem;color:#94a3b8}
select{background:#1e2535;border:1px solid #334155;color:#e2e8f0;padding:8px 12px;border-radius:6px;font-size:.85rem;cursor:pointer;outline:none}
select:focus{border-color:#60a5fa}
.count{font-size:.85rem;color:#64748b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:24px 32px}
.color-card{border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid #1e2535;transition:transform .15s,border-color .15s;position:relative}
.color-card:hover{transform:translateY(-2px);border-color:#334155}
.swatch{height:80px}
.card-info{background:#1a2030;padding:8px 10px}
.color-name{font-size:.8rem;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.color-hex{font-size:.75rem;color:#94a3b8;font-family:monospace;margin-top:2px}
.copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:8px 20px;border-radius:6px;font-size:.85rem;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
.copy-toast.show{opacity:1}
.detail-panel{position:fixed;top:0;right:-340px;width:320px;height:100vh;background:#141924;border-left:1px solid #1e2535;padding:24px;overflow-y:auto;transition:right .25s;z-index:100}
.detail-panel.open{right:0}
.panel-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer}
.panel-close:hover{color:#e2e8f0}
.panel-swatch{height:120px;border-radius:8px;margin-bottom:20px}
.panel-name{font-size:1.2rem;font-weight:700;margin-bottom:16px}
.value-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e2535}
.value-label{font-size:.8rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.value-data{font-family:monospace;font-size:.85rem;color:#60a5fa}
.copy-btn{background:#1e2535;border:1px solid #334155;color:#94a3b8;padding:3px 8px;border-radius:4px;font-size:.75rem;cursor:pointer}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.no-results{grid-column:1/-1;text-align:center;color:#64748b;padding:48px;font-size:.9rem}
</style>
</head>
<body>
<header>
  <h1>CSS <span>Named Colors</span> Reference</h1>
  <p class="desc">All 148 CSS named colors — search, sort, and copy values</p>
</header>
<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search color name or hex…" autocomplete="off">
  </div>
  <div class="sort-wrap">
    <label>Sort by</label>
    <select id="sort">
      <option value="name">Name</option>
      <option value="hue">Hue</option>
      <option value="lightness">Lightness</option>
      <option value="saturation">Saturation</option>
    </select>
  </div>
  <span class="count" id="count">147 colors</span>
</div>
<div class="grid" id="grid"></div>
<div class="detail-panel" id="panel">
  <button class="panel-close" id="panel-close">✕</button>
  <div class="panel-swatch" id="panel-swatch"></div>
  <div class="panel-name" id="panel-name"></div>
  <div id="panel-values"></div>
</div>
<div class="copy-toast" id="toast">Copied!</div>
<script>
const COLORS = [
  ['aliceblue','#f0f8ff'],['antiquewhite','#faebd7'],['aqua','#00ffff'],['aquamarine','#7fffd4'],
  ['azure','#f0ffff'],['beige','#f5f5dc'],['bisque','#ffe4c4'],['black','#000000'],
  ['blanchedalmond','#ffebcd'],['blue','#0000ff'],['blueviolet','#8a2be2'],['brown','#a52a2a'],
  ['burlywood','#deb887'],['cadetblue','#5f9ea0'],['chartreuse','#7fff00'],['chocolate','#d2691e'],
  ['coral','#ff7f50'],['cornflowerblue','#6495ed'],['cornsilk','#fff8dc'],['crimson','#dc143c'],
  ['cyan','#00ffff'],['darkblue','#00008b'],['darkcyan','#008b8b'],['darkgoldenrod','#b8860b'],
  ['darkgray','#a9a9a9'],['darkgreen','#006400'],['darkgrey','#a9a9a9'],['darkkhaki','#bdb76b'],
  ['darkmagenta','#8b008b'],['darkolivegreen','#556b2f'],['darkorange','#ff8c00'],['darkorchid','#9932cc'],
  ['darkred','#8b0000'],['darksalmon','#e9967a'],['darkseagreen','#8fbc8f'],['darkslateblue','#483d8b'],
  ['darkslategray','#2f4f4f'],['darkslategrey','#2f4f4f'],['darkturquoise','#00ced1'],['darkviolet','#9400d3'],
  ['deeppink','#ff1493'],['deepskyblue','#00bfff'],['dimgray','#696969'],['dimgrey','#696969'],
  ['dodgerblue','#1e90ff'],['firebrick','#b22222'],['floralwhite','#fffaf0'],['forestgreen','#228b22'],
  ['fuchsia','#ff00ff'],['gainsboro','#dcdcdc'],['ghostwhite','#f8f8ff'],['gold','#ffd700'],
  ['goldenrod','#daa520'],['gray','#808080'],['green','#008000'],['greenyellow','#adff2f'],
  ['grey','#808080'],['honeydew','#f0fff0'],['hotpink','#ff69b4'],['indianred','#cd5c5c'],
  ['indigo','#4b0082'],['ivory','#fffff0'],['khaki','#f0e68c'],['lavender','#e6e6fa'],
  ['lavenderblush','#fff0f5'],['lawngreen','#7cfc00'],['lemonchiffon','#fffacd'],['lightblue','#add8e6'],
  ['lightcoral','#f08080'],['lightcyan','#e0ffff'],['lightgoldenrodyellow','#fafad2'],['lightgray','#d3d3d3'],
  ['lightgreen','#90ee90'],['lightgrey','#d3d3d3'],['lightpink','#ffb6c1'],['lightsalmon','#ffa07a'],
  ['lightseagreen','#20b2aa'],['lightskyblue','#87cefa'],['lightslategray','#778899'],['lightslategrey','#778899'],
  ['lightsteelblue','#b0c4de'],['lightyellow','#ffffe0'],['lime','#00ff00'],['limegreen','#32cd32'],
  ['linen','#faf0e6'],['magenta','#ff00ff'],['maroon','#800000'],['mediumaquamarine','#66cdaa'],
  ['mediumblue','#0000cd'],['mediumorchid','#ba55d3'],['mediumpurple','#9370db'],['mediumseagreen','#3cb371'],
  ['mediumslateblue','#7b68ee'],['mediumspringgreen','#00fa9a'],['mediumturquoise','#48d1cc'],['mediumvioletred','#c71585'],
  ['midnightblue','#191970'],['mintcream','#f5fffa'],['mistyrose','#ffe4e1'],['moccasin','#ffe4b5'],
  ['navajowhite','#ffdead'],['navy','#000080'],['oldlace','#fdf5e6'],['olive','#808000'],
  ['olivedrab','#6b8e23'],['orange','#ffa500'],['orangered','#ff4500'],['orchid','#da70d6'],
  ['palegoldenrod','#eee8aa'],['palegreen','#98fb98'],['paleturquoise','#afeeee'],['palevioletred','#db7093'],
  ['papayawhip','#ffefd5'],['peachpuff','#ffdab9'],['peru','#cd853f'],['pink','#ffc0cb'],
  ['plum','#dda0dd'],['powderblue','#b0e0e6'],['purple','#800080'],['rebeccapurple','#663399'],
  ['red','#ff0000'],['rosybrown','#bc8f8f'],['royalblue','#4169e1'],['saddlebrown','#8b4513'],
  ['salmon','#fa8072'],['sandybrown','#f4a460'],['seagreen','#2e8b57'],['seashell','#fff5ee'],
  ['sienna','#a0522d'],['silver','#c0c0c0'],['skyblue','#87ceeb'],['slateblue','#6a5acd'],
  ['slategray','#708090'],['slategrey','#708090'],['snow','#fffafa'],['springgreen','#00ff7f'],
  ['steelblue','#4682b4'],['tan','#d2b48c'],['teal','#008080'],['thistle','#d8bfd8'],
  ['tomato','#ff6347'],['turquoise','#40e0d0'],['violet','#ee82ee'],['wheat','#f5deb3'],
  ['white','#ffffff'],['whitesmoke','#f5f5f5'],['yellow','#ffff00'],['yellowgreen','#9acd32']
];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=(g-b)/d+(g<b?6:0);break;
      case g:h=(b-r)/d+2;break;
      default:h=(r-g)/d+4;
    }
    h/=6;
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function isDark(hex) {
  const {r,g,b}=hexToRgb(hex);
  return (0.299*r+0.587*g+0.114*b)<128;
}

const allColors = COLORS.map(([name,hex])=>{
  const {r,g,b}=hexToRgb(hex);
  const hsl=rgbToHsl(r,g,b);
  return {name,hex,r,g,b,...hsl};
});

let filtered=[...allColors];
const grid=document.getElementById('grid');
const panel=document.getElementById('panel');
const toast=document.getElementById('toast');
let toastTimer;

function showToast(msg='Copied!'){
  toast.textContent=msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),1800);
}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>showToast('Copied '+text));
}

function hexToRgbStr(hex){
  const {r,g,b}=hexToRgb(hex);
  return `rgb(${r}, ${g}, ${b})`;
}
function hexToHslStr(c){
  return `hsl(${c.h}, ${c.s}%, ${c.l}%)`;
}

function openPanel(c){
  document.getElementById('panel-swatch').style.background=c.hex;
  document.getElementById('panel-name').textContent=c.name;
  document.getElementById('panel-name').style.color=isDark(c.hex)?'#f8fafc':'#1e293b';
  const vals=[
    ['Name',c.name],
    ['HEX',c.hex.toUpperCase()],
    ['RGB',hexToRgbStr(c.hex)],
    ['HSL',hexToHslStr(c)],
  ];
  document.getElementById('panel-values').innerHTML=vals.map(([label,val])=>`
    <div class="value-row">
      <span class="value-label">${label}</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="value-data">${val}</span>
        <button class="copy-btn" onclick="copyText('${val.replace(/'/g,"\\'")}')" >Copy</button>
      </div>
    </div>`).join('');
  panel.classList.add('open');
}

function render(){
  const sort=document.getElementById('sort').value;
  let list=[...filtered];
  if(sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='hue') list.sort((a,b)=>a.h-b.h||a.s-b.s||a.l-b.l);
  else if(sort==='lightness') list.sort((a,b)=>a.l-b.l);
  else if(sort==='saturation') list.sort((a,b)=>b.s-a.s||a.h-b.h);

  document.getElementById('count').textContent=`${list.length} color${list.length!==1?'s':''}`;
  if(!list.length){
    grid.innerHTML='<div class="no-results">No colors found</div>';
    return;
  }
  grid.innerHTML=list.map(c=>`
    <div class="color-card" onclick='openPanel(${JSON.stringify(c)})'>
      <div class="swatch" style="background:${c.hex}"></div>
      <div class="card-info">
        <div class="color-name">${c.name}</div>
        <div class="color-hex">${c.hex.toUpperCase()}</div>
      </div>
    </div>`).join('');
}

document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  filtered=q?allColors.filter(c=>c.name.includes(q)||c.hex.includes(q)):allColors;
  render();
});
document.getElementById('sort').addEventListener('change',render);
document.getElementById('panel-close').addEventListener('click',()=>panel.classList.remove('open'));
render();
</script>
</body>
</html>
