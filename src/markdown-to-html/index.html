<body>
<div id="privacy-banner">🔒 All processing happens in your browser. No data is sent to any server.</div>
<header>
  <span class="badge">FREE</span>
  <h1>Markdown to HTML Converter</h1>
  <a href="https://devnestio.pages.dev">← All Tools</a>
</header>
<main>
  <div class="toolbar">
    <button class="btn btn-secondary" onclick="loadSample()">Sample</button>
    <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    <div class="opt"><input type="checkbox" id="opt-auto" checked /><label for="opt-auto">Auto-convert</label></div>
    <div class="opt"><input type="checkbox" id="opt-sanitize" checked /><label for="opt-sanitize">Sanitize HTML</label></div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="btn-tab active" id="tab-preview" onclick="switchTab('preview')">Preview</button>
      <button class="btn-tab" id="tab-html" onclick="switchTab('html')">HTML Source</button>
    </div>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="panel-hdr">
        <h2>Markdown</h2>
        <span id="md-stats" style="font-size:11px;color:#64748b"></span>
      </div>
      <textarea id="md-input" spellcheck="false" placeholder="Type or paste Markdown here…"></textarea>
    </div>

    <div class="panel">
      <div class="panel-hdr">
        <h2 id="out-label">Preview</h2>
        <span id="html-stats" style="font-size:11px;color:#64748b"></span>
      </div>
      <div id="preview-pane" class="preview-pane"></div>
      <div id="html-pane" class="html-output" style="display:none"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="copyHtml()">Copy HTML</button>
        <button class="btn btn-secondary" onclick="downloadHtml()">Download .html</button>
        <button class="btn btn-primary" onclick="convert()">Convert</button>
      </div>
    </div>
  </div>

  <div id="ad-slot" data-ea-publisher="devnestio" data-ea-type="image"></div>
</main>
<script>
// ── Markdown parser ───────────────────────────────────────────
function parseMarkdown(md) {
  // Escape HTML first (for sanitize mode)
  const sanitize = document.getElementById('opt-sanitize').checked;

  function esc(s) {
    if (!sanitize) return s;
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Store code blocks to protect from inline processing
  const codeBlocks = [];
  md = md.replace(/```(\w*)\n([\s\S]*?)```/gm, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code class="language-${esc(lang)}">${esc(code.trimEnd())}</code></pre>`);
    return `\x00CODE${idx}\x00`;
  });
  md = md.replace(/`([^`]+)`/g, (_, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<code>${esc(code)}</code>`);
    return `\x00CODE${idx}\x00`;
  });

  // Tables
  md = md.replace(/^\|(.+)\|\s*\n\|[-| :]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (_, header, rows) => {
    const ths = header.split('|').filter(Boolean).map(h => `<th>${inlineFormat(h.trim(), esc)}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(Boolean).map(d => `<td>${inlineFormat(d.trim(), esc)}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>\n`;
  });

  const lines = md.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    // Code block placeholder
    if (/^\x00CODE\d+\x00$/.test(line.trim())) {
      out.push(line.trim());
      i++; continue;
    }

    // Headings
    const hm = line.match(/^(#{1,6})\s+(.+)/);
    if (hm) { out.push(`<h${hm[1].length}>${inlineFormat(hm[2], esc)}</h${hm[1].length}>`); i++; continue; }

    // HR
    if (/^[-*_]{3,}\s*$/.test(line)) { out.push('<hr>'); i++; continue; }

    // Blockquote
    if (line.startsWith('> ')) {
      const bqLines = [];
      while (i < lines.length && lines[i].startsWith('> ')) { bqLines.push(lines[i].slice(2)); i++; }
      out.push(`<blockquote><p>${bqLines.map(l => inlineFormat(l, esc)).join('<br>')}</p></blockquote>`);
      continue;
    }

    // Unordered list
    if (/^[-*+] /.test(line)) {
      const items = [];
      while (i < lines.length && /^[-*+] /.test(lines[i])) { items.push(`<li>${inlineFormat(lines[i].slice(2), esc)}</li>`); i++; }
      out.push(`<ul>${items.join('')}</ul>`);
      continue;
    }

    // Ordered list
    if (/^\d+\. /.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\. /.test(lines[i])) { items.push(`<li>${inlineFormat(lines[i].replace(/^\d+\. /, ''), esc)}</li>`); i++; }
      out.push(`<ol>${items.join('')}</ol>`);
      continue;
    }

    // Empty line
    if (line.trim() === '') { i++; continue; }

    // Paragraph / table passthrough
    if (line.startsWith('<')) { out.push(line); i++; continue; }

    // Paragraph
    const pLines = [];
    while (i < lines.length && lines[i].trim() && !lines[i].match(/^#{1,6} /) && !lines[i].startsWith('> ') && !/^[-*+] /.test(lines[i]) && !/^\d+\. /.test(lines[i]) && !/^[-*_]{3,}\s*$/.test(lines[i]) && !lines[i].startsWith('<')) {
      pLines.push(lines[i]); i++;
    }
    if (pLines.length) out.push(`<p>${pLines.map(l => inlineFormat(l, esc)).join(' ')}</p>`);
  }

  let html = out.join('\n');
  // Restore code blocks
  html = html.replace(/\x00CODE(\d+)\x00/g, (_, idx) => codeBlocks[parseInt(idx)]);
  return html;
}

function inlineFormat(text, esc) {
  // Protect code spans already handled above
  text = esc(text);
  // Bold+italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.+?)_/g, '<em>$1</em>');
  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Images
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  // Auto-links
  text = text.replace(/(?<![="'])(https?:\/\/[^\s<>"']+)/g, '<a href="$1">$1</a>');
  // Line break
  text = text.replace(/  $/g, '<br>');
  return text;
}

// ── Syntax highlight HTML output ──────────────────────────────
function highlightHtml(html) {
  return html
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/&lt;(\/?[\w]+)/g, '<span class="h-tag">&lt;$1</span>')
    .replace(/(\w+)=(&quot;[^&]*&quot;)/g, '<span class="h-attr">$1</span>=<span class="h-val">$2</span>');
}

let rawHtml = '';
let currentTab = 'preview';

function convert() {
  const md = document.getElementById('md-input').value;
  rawHtml = parseMarkdown(md);
  document.getElementById('md-stats').textContent = md.split('\n').length + ' lines';
  document.getElementById('html-stats').textContent = rawHtml.length.toLocaleString() + ' chars';
  if (currentTab === 'preview') {
    document.getElementById('preview-pane').innerHTML = rawHtml;
  } else {
    document.getElementById('html-pane').innerHTML = highlightHtml(rawHtml);
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-preview').className = 'btn-tab' + (tab === 'preview' ? ' active' : '');
  document.getElementById('tab-html').className = 'btn-tab' + (tab === 'html' ? ' active' : '');
  document.getElementById('preview-pane').style.display = tab === 'preview' ? '' : 'none';
  document.getElementById('html-pane').style.display = tab === 'html' ? '' : 'none';
  document.getElementById('out-label').textContent = tab === 'preview' ? 'Preview' : 'HTML Source';
  if (rawHtml) {
    if (tab === 'preview') document.getElementById('preview-pane').innerHTML = rawHtml;
    else document.getElementById('html-pane').innerHTML = highlightHtml(rawHtml);
  }
}

function copyHtml() {
  if (rawHtml) navigator.clipboard.writeText(rawHtml);
}

function downloadHtml() {
  if (!rawHtml) return;
  const full = `<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="UTF-8"><title>Document</title></head>\n<body>\n${rawHtml}\n</body>\n</html>`;
  const blob = new Blob([full], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'document.html';
  a.click();
}

function clearAll() {
  document.getElementById('md-input').value = '';
  document.getElementById('preview-pane').innerHTML = '';
  document.getElementById('html-pane').innerHTML = '';
  rawHtml = '';
  document.getElementById('md-stats').textContent = '';
  document.getElementById('html-stats').textContent = '';
}

const SAMPLE_MD = `# Welcome to Markdown Preview

## Features

**Bold text**, *italic text*, and ~~strikethrough~~ are all supported.

### Code

Inline \`code\` and fenced blocks:

\`\`\`js
function hello(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

### Links & Images

[DevNestio](https://devnestio.pages.dev) — browser-only tools.

### Lists

- Unordered item 1
- Unordered item 2
  - Nested (manual indent)
- Unordered item 3

1. Ordered item one
2. Ordered item two
3. Ordered item three

### Blockquote

> "The best tool is the one that doesn't get in your way."

### Table

| Name     | Type   | Required |
|----------|--------|----------|
| title    | string | Yes      |
| body     | string | No       |
| tags     | array  | No       |

---

*Made with DevNestio*`;

function loadSample() {
  document.getElementById('md-input').value = SAMPLE_MD;
  convert();
}

// Auto-convert
let debounce;
document.getElementById('md-input').addEventListener('input', () => {
  clearTimeout(debounce);
  if (document.getElementById('opt-auto').checked) {
    debounce = setTimeout(convert, 300);
  }
  const md = document.getElementById('md-input').value;
  document.getElementById('md-stats').textContent = md.split('\n').length + ' lines';
});

loadSample();
</script>
</body>
