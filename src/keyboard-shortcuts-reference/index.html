  const keysArr = isMac ? (shortcut.keysMac || shortcut.keys) : shortcut.keys;
  if (keysArr.length === 1) {
    return `<div class="kbd-group">${keysArr[0].map(k => `<kbd>${k}</kbd>`).join(' + ')}</div>`;
  }
  return keysArr.map(ks => `<div class="kbd-group">${ks.map(k => `<kbd>${k}</kbd>`).join(' + ')}</div>`).join('<span class="sep">or</span>');
}

function copyKeys(shortcut) {
  const keysArr = isMac ? (shortcut.keysMac || shortcut.keys) : shortcut.keys;
  const text = keysArr.map(ks => ks.join('+')).join(' or ');
  navigator.clipboard?.writeText(text).catch(() => {});
}

function getAppBadgeClass(app) {
  const map = { vscode:'badge-vscode', chrome:'badge-chrome', mac:'badge-mac', windows:'badge-windows' };
  return map[app] || '';
}
function getAppLabel(app) {
  const map = { vscode:'VS Code', chrome:'Chrome', mac:'macOS', windows:'Windows' };
  return map[app] || app;
}

function buildSections(data) {
  const sectionsEl = document.getElementById('sections');
  sectionsEl.innerHTML = '';
  const grouped = {};
  data.forEach(s => {
    const key = s.app + '||' + s.cat;
    if (!grouped[key]) grouped[key] = { app: s.app, cat: s.cat, items: [] };
    grouped[key].items.push(s);
  });
  if (Object.keys(grouped).length === 0) {
    document.getElementById('noResults').style.display = 'block';
    return;
  }
  document.getElementById('noResults').style.display = 'none';
  Object.values(grouped).forEach(g => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-head">
        <span class="app-badge ${getAppBadgeClass(g.app)}">${getAppLabel(g.app)}</span>
        <h2>${g.cat}</h2>
      </div>
      <table class="shortcut-table">
        ${g.items.map(s => `<tr><td>${s.desc}</td><td>${renderKeys(s)}</td></tr>`).join('')}
      </table>`;
    sec.querySelectorAll('tr').forEach((tr, i) => {
      tr.style.cursor = 'pointer';
      tr.title = 'Click to copy shortcut';
      tr.onclick = () => copyKeys(g.items[i]);
    });
    sectionsEl.appendChild(sec);
  });
}

function filterAll() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = DATA.filter(s => {
    if (currentApp !== 'all' && s.app !== currentApp) return false;
    if (!q) return true;
    return s.desc.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q) ||
      s.keys.some(ks => ks.some(k => k.toLowerCase().includes(q)));
  });
  buildSections(filtered);
  document.getElementById('resultsCount').textContent = `${filtered.length} shortcut${filtered.length !== 1 ? 's' : ''} shown`;
}

function setApp(app) {
  currentApp = app;
  document.querySelectorAll('#appChips .chip').forEach(c => {
    c.classList.toggle('active', c.dataset.app === app);
  });
  filterAll();
}

filterAll();
</script>
