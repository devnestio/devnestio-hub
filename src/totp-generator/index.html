<body>

<div id="privacy-banner">🔒 All processing happens in your browser. The secret key never leaves your device.</div>

<header>
  <span class="badge">FREE</span>
  <h1>TOTP Generator</h1>
  <a href="https://devnestio.pages.dev">← All Tools</a>
</header>

<main>
  <div class="panel">
    <h2>Configuration</h2>
    <label>Secret Key (Base32)</label>
    <div style="display:flex;gap:8px">
      <input type="text" id="secret" value="JBSWY3DPEHPK3PXP" placeholder="Base32 secret (e.g. from QR code)" style="flex:1" />
      <button class="btn btn-secondary" onclick="generateSecret()" style="white-space:nowrap;font-size:12px">Generate</button>
    </div>

    <label>Algorithm</label>
    <select id="algorithm">
      <option value="SHA-1">SHA-1 (most common)</option>
      <option value="SHA-256">SHA-256</option>
      <option value="SHA-512">SHA-512</option>
    </select>

    <label>Digits</label>
    <select id="digits">
      <option value="6" selected>6 digits</option>
      <option value="8">8 digits</option>
    </select>

    <label>Period</label>
    <select id="period">
      <option value="30" selected>30 seconds</option>
      <option value="60">60 seconds</option>
    </select>
  </div>

  <div class="panel">
    <h2>Current Code</h2>
    <div class="code-display">
      <div class="code-digits" id="code-display">------</div>
      <div class="code-label">Time-based one-time password (TOTP)</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="time-remaining" id="time-remaining">—</div>
    <button class="btn btn-primary copy-btn" onclick="copyCode()">Copy Code</button>
    <div id="status" class="status" style="display:none"></div>
  </div>

  <div class="panel">
    <h2>Key Info</h2>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Algorithm</div>
        <div class="info-value" id="info-alg">HMAC-SHA1</div>
      </div>
      <div class="info-item">
        <div class="info-label">Counter (T)</div>
        <div class="info-value" id="info-counter">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">Secret (hex)</div>
        <div class="info-value" id="info-hex" style="word-break:break-all;font-size:11px">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">Secret length</div>
        <div class="info-value" id="info-len">—</div>
      </div>
    </div>
  </div>

  <div id="ad-slot" data-ea-publisher="devnestio" data-ea-type="image"></div>
</main>

<script>
// Base32 decode
const BASE32_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

function base32Decode(s) {
  s = s.toUpperCase().replace(/=+$/, '').replace(/[^A-Z2-7]/g, '');
  let bits = 0, value = 0;
  const output = [];
  for (const c of s) {
    const idx = BASE32_CHARS.indexOf(c);
    if (idx < 0) continue;
    value = (value << 5) | idx;
    bits += 5;
    if (bits >= 8) {
      output.push((value >>> (bits - 8)) & 0xff);
      bits -= 8;
    }
  }
  return new Uint8Array(output);
}

function base32Encode(bytes) {
  let bits = 0, value = 0, out = '';
  for (const b of bytes) {
    value = (value << 8) | b;
    bits += 8;
    while (bits >= 5) {
      out += BASE32_CHARS[(value >>> (bits - 5)) & 31];
      bits -= 5;
    }
  }
  if (bits > 0) out += BASE32_CHARS[(value << (5 - bits)) & 31];
  return out;
}

// TOTP
async function generateTOTP(secret, algorithm, digits, period) {
  const keyBytes = base32Decode(secret);
  if (keyBytes.length === 0) throw new Error('Invalid Base32 secret');

  const counter = Math.floor(Date.now() / 1000 / period);
  const counterBuf = new Uint8Array(8);
  let tmp = counter;
  for (let i = 7; i >= 0; i--) {
    counterBuf[i] = tmp & 0xff;
    tmp = Math.floor(tmp / 256);
  }

  const key = await crypto.subtle.importKey(
    'raw', keyBytes,
    { name: 'HMAC', hash: algorithm },
    false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, counterBuf);
  const hash = new Uint8Array(sig);

  const offset = hash[hash.length - 1] & 0x0f;
  const code = (
    ((hash[offset] & 0x7f) << 24) |
    (hash[offset + 1] << 16) |
    (hash[offset + 2] << 8) |
    hash[offset + 3]
  ) % Math.pow(10, digits);

  return { code: String(code).padStart(digits, '0'), counter };
}

function generateSecret() {
  const bytes = new Uint8Array(20);
  crypto.getRandomValues(bytes);
  document.getElementById('secret').value = base32Encode(bytes);
  update();
}

let timer = null;

async function update() {
  const secret = document.getElementById('secret').value.trim();
  const algorithm = document.getElementById('algorithm').value;
  const digits = parseInt(document.getElementById('digits').value, 10);
  const period = parseInt(document.getElementById('period').value, 10);

  const now = Math.floor(Date.now() / 1000);
  const remaining = period - (now % period);
  const progress = (remaining / period) * 100;
  const expiring = remaining <= 5;

  try {
    const { code, counter } = await generateTOTP(secret, algorithm, digits, period);

    const display = document.getElementById('code-display');
    display.textContent = code;
    display.className = 'code-digits' + (expiring ? ' expiring' : '');

    const bar = document.getElementById('progress-bar');
    bar.style.width = progress + '%';
    bar.className = 'progress-bar' + (expiring ? ' expiring' : '');

    document.getElementById('time-remaining').textContent = `Refreshes in ${remaining}s`;
    document.getElementById('info-counter').textContent = counter;

    const keyBytes = base32Decode(secret);
    const hexStr = Array.from(keyBytes).map(b => b.toString(16).padStart(2,'0')).join('');
    document.getElementById('info-hex').textContent = hexStr;
    document.getElementById('info-len').textContent = keyBytes.length + ' bytes (' + (keyBytes.length * 8) + ' bits)';
    document.getElementById('info-alg').textContent = 'HMAC-' + algorithm.replace('-', '');

    const status = document.getElementById('status');
    status.style.display = 'none';
  } catch(e) {
    document.getElementById('code-display').textContent = '------';
    const status = document.getElementById('status');
    status.style.display = '';
    status.className = 'status err';
    status.textContent = '❌ ' + e.message;
  }
}

function copyCode() {
  const code = document.getElementById('code-display').textContent;
  if (code && code !== '------') {
    navigator.clipboard.writeText(code).then(() => {
      const status = document.getElementById('status');
      status.style.display = '';
      status.className = 'status ok';
      status.textContent = '📋 Code copied!';
    });
  }
}

// Start ticking
function tick() {
  update();
  clearInterval(timer);
  timer = setInterval(update, 1000);
}

['secret','algorithm','digits','period'].forEach(id => {
  document.getElementById(id).addEventListener('input', tick);
  document.getElementById(id).addEventListener('change', tick);
});

tick();
</script>
</body>
</html>
