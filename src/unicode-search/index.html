const BLOCKS = [
  [0x0000,0x007F,'Basic Latin'],[0x0080,0x00FF,'Latin-1 Supplement'],
  [0x0100,0x017F,'Latin Extended-A'],[0x0180,0x024F,'Latin Extended-B'],
  [0x0370,0x03FF,'Greek and Coptic'],[0x0400,0x04FF,'Cyrillic'],
  [0x2000,0x206F,'General Punctuation'],[0x2070,0x209F,'Superscripts and Subscripts'],
  [0x20A0,0x20CF,'Currency Symbols'],[0x2100,0x214F,'Letterlike Symbols'],
  [0x2190,0x21FF,'Arrows'],[0x2200,0x22FF,'Mathematical Operators'],
  [0x2300,0x23FF,'Miscellaneous Technical'],[0x2500,0x257F,'Box Drawing'],
  [0x2580,0x259F,'Block Elements'],[0x25A0,0x25FF,'Geometric Shapes'],
  [0x2600,0x26FF,'Miscellaneous Symbols'],[0x2700,0x27BF,'Dingbats'],
  [0x1F300,0x1F5FF,'Miscellaneous Symbols and Pictographs'],
  [0x1F600,0x1F64F,'Emoticons'],[0x1F680,0x1F6FF,'Transport and Map Symbols'],
];

function getBlock(cp) {
  for (const [lo, hi, name] of BLOCKS) {
    if (cp >= lo && cp <= hi) return name;
  }
  return 'Unknown Block';
}

function getName(cp) {
  const entry = NAMED.find(([c]) => c === cp);
  return entry ? entry[1] : null;
}

function toUtf8Bytes(cp) {
  if (cp < 0x80) return [cp];
  if (cp < 0x800) return [0xC0|(cp>>6), 0x80|(cp&0x3F)];
  if (cp < 0x10000) return [0xE0|(cp>>12), 0x80|((cp>>6)&0x3F), 0x80|(cp&0x3F)];
  return [0xF0|(cp>>18), 0x80|((cp>>12)&0x3F), 0x80|((cp>>6)&0x3F), 0x80|(cp&0x3F)];
}

function toUtf16(cp) {
  if (cp < 0x10000) return [cp];
  const c = cp - 0x10000;
  return [0xD800 + (c >> 10), 0xDC00 + (c & 0x3FF)];
}

function cpToHtmlEntity(cp) {
  const named = { 34:'&quot;', 38:'&amp;', 60:'&lt;', 62:'&gt;', 160:'&nbsp;' };
  if (named[cp]) return named[cp];
  return `&#x${cp.toString(16).toUpperCase()};`;
}

function parseInput(raw) {
  const s = raw.trim();
  if (!s) return null;

  // U+XXXX or u+XXXX
  const uMatch = s.match(/^[Uu]\+([0-9a-fA-F]{1,6})$/);
  if (uMatch) return parseInt(uMatch[1], 16);

  // 0xXXXX
  const hexMatch = s.match(/^0[xX]([0-9a-fA-F]{1,6})$/);
  if (hexMatch) return parseInt(hexMatch[1], 16);

  // Decimal number
  if (/^\d+$/.test(s)) return parseInt(s, 10);

  // Single character (possibly emoji = 2 code units)
  if ([...s].length === 1) return s.codePointAt(0);

  return null; // name search
}

function renderDetail(cp) {
  const char = String.fromCodePoint(cp);
  const name = getName(cp) || `U+${cp.toString(16).toUpperCase().padStart(4,'0')}`;
  const utf8 = toUtf8Bytes(cp).map(b => b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
  const utf16 = toUtf16(cp).map(u => u.toString(16).toUpperCase().padStart(4,'0')).join(' ');
  const entity = cpToHtmlEntity(cp);
  const jsEsc = cp < 0x10000 ? `\\u${cp.toString(16).toUpperCase().padStart(4,'0')}` : `\\u{${cp.toString(16).toUpperCase()}}`;
  const cssEsc = `\\${cp.toString(16).toUpperCase()}`;
  const block = getBlock(cp);

  document.getElementById('char-display').textContent = char;
  const grid = document.getElementById('info-grid');
  const rows = [
    ['Character', char, char],
    ['Codepoint', `U+${cp.toString(16).toUpperCase().padStart(4,'0')}`, `U+${cp.toString(16).toUpperCase().padStart(4,'0')}`],
    ['Decimal', cp.toString(), cp.toString()],
    ['Name', name, name],
    ['Block', block, block],
    ['UTF-8', utf8, utf8],
    ['UTF-16', utf16, utf16],
    ['HTML Entity', entity, entity],
    ['JS Escape', jsEsc, jsEsc],
    ['CSS Escape', cssEsc, cssEsc],
  ];
  grid.innerHTML = rows.map(([label, display, copy]) =>
    `<span class="info-label">${label}</span><span class="info-val">${display.replace(/</g,'&lt;')}</span><button class="copy-btn" onclick="navigator.clipboard.writeText(${JSON.stringify(copy)})">Copy</button>`
  ).join('');

  document.getElementById('detail-card').style.display = '';
  document.getElementById('results-card').style.display = 'none';
}

function renderNameSearch(query) {
  const q = query.toUpperCase().trim();
  if (!q) return;
  const matches = NAMED.filter(([cp, name]) => name.includes(q)).slice(0, 120);
  document.getElementById('results-title').textContent = `${matches.length} result${matches.length !== 1 ? 's' : ''} for "${query}"`;
  document.getElementById('results-grid').innerHTML = matches.map(([cp, name]) => {
    const char = String.fromCodePoint(cp);
    return `<div class="char-card" onclick="showCp(${cp})" title="${name}">
      <span class="glyph">${char}</span>
      <span class="cp">U+${cp.toString(16).toUpperCase().padStart(4,'0')}</span>
    </div>`;
  }).join('');
  document.getElementById('results-card').style.display = '';
  document.getElementById('detail-card').style.display = 'none';
}

function showCp(cp) {
  document.getElementById('search-inp').value = `U+${cp.toString(16).toUpperCase().padStart(4,'0')}`;
  renderDetail(cp);
}

function onInput() {
  const raw = document.getElementById('search-inp').value;
  const cp = parseInput(raw);
  if (cp !== null && Number.isInteger(cp) && cp >= 0 && cp <= 0x10FFFF) {
    renderDetail(cp);
  } else if (raw.trim().length > 1) {
    renderNameSearch(raw.trim());
  } else {
    document.getElementById('detail-card').style.display = 'none';
    document.getElementById('results-card').style.display = 'none';
  }
}

const QUICK = [
  [0x1F600,'😀 Grinning Face'],[0x2603,'☃ Snowman'],[0x2665,'♥ Heart'],
  [0x00A9,'© Copyright'],[0x03C0,'π Pi'],[0x221E,'∞ Infinity'],
  [0x2713,'✓ Checkmark'],[0x20AC,'€ Euro'],[0x2192,'→ Arrow'],
  [0x00C5,'Å A-Ring'],[0x1F525,'🔥 Fire'],[0x1F4BB,'💻 Laptop'],
];

document.getElementById('examples').innerHTML = QUICK.map(([cp, label]) =>
  `<span class="ex-chip" onclick="showCp(${cp})">${label}</span>`
).join('');
</script>
