    .cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .count-bar { padding: .5rem 1.5rem; font-size: .78rem; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    th { background: var(--surface); border-bottom: 1px solid var(--border); padding: .6rem 1rem; text-align: left; font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; position: sticky; top: 0; z-index: 1; }
    td { padding: .5rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: var(--surface); }
    .mime-cell { font-family: 'SFMono-Regular', Consolas, monospace; color: var(--accent); font-size: .8rem; }
    .ext-cell { font-family: monospace; color: var(--muted); font-size: .79rem; }

    .cat-image { background: #1f4e7930; color: #79c0ff; }
    .cat-audio { background: #3d2b0030; color: #d29922; }
    .cat-video { background: #1e3a4a30; color: #58a6ff; }
    .cat-text { background: #1e3a2f30; color: #3fb950; }
    .cat-application { background: #3b1f5e30; color: #d2a8ff; }
    .cat-font { background: #2e1f0030; color: #e3692c; }

const ALL_CATS = ['all','image','audio','video','text','application','font','multipart','model'];
let activeCat = 'all';
let searchVal = '';

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function dotHtml(s, title) { return `<span class="dot ${s === 'y' ? 'yes' : s === 'p' ? 'partial' : 'no'}" title="${title}"></span>`; }

function render() {
  const q = searchVal.toLowerCase();
  const tbody = document.getElementById('tbody');
  let count = 0;
  const rows = MIMES.filter(([mime, ext, cat]) => {
    if (activeCat !== 'all' && cat !== activeCat) return false;
    if (q && !mime.toLowerCase().includes(q) && !ext.toLowerCase().includes(q) && !MIMES[0][3]?.toLowerCase().includes(q)) {
      // Check description too
      const desc = mime[3] || '';
      if (!mime.toLowerCase().includes(q) && !ext.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  tbody.innerHTML = rows.map(([mime, ext, cat, desc, ch, ff, sf]) => {
    count++;
    const catClass = 'cat-badge cat-' + cat;
    const exts = ext ? ext.split(' ').map(e => `<span style="margin-right:.3rem">.${e}</span>`).join('') : '<span style="color:var(--muted)">—</span>';
    return `<tr>
      <td class="mime-cell">${escHtml(mime)}</td>
      <td class="ext-cell">${exts}</td>
      <td><span class="${catClass}">${cat}</span></td>
      <td style="font-size:.8rem;color:var(--muted)">${escHtml(desc||'')}</td>
      <td><div class="support-dots">${dotHtml(ch,'Chrome')}${dotHtml(ff,'Firefox')}${dotHtml(sf,'Safari')}</div></td>
      <td><button class="copy-btn" onclick="copyMime('${escHtml(mime)}',this)">Copy</button></td>
    </tr>`;
  }).join('');

  document.getElementById('noResults').style.display = rows.length === 0 ? 'block' : 'none';
  document.getElementById('countBar').textContent = `${rows.length} MIME type${rows.length !== 1 ? 's' : ''} shown · ● Chrome  ● Firefox  ● Safari`;
}

function copyMime(mime, btn) {
  navigator.clipboard.writeText(mime).then(() => { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); });
}

// Build category buttons
const catsEl = document.getElementById('cats');
ALL_CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === 'all' ? ' active' : '');
  btn.textContent = cat === 'all' ? 'All' : cat;
  btn.addEventListener('click', () => {
    activeCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  catsEl.appendChild(btn);
});

document.getElementById('search').addEventListener('input', e => { searchVal = e.target.value; render(); });

render();
</script>
