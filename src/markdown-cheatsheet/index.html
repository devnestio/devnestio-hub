<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Cheatsheet — devnestio</title>
  <meta name="description" content="Interactive Markdown reference with live preview. Left panel shows raw Markdown syntax, right panel renders the result instantly. No login required." />
  <link rel="canonical" href="https://devnestio.pages.dev/markdown-cheatsheet/" />
  <meta property="og:title" content="Markdown Cheatsheet — devnestio" />
  <meta property="og:description" content="Interactive Markdown cheatsheet with live preview. Edit and see rendered output instantly." />
  <meta property="og:url" content="https://devnestio.pages.dev/markdown-cheatsheet/" />
  <meta property="og:type" content="website" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .logo { font-size: 1.2rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    header h1 { font-size: 1rem; font-weight: 600; color: var(--text); }
    .toolbar { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
    .tb-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 0.78rem; font-weight: 600; border-radius: 4px; padding: 0.25rem 0.6rem; cursor: pointer; font-family: 'Courier New', monospace; }
    .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 0.2rem; }
    .editor-wrap { display: flex; flex: 1; min-height: 0; }
    .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .pane-header { padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface); }
    .pane + .pane { border-left: 1px solid var(--border); }
    #editor { flex: 1; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.7; border: none; outline: none; resize: none; padding: 1.25rem; tab-size: 2; }
    #preview { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; line-height: 1.7; }
    #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 { color: var(--text); margin: 1.2em 0 0.5em; line-height: 1.3; font-weight: 700; }
    #preview h1 { font-size: 1.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4em; }
    #preview h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    #preview h3 { font-size: 1.15rem; }
    #preview p { margin: 0.75em 0; }
    #preview a { color: var(--accent); }
    #preview strong { color: #fff; }
    #preview em { color: #dba96a; }
    #preview code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 0.1em 0.4em; font-family: 'Courier New', monospace; font-size: 0.88em; color: #ff7b72; }
    #preview pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; overflow-x: auto; margin: 0.75em 0; }
    #preview pre code { background: none; border: none; padding: 0; color: #a5d6ff; }
    #preview blockquote { border-left: 3px solid var(--accent); margin: 0.75em 0; padding: 0.5em 1em; color: var(--muted); background: var(--surface); }
    #preview ul, #preview ol { margin: 0.5em 0 0.5em 1.5em; }
    #preview li { margin: 0.2em 0; }
    #preview table { border-collapse: collapse; width: 100%; margin: 0.75em 0; font-size: 0.9rem; }
    #preview th, #preview td { border: 1px solid var(--border); padding: 0.45em 0.75em; }
    #preview th { background: var(--surface); font-weight: 600; }
    #preview hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    #preview img { max-width: 100%; border-radius: 4px; }
    .clear-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 0.72rem; border-radius: 4px; padding: 0.15rem 0.5rem; cursor: pointer; }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }
    footer { border-top: 1px solid var(--border); padding: 1rem 1.5rem; text-align: center; font-size: 0.82rem; color: var(--muted); flex-shrink: 0; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    @media (max-width: 640px) { .editor-wrap { flex-direction: column; } .pane + .pane { border-left: none; border-top: 1px solid var(--border); } #editor, #preview { min-height: 300px; } }
  </style>
</head>
<body>
<header>
  <a href="/" class="logo">dev<span>nestio</span></a>
  <h1>Markdown Cheatsheet</h1>
</header>

<div class="toolbar">
  <button class="tb-btn" onclick="ins('**','**')"><b>B</b></button>
  <button class="tb-btn" onclick="ins('*','*')"><i>I</i></button>
  <button class="tb-btn" onclick="ins('~~','~~')">~~S~~</button>
  <button class="tb-btn" onclick="ins('`','`')">code</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="insLine('# ')">H1</button>
  <button class="tb-btn" onclick="insLine('## ')">H2</button>
  <button class="tb-btn" onclick="insLine('### ')">H3</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="insLine('- ')">• List</button>
  <button class="tb-btn" onclick="insLine('1. ')">1. List</button>
  <button class="tb-btn" onclick="insLine('> ')">Quote</button>
  <button class="tb-btn" onclick="insLine('---')">HR</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="insLink()">[link]</button>
  <button class="tb-btn" onclick="insImg()">img</button>
  <button class="tb-btn" onclick="insCode()">```</button>
  <button class="tb-btn" onclick="insTable()">table</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="loadCheatsheet()">Load Cheatsheet</button>
  <button class="tb-btn" onclick="clearEditor()">Clear</button>
</div>

<div class="editor-wrap">
  <div class="pane">
    <div class="pane-header"><span>Markdown Source</span></div>
    <textarea id="editor" spellcheck="false" placeholder="Type Markdown here…" oninput="render()"></textarea>
  </div>
  <div class="pane">
    <div class="pane-header"><span>Preview</span></div>
    <div id="preview"></div>
  </div>
</div>

<footer>
  <a href="/">← All tools</a> &nbsp;·&nbsp; Built with ❤️ for developers &nbsp;·&nbsp;
  <a href="https://buymeacoffee.com/devnestio" target="_blank" rel="noopener">☕ Buy me a coffee</a>
</footer>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

marked.setOptions({ breaks: true, gfm: true });

function render() {
  preview.innerHTML = marked.parse(editor.value);
}

function ins(before, after) {
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const sel = editor.value.slice(s, e) || 'text';
  editor.value = editor.value.slice(0, s) + before + sel + after + editor.value.slice(e);
  editor.focus();
  editor.setSelectionRange(s + before.length, s + before.length + sel.length);
  render();
}

function insLine(prefix) {
  const s = editor.selectionStart;
  const before = editor.value.lastIndexOf('\n', s - 1) + 1;
  editor.value = editor.value.slice(0, before) + prefix + editor.value.slice(before);
  editor.focus();
  editor.setSelectionRange(before + prefix.length, before + prefix.length);
  render();
}

function insLink() {
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const sel = editor.value.slice(s, e) || 'link text';
  const repl = `[${sel}](https://example.com)`;
  editor.value = editor.value.slice(0, s) + repl + editor.value.slice(e);
  editor.focus();
  render();
}

function insImg() {
  const s = editor.selectionStart;
  const repl = '![alt text](https://example.com/image.png)';
  editor.value = editor.value.slice(0, s) + repl + editor.value.slice(s);
  editor.focus();
  render();
}

function insCode() {
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const sel = editor.value.slice(s, e) || 'code here';
  const repl = `\`\`\`\n${sel}\n\`\`\``;
  editor.value = editor.value.slice(0, s) + repl + editor.value.slice(e);
  editor.focus();
  render();
}

function insTable() {
  const s = editor.selectionStart;
  const tbl = `| Header 1 | Header 2 | Header 3 |\n|----------|----------|----------|\n| Cell 1   | Cell 2   | Cell 3   |\n| Cell 4   | Cell 5   | Cell 6   |\n`;
  editor.value = editor.value.slice(0, s) + tbl + editor.value.slice(s);
  editor.focus();
  render();
}

function clearEditor() {
  editor.value = '';
  render();
}

function loadCheatsheet() {
  editor.value = `# Markdown Cheatsheet

## Headings

# H1 Heading
## H2 Heading
### H3 Heading
#### H4 Heading

---

## Emphasis

**Bold text** or __also bold__

*Italic text* or _also italic_

~~Strikethrough~~

**Bold and _nested italic_**

---

## Lists

### Unordered
- Item one
- Item two
  - Nested item
  - Another nested

### Ordered
1. First item
2. Second item
3. Third item

### Task List
- [x] Completed task
- [ ] Pending task
- [ ] Another task

---

## Links & Images

[Link text](https://example.com)

[Link with title](https://example.com "Optional title")

![Alt text](https://via.placeholder.com/150 "Image title")

---

## Code

Inline \`code\` with backticks

\`\`\`javascript
// Fenced code block
const greet = name => \`Hello, \${name}!\`;
console.log(greet('world'));
\`\`\`

\`\`\`bash
npm install && npm run build
\`\`\`

---

## Tables

| Name    | Type   | Default |
|---------|--------|---------|
| width   | number | 100     |
| height  | number | auto    |
| visible | bool   | true    |

---

## Blockquotes

> This is a blockquote.
>
> It can span multiple paragraphs.

> Nested:
> > Inner quote

---

## Horizontal Rule

---

***

___

---

## Inline HTML

<kbd>Ctrl</kbd> + <kbd>C</kbd>

<mark>Highlighted text</mark>

---

## Escaping

\\*Not italic\\*

\\# Not a heading

---

## Footnotes

Here is a sentence with a footnote.[^1]

[^1]: This is the footnote.
`;
  render();
}

loadCheatsheet();
</script>
</body>
</html>
