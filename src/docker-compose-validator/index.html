<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Compose Validator – devnestio</title>
  <meta name="description" content="Validate your docker-compose.yml online. Check service structure, port mappings, depends_on references, volume declarations, and restart policies. Browser-only, no upload." />
  <meta property="og:title" content="Docker Compose Validator – devnestio" />
  <meta property="og:description" content="Paste your docker-compose.yml and instantly validate services, ports, volumes, and depends_on references. 100% browser-based." />
  <meta property="og:url" content="https://devnestio.pages.dev/docker-compose-validator/" />
  <meta name="twitter:card" content="summary" />
  <link rel="canonical" href="https://devnestio.pages.dev/docker-compose-validator/" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162190147304602" crossorigin="anonymous"></script>
</head>
<body>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: #1e293b; border-bottom: 1px solid #334155; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  header a { color: #64748b; font-size: 13px; text-decoration: none; }
  header a:hover { color: #94a3b8; }
  header h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
  .badge { background: #0284c7; color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; margin-left: 8px; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } }
  .panel { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; }
  .panel-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .panel-hdr h2 { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .btn { padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background .15s; }
  .btn-primary { background: #0284c7; color: #fff; }
  .btn-primary:hover { background: #0369a1; }
  .btn-secondary { background: #334155; color: #e2e8f0; }
  .btn-secondary:hover { background: #475569; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  textarea { width: 100%; padding: 10px 12px; background: #0f1117; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 12px; font-family: 'Courier New', monospace; outline: none; resize: vertical; min-height: 460px; line-height: 1.7; }
  textarea:focus { border-color: #0284c7; }
  .results { overflow-y: auto; max-height: 500px; }
  .summary { display: flex; gap: 16px; flex-wrap: wrap; background: #0f1117; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; }
  .sum-item { font-size: 13px; }
  .sum-item .num { font-size: 22px; font-weight: 700; display: block; }
  .c-err { color: #f87171; }
  .c-warn { color: #fbbf24; }
  .c-info { color: #38bdf8; }
  .c-ok { color: #4ade80; }
  .issue-list { display: flex; flex-direction: column; gap: 8px; }
  .issue { background: #0f1117; border-radius: 7px; padding: 10px 12px; border-left: 3px solid; }
  .issue.error { border-color: #f87171; }
  .issue.warning { border-color: #fbbf24; }
  .issue.info { border-color: #38bdf8; }
  .issue.ok { border-color: #4ade80; }
  .issue-title { font-size: 12px; font-weight: 600; }
  .issue.error .issue-title { color: #f87171; }
  .issue.warning .issue-title { color: #fbbf24; }
  .issue.info .issue-title { color: #38bdf8; }
  .issue.ok .issue-title { color: #4ade80; }
  .issue-path { font-size: 11px; color: #64748b; font-family: monospace; margin-top: 2px; }
  .issue-msg { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  .service-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .service-card { background: #0f1117; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; }
  .service-name { font-size: 13px; font-weight: 600; color: #e2e8f0; margin-bottom: 6px; }
  .service-props { display: flex; flex-wrap: wrap; gap: 6px; }
  .prop-chip { background: #1e293b; border: 1px solid #334155; border-radius: 4px; padding: 2px 8px; font-size: 11px; color: #94a3b8; }
  .prop-chip.has { border-color: #0284c7; color: #38bdf8; }
  .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
  .empty-state svg { margin-bottom: 12px; opacity: .4; }
  .sample-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .sample-btn { background: #0f1117; border: 1px solid #334155; border-radius: 6px; padding: 5px 12px; font-size: 12px; color: #94a3b8; cursor: pointer; }
  .sample-btn:hover { border-color: #0284c7; color: #38bdf8; }
</style>

<header>
  <a href="/">← devnestio</a>
  <h1>Docker Compose Validator <span class="badge">YAML</span></h1>
</header>

<main>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="runValidation()">Validate</button>
    <button class="btn btn-secondary btn-sm" onclick="clearAll()">Clear</button>
    <button class="btn btn-secondary btn-sm" onclick="copyInput()">Copy</button>
  </div>
  <div class="sample-btns">
    <button class="sample-btn" onclick="loadSample('basic')">Basic sample</button>
    <button class="sample-btn" onclick="loadSample('fullstack')">Full-stack</button>
    <button class="sample-btn" onclick="loadSample('broken')">Broken (errors)</button>
  </div>
  <div class="layout">
    <div class="panel">
      <div class="panel-hdr">
        <h2>docker-compose.yml</h2>
        <span id="line-count" style="font-size:11px;color:#64748b">0 lines</span>
      </div>
      <textarea id="input" placeholder="Paste your docker-compose.yml here…" oninput="updateLineCount()" spellcheck="false"></textarea>
    </div>
    <div class="panel">
      <div class="panel-hdr">
        <h2>Results</h2>
        <span id="status-chip" style="font-size:11px;padding:2px 8px;border-radius:99px;background:#1e293b;color:#64748b">—</span>
      </div>
      <div id="results">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/></svg>
          <p>Paste your docker-compose.yml and click Validate</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ── Core validation logic (also used in test.mjs) ─────────────────────────────

function getComposeVersion(yaml) {
  const m = yaml.match(/^version\s*:\s*['"]?([\d.]+)['"]?/m);
  return m ? m[1] : null;
}

function extractServiceNames(yaml) {
  const names = [];
  let inServices = false;
  for (const line of yaml.split('\n')) {
    const trimmed = line.trimEnd();
    if (/^services\s*:/.test(trimmed)) { inServices = true; continue; }
    if (inServices) {
      if (/^[a-zA-Z0-9_]/.test(trimmed)) { inServices = false; break; }
      const m = trimmed.match(/^  ([a-zA-Z0-9][a-zA-Z0-9_.-]*)\s*:/);
      if (m && !['ports','volumes','environment','networks','depends_on','build','image','restart','command','entrypoint','env_file','healthcheck','labels','deploy','logging'].includes(m[1])) {
        names.push(m[1]);
      }
    }
  }
  return names;
}

function isValidPortMapping(port) {
  const s = String(port).trim();
  // IP:hostPort:containerPort[/proto], hostPort:containerPort[/proto], containerPort[/proto]
  return /^(\d{1,3}(?:\.\d{1,3}){3}:)?(\d+(?:-\d+)?:)?\d+(?:-\d+)?(?:\/(?:tcp|udp|sctp))?$/.test(s);
}

function extractPortsForService(yaml, svcName) {
  const ports = [];
  const lines = yaml.split('\n');
  let inSvc = false, inPorts = false, svcIndent = 2;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const indent = line.match(/^(\s*)/)[1].length;
    if (!inSvc) {
      if (new RegExp(`^  ${svcName}\\s*:`).test(line)) { inSvc = true; svcIndent = 2; }
      continue;
    }
    if (indent <= svcIndent && line.trim() && !inPorts) {
      if (indent === svcIndent) break;
    }
    if (/^\s{4}ports\s*:/.test(line)) { inPorts = true; continue; }
    if (inPorts) {
      if (indent <= 4 && line.trim() && !line.trim().startsWith('-')) { inPorts = false; continue; }
      const m = line.match(/^\s*-\s*['"]?([^'"#\n]+?)['"]?\s*(?:#.*)?$/);
      if (m) ports.push(m[1].trim());
    }
  }
  return ports;
}

function extractDependsOnForService(yaml, svcName) {
  const deps = [];
  const lines = yaml.split('\n');
  let inSvc = false, inDeps = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!inSvc) {
      if (new RegExp(`^  ${svcName}\\s*:`).test(line)) { inSvc = true; }
      continue;
    }
    if (inSvc && /^  [a-zA-Z]/.test(line) && !new RegExp(`^  ${svcName}\\s*:`).test(line)) {
      if (!line.match(/^\s{4,}/)) break;
    }
    if (/^\s{4}depends_on\s*:/.test(line)) { inDeps = true; continue; }
    if (inDeps) {
      const indent = line.match(/^(\s*)/)[1].length;
      if (indent <= 4 && line.trim() && !line.trim().startsWith('-')) { inDeps = false; continue; }
      const m = line.match(/^\s*-\s*([a-zA-Z0-9][a-zA-Z0-9_.-]*)\s*$/);
      if (m) deps.push(m[1]);
      const condM = line.match(/^\s{6}([a-zA-Z0-9][a-zA-Z0-9_.-]*)\s*:/);
      if (condM) deps.push(condM[1]);
    }
  }
  return deps;
}

function serviceHasField(yaml, svcName, field) {
  const re = new RegExp(`^  ${svcName}\\s*:`, 'm');
  const start = yaml.search(re);
  if (start === -1) return false;
  const block = yaml.slice(start);
  const nextServiceMatch = block.slice(1).search(/^  [a-zA-Z]/m);
  const chunk = nextServiceMatch === -1 ? block : block.slice(0, nextServiceMatch + 1);
  return new RegExp(`^\\s{4}${field}\\s*:`, 'm').test(chunk);
}

function detectCyclicDeps(depMap, names) {
  function hasCycle(node, visited, stack) {
    visited.add(node);
    stack.add(node);
    for (const dep of (depMap[node] || [])) {
      if (!visited.has(dep)) {
        if (hasCycle(dep, visited, stack)) return true;
      } else if (stack.has(dep)) return true;
    }
    stack.delete(node);
    return false;
  }
  const visited = new Set();
  for (const n of names) {
    if (!visited.has(n) && hasCycle(n, visited, new Set())) return true;
  }
  return false;
}

function validateDockerCompose(yaml) {
  const errors = [], warnings = [], info = [];

  if (!yaml.trim()) {
    errors.push({ msg: 'Empty input', path: '' });
    return { errors, warnings, info, serviceNames: [] };
  }

  const version = getComposeVersion(yaml);
  if (!version) {
    warnings.push({ msg: '"version" field not found. Compose v2.x requires it; v3+ Compose spec makes it optional.', path: 'version' });
  } else {
    info.push({ msg: `Compose file version: ${version}`, path: 'version' });
  }

  if (!/^services\s*:/m.test(yaml)) {
    errors.push({ msg: 'Required "services" key is missing', path: 'root' });
    return { errors, warnings, info, serviceNames: [] };
  }

  const serviceNames = extractServiceNames(yaml);
  if (serviceNames.length === 0) {
    warnings.push({ msg: 'No services defined under "services"', path: 'services' });
  } else {
    info.push({ msg: `Services found: ${serviceNames.join(', ')}`, path: 'services' });
  }

  const depMap = {};
  for (const name of serviceNames) {
    if (!serviceHasField(yaml, name, 'image') && !serviceHasField(yaml, name, 'build')) {
      errors.push({ msg: `Service "${name}" must have "image" or "build"`, path: `services.${name}` });
    }

    const ports = extractPortsForService(yaml, name);
    for (const p of ports) {
      if (!isValidPortMapping(p)) {
        errors.push({ msg: `Invalid port mapping: "${p}"`, path: `services.${name}.ports` });
      }
    }

    const restart = yaml.match(new RegExp(`^  ${name}[\\s\\S]*?\\n\\s{4}restart\\s*:\\s*([^\\n]+)`, 'm'));
    if (restart) {
      const policy = restart[1].trim().replace(/^['"]|['"]$/g, '');
      if (!['no', 'always', 'on-failure', 'unless-stopped'].includes(policy)) {
        warnings.push({ msg: `Unknown restart policy "${policy}" for service "${name}"`, path: `services.${name}.restart` });
      }
    }

    const deps = extractDependsOnForService(yaml, name);
    depMap[name] = deps;
    for (const dep of deps) {
      if (!serviceNames.includes(dep)) {
        errors.push({ msg: `Service "${name}" depends_on unknown service "${dep}"`, path: `services.${name}.depends_on` });
      }
    }
  }

  if (detectCyclicDeps(depMap, serviceNames)) {
    errors.push({ msg: 'Circular dependency detected in depends_on', path: 'services.depends_on' });
  }

  return { errors, warnings, info, serviceNames };
}

// ── UI ─────────────────────────────────────────────────────────────────────────

const SAMPLES = {
  basic: `version: "3.8"
services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/share/nginx/html
    restart: unless-stopped
`,
  fullstack: `version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://app:secret@db:5432/appdb
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: always

volumes:
  pgdata:
`,
  broken: `version: "3.8"
services:
  web:
    ports:
      - "abc:xyz"
    depends_on:
      - missing_service
  worker:
    image: myapp:latest
    restart: foobar
    depends_on:
      - web
`,
};

function loadSample(key) {
  document.getElementById('input').value = SAMPLES[key];
  updateLineCount();
  runValidation();
}

function updateLineCount() {
  const v = document.getElementById('input').value;
  document.getElementById('line-count').textContent = `${v.split('\n').length} lines`;
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('results').innerHTML = `<div class="empty-state"><p>Paste your docker-compose.yml and click Validate</p></div>`;
  document.getElementById('status-chip').textContent = '—';
  updateLineCount();
}

function copyInput() {
  navigator.clipboard.writeText(document.getElementById('input').value);
}

function runValidation() {
  const yaml = document.getElementById('input').value;
  const { errors, warnings, info, serviceNames } = validateDockerCompose(yaml);

  const chip = document.getElementById('status-chip');
  if (errors.length === 0) {
    chip.textContent = 'Valid';
    chip.style.background = '#14532d';
    chip.style.color = '#4ade80';
  } else {
    chip.textContent = `${errors.length} error${errors.length > 1 ? 's' : ''}`;
    chip.style.background = '#450a0a';
    chip.style.color = '#f87171';
  }

  const el = document.getElementById('results');

  const summary = `
    <div class="summary">
      <div class="sum-item"><span class="num c-err">${errors.length}</span>Errors</div>
      <div class="sum-item"><span class="num c-warn">${warnings.length}</span>Warnings</div>
      <div class="sum-item"><span class="num c-info">${info.length}</span>Info</div>
      <div class="sum-item"><span class="num" style="color:#e2e8f0">${serviceNames ? serviceNames.length : 0}</span>Services</div>
    </div>
  `;

  const items = [
    ...errors.map(e => `<div class="issue error"><div class="issue-title">ERROR</div><div class="issue-path">${e.path}</div><div class="issue-msg">${e.msg}</div></div>`),
    ...warnings.map(w => `<div class="issue warning"><div class="issue-title">WARNING</div><div class="issue-path">${w.path}</div><div class="issue-msg">${w.msg}</div></div>`),
    ...info.map(i => `<div class="issue info"><div class="issue-title">INFO</div><div class="issue-path">${i.path}</div><div class="issue-msg">${i.msg}</div></div>`),
  ];

  if (errors.length === 0 && warnings.length === 0) {
    items.push(`<div class="issue ok"><div class="issue-title">VALID</div><div class="issue-msg">docker-compose.yml looks good!</div></div>`);
  }

  el.innerHTML = summary + `<div class="results"><div class="issue-list">${items.join('')}</div></div>`;
}

updateLineCount();
</script>
</body>
</html>
