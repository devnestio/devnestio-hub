/* ═══════════════════════════════════════════════════════════════
   CSV ↔ JSON Converter — Pure Vanilla JS, zero dependencies

/* ── Type inference ──────────────────────────────────────────── */

function inferType(value) {
  if (value === null || value === undefined) return null;
  var v = value.trim();
  if (v === '') return null;
  var vl = v.toLowerCase();
  if (vl === 'true') return true;
  if (vl === 'false') return false;
  if (vl === 'null') return null;
  if (!/^0[xXoObB]/.test(v)) {
    var n = Number(v);
    if (!isNaN(n) && isFinite(n)) return n;
  }
  return value;
}

/* ── CSV raw parser ──────────────────────────────────────────── */

function parseCSVRaw(text, delimiter) {
  var del = delimiter || ',';
  var rows = [];
  var row = [];
  var field = '';
  var inQuote = false;
  var i = 0;
  var lineNum = 1;
  var fieldStartLine = 1;

  while (i < text.length) {
    var ch = text[i];

    if (inQuote) {
      if (ch === '"') {
        if (i + 1 < text.length && text[i + 1] === '"') {
          field += '"';
          i += 2;
        } else {
          inQuote = false;
          i++;
        }
      } else if (ch === '\r') {
        if (i + 1 < text.length && text[i + 1] === '\n') i++;
        field += '\n';
        lineNum++;
        i++;
      } else if (ch === '\n') {
        field += '\n';
        lineNum++;
        i++;
      } else {
        field += ch;
        i++;
      }
    } else {
      if (ch === '"' && field === '') {
        inQuote = true;
        fieldStartLine = lineNum;
        i++;
      } else if (ch === del) {
        row.push(field);
        field = '';
        i++;
      } else if (ch === '\r') {
        if (i + 1 < text.length && text[i + 1] === '\n') i++;
        row.push(field);
        field = '';
        rows.push({ row: row, lineNum: lineNum });
        row = [];
        lineNum++;
        i++;
      } else if (ch === '\n') {
        row.push(field);
        field = '';
        rows.push({ row: row, lineNum: lineNum });
        row = [];
        lineNum++;
        i++;
      } else {
        field += ch;
        i++;
      }
    }
  }

  row.push(field);
  if (row.some(function(f) { return f !== ''; }) || row.length > 1) {
    rows.push({ row: row, lineNum: lineNum });
  }

  if (inQuote) {
    var err = new Error('Unclosed quote starting at line ' + fieldStartLine);
    err.line = fieldStartLine;
    throw err;
  }

  return rows;
}

/* ── CSV → JSON ──────────────────────────────────────────────── */

function csvToJSON(text, options) {
  options = options || {};
  var delimiter = options.delimiter || ',';
  var hasHeader = options.hasHeader !== false;
  var typeInference = options.typeInference !== false;
  var outputFormat = options.outputFormat || 'objects';

  try {
    if (!text || !text.trim()) {
      return { ok: false, error: { message: 'Input is empty', line: null } };
    }

    var rawRows = parseCSVRaw(text, delimiter);

    var dataRows = rawRows.filter(function(r) {
      return r.row.some(function(f) { return f !== ''; });
    });

    if (dataRows.length === 0) {
      return { ok: false, error: { message: 'No data found', line: null } };
    }

    var headers = null;
    var records = dataRows;

    if (hasHeader) {
      headers = dataRows[0].row;
      records = dataRows.slice(1);
    }

    var numCols;
    var result;

    if (outputFormat === 'arrays') {
      result = records.map(function(r) {
        return r.row.map(function(f) {
          return typeInference ? inferType(f) : f;
        });
      });
      if (hasHeader) {
        numCols = headers.length;
        result.unshift(headers);
      } else {
        numCols = result.length > 0 ? result[0].length : 0;
      }
    } else {
      if (!hasHeader) {
        var maxCols = 0;
        records.forEach(function(r) { if (r.row.length > maxCols) maxCols = r.row.length; });
        headers = [];
        for (var ci = 0; ci < maxCols; ci++) headers.push('col' + ci);
      }
      numCols = headers.length;
      result = records.map(function(r) {
        var obj = {};
        for (var hi = 0; hi < headers.length; hi++) {
          var val = r.row[hi] !== undefined ? r.row[hi] : '';
          obj[headers[hi]] = typeInference ? inferType(val) : val;
        }
        return obj;
      });
    }

    return {
      ok: true,
      result: JSON.stringify(result, null, 2),
      stats: {
        rows: dataRows.length,
        cols: numCols,
        records: records.length
      }
    };
  } catch (e) {
    return { ok: false, error: { message: e.message || 'Parse error', line: e.line || null } };
  }
}

/* ── JSON → CSV helpers ──────────────────────────────────────── */

function flattenObject(obj, prefix, result) {
  result = result || {};
  if (obj === null || typeof obj !== 'object' || Array.isArray(obj)) {
    result[prefix] = obj;
    return result;
  }
  var keys = Object.keys(obj);
  if (keys.length === 0) {
    result[prefix] = '';
    return result;
  }
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var newKey = prefix ? prefix + '.' + k : k;
    var val = obj[k];
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      flattenObject(val, newKey, result);
    } else {
      result[newKey] = val;
    }
  }
  return result;
}

function csvEscapeField(value, delimiter) {
  var s = (value === null || value === undefined) ? '' : String(value);
  if (
    s.indexOf(delimiter) !== -1 ||
    s.indexOf('"') !== -1 ||
    s.indexOf('\n') !== -1 ||
    s.indexOf('\r') !== -1
  ) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

/* ── JSON → CSV ──────────────────────────────────────────────── */

function jsonToCSV(text, options) {
  options = options || {};
  var delimiter = options.delimiter || ',';

  try {
    if (!text || !text.trim()) {
      return { ok: false, error: { message: 'Input is empty', line: null } };
    }

    var data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      return { ok: false, error: { message: 'Invalid JSON: ' + e.message, line: null } };
    }

    if (!Array.isArray(data)) {
      return { ok: false, error: { message: 'JSON must be an array at the top level', line: null } };
    }

    if (data.length === 0) {
      return { ok: true, result: '', stats: { rows: 0, cols: 0, records: 0 } };
    }

    var lines = [];
    var numCols = 0;

    if (typeof data[0] === 'object' && data[0] !== null && !Array.isArray(data[0])) {
      var flatRows = data.map(function(item) {
        return flattenObject(item, '', {});
      });

      var headerSet = Object.create(null);
      var headers = [];
      flatRows.forEach(function(r) {
        Object.keys(r).forEach(function(k) {
          if (!headerSet[k]) {
            headerSet[k] = true;
            headers.push(k);
          }
        });
      });
      numCols = headers.length;

      lines.push(headers.map(function(h) { return csvEscapeField(h, delimiter); }).join(delimiter));
      flatRows.forEach(function(r) {
        lines.push(headers.map(function(h) {
          return csvEscapeField(r[h] !== undefined ? r[h] : '', delimiter);
        }).join(delimiter));
      });

      return {
        ok: true,
        result: lines.join('\n'),
        stats: { rows: lines.length, cols: numCols, records: data.length }
      };

    } else if (Array.isArray(data[0])) {
      data.forEach(function(rowArr, idx) {
        if (!Array.isArray(rowArr)) {
          var e = new Error('Row ' + idx + ' is not an array');
          throw e;
        }
        if (rowArr.length > numCols) numCols = rowArr.length;
        lines.push(rowArr.map(function(f) { return csvEscapeField(f, delimiter); }).join(delimiter));
      });

      return {
        ok: true,
        result: lines.join('\n'),
        stats: { rows: lines.length, cols: numCols, records: data.length }
      };

    } else {
      data.forEach(function(item) {
        lines.push(csvEscapeField(item, delimiter));
      });
      return {
        ok: true,
        result: lines.join('\n'),
        stats: { rows: lines.length, cols: 1, records: data.length }
      };
    }

  } catch (e) {
    return { ok: false, error: { message: e.message || 'Conversion error', line: null } };
  }
}

/* ── Sample data ─────────────────────────────────────────────── */

var SAMPLE_CSV = [
  'id,name,email,age,active,score',
  '1,Alice Johnson,alice@example.com,28,true,92.5',
  '2,Bob Smith,bob@example.com,34,false,87.0',
  '3,Carol Davis,carol@example.com,25,true,95.1',
  '4,Dave Wilson,dave@example.com,41,true,78.3',
  '5,Eve Martinez,eve@example.com,30,false,88.9'
].join('\n');

var SAMPLE_JSON = JSON.stringify([
  { id: 1, name: 'Alice Johnson', address: { city: 'New York', zip: '10001' }, tags: ['admin', 'user'], active: true },
  { id: 2, name: 'Bob Smith', address: { city: 'Los Angeles', zip: '90001' }, tags: ['user'], active: false },
  { id: 3, name: 'Carol Davis', address: { city: 'Chicago', zip: '60601' }, tags: ['user', 'moderator'], active: true }
], null, 2);

/* ── DOM refs ────────────────────────────────────────────────── */

var btnModeCsv2json = document.getElementById('btn-mode-csv2json');
var btnModeJson2csv = document.getElementById('btn-mode-json2csv');
var optsCsv         = document.getElementById('opts-csv');
var optsJson        = document.getElementById('opts-json');
var selDelimCsv     = document.getElementById('sel-delim-csv');
var selDelimJson    = document.getElementById('sel-delim-json');
var chkHeader       = document.getElementById('chk-header');
var chkTypes        = document.getElementById('chk-types');
var selFormat       = document.getElementById('sel-format');
var btnSample       = document.getElementById('btn-sample');
var btnClear        = document.getElementById('btn-clear');
var inputPane       = document.getElementById('input-pane');
var inputTitle      = document.getElementById('input-title');
var inputTA         = document.getElementById('input-ta');
var outputTitle     = document.getElementById('output-title');
var outputTA        = document.getElementById('output-ta');
var statusBar       = document.getElementById('status-bar');
var statsBar        = document.getElementById('stats-bar');
var statRows        = document.getElementById('stat-rows');
var statCols        = document.getElementById('stat-cols');
var statRecords     = document.getElementById('stat-records');
var btnCopy         = document.getElementById('btn-copy');
var btnDownload     = document.getElementById('btn-download');

/* ── State ───────────────────────────────────────────────────── */

var mode = 'csv2json';
var currentOutput = '';
var debounceTimer = null;

/* ── UI helpers ──────────────────────────────────────────────── */

function showStatus(ok, message, detail) {
  statusBar.className = 'status-bar visible ' + (ok ? 'ok' : 'err');
  statusBar.innerHTML =
    '<span>' + (ok ? '&#x2705;' : '&#x274C;') + ' ' + escHtml(message) + '</span>' +
    (detail ? '<span class="status-detail">' + escHtml(detail) + '</span>' : '');
}

function hideStatus() {
  statusBar.className = 'status-bar';
  statusBar.innerHTML = '';
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function setOutput(text, stats) {
  currentOutput = text;
  outputTA.value = text;
  if (stats) {
    statRows.textContent    = stats.rows;
    statCols.textContent    = stats.cols;
    statRecords.textContent = stats.records;
    statsBar.className = 'stats-bar visible';
  }
}

function clearOutput() {
  currentOutput = '';
  outputTA.value = '';
  statsBar.className = 'stats-bar';
  hideStatus();
}

function getDelimCsv() { return (selDelimCsv && selDelimCsv.value) || ','; }
function getDelimJson() { return (selDelimJson && selDelimJson.value) || ','; }

/* ── Mode switch ─────────────────────────────────────────────── */

function setMode(m) {
  mode = m;
  if (m === 'csv2json') {
    btnModeCsv2json.className = 'btn btn-primary';
    btnModeJson2csv.className = 'btn';
    optsCsv.className = 'opts-group';
    optsJson.className = 'opts-group hidden';
    inputTitle.textContent = 'Input CSV';
    outputTitle.textContent = 'Output JSON';
    inputTA.placeholder = 'Paste your CSV here, or click “Sample”…';
  } else {
    btnModeCsv2json.className = 'btn';
    btnModeJson2csv.className = 'btn btn-primary';
    optsCsv.className = 'opts-group hidden';
    optsJson.className = 'opts-group';
    inputTitle.textContent = 'Input JSON';
    outputTitle.textContent = 'Output CSV';
    inputTA.placeholder = 'Paste your JSON array here, or click “Sample”…';
  }
  clearOutput();
}

/* ── Convert ─────────────────────────────────────────────────── */

function convert() {
  var raw = inputTA.value;
  if (!raw.trim()) { clearOutput(); return; }

  var result;
  if (mode === 'csv2json') {
    result = csvToJSON(raw, {
      delimiter: getDelimCsv(),
      hasHeader: chkHeader.checked !== false,
      typeInference: chkTypes.checked !== false,
      outputFormat: (selFormat && selFormat.value) || 'objects'
    });
  } else {
    result = jsonToCSV(raw, { delimiter: getDelimJson() });
  }

  if (result.ok) {
    setOutput(result.result, result.stats);
    showStatus(true, 'Converted successfully');
  } else {
    clearOutput();
    var e = result.error;
    showStatus(false, e.message, e.line ? 'Line ' + e.line : '');
  }
}

/* ── Events ──────────────────────────────────────────────────── */

function debounce(fn, ms) {
  return function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(fn, ms);
  };
}

inputTA.addEventListener('input', debounce(convert, 280));

btnModeCsv2json.addEventListener('click', function() {
  if (mode !== 'csv2json') { setMode('csv2json'); inputTA.value = ''; clearOutput(); }
});

btnModeJson2csv.addEventListener('click', function() {
  if (mode !== 'json2csv') { setMode('json2csv'); inputTA.value = ''; clearOutput(); }
});

selDelimCsv.addEventListener('change', debounce(convert, 0));
selDelimJson.addEventListener('change', debounce(convert, 0));
chkHeader.addEventListener('change', debounce(convert, 0));
chkTypes.addEventListener('change', debounce(convert, 0));
selFormat.addEventListener('change', debounce(convert, 0));

btnSample.addEventListener('click', function() {
  inputTA.value = mode === 'csv2json' ? SAMPLE_CSV : SAMPLE_JSON;
  convert();
});

btnClear.addEventListener('click', function() {
  inputTA.value = '';
  clearOutput();
});

btnCopy.addEventListener('click', function() {
  if (!currentOutput) return;
  navigator.clipboard.writeText(currentOutput).then(function() {
    btnCopy.textContent = 'Copied!';
    btnCopy.className = 'btn btn-sm copied';
    setTimeout(function() {
      btnCopy.textContent = 'Copy';
      btnCopy.className = 'btn btn-sm';
    }, 1800);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = currentOutput;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btnCopy.textContent = 'Copied!';
    setTimeout(function() { btnCopy.textContent = 'Copy'; }, 1800);
  });
});

btnDownload.addEventListener('click', function() {
  if (!currentOutput) return;
  var ext  = mode === 'csv2json' ? '.json' : '.csv';
  var mime = mode === 'csv2json' ? 'application/json' : 'text/csv';
  var blob = new Blob([currentOutput], { type: mime });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = 'converted' + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  btnDownload.textContent = 'Saved!';
  btnDownload.className = 'btn btn-sm done';
  setTimeout(function() {
    btnDownload.textContent = 'Download';
    btnDownload.className = 'btn btn-sm';
  }, 1800);
});

/* ── Drag-and-drop ───────────────────────────────────────────── */

inputPane.addEventListener('dragover', function(e) {
  e.preventDefault();
  inputPane.classList.add('drag-over');
});

inputPane.addEventListener('dragleave', function() {
  inputPane.classList.remove('drag-over');
});

inputPane.addEventListener('drop', function(e) {
  e.preventDefault();
  inputPane.classList.remove('drag-over');
  var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (!file) return;
  var ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'csv' && ext !== 'json') {
    showStatus(false, 'Unsupported file type — drop a .csv or .json file');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(ev) {
    inputTA.value = ev.target.result;
    if (ext === 'csv' && mode !== 'csv2json') setMode('csv2json');
    if (ext === 'json' && mode !== 'json2csv') setMode('json2csv');
    convert();
  };
  reader.readAsText(file);
});

/* ── Expose for test.js ──────────────────────────────────────── */

if (typeof window !== 'undefined') {
  window.__csvJsonConverter = {
    inferType: inferType,
    parseCSVRaw: parseCSVRaw,
    csvToJSON: csvToJSON,
    flattenObject: flattenObject,
    csvEscapeField: csvEscapeField,
    jsonToCSV: jsonToCSV
  };
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    inferType: inferType,
    parseCSVRaw: parseCSVRaw,
    csvToJSON: csvToJSON,
    flattenObject: flattenObject,
    csvEscapeField: csvEscapeField,
    jsonToCSV: jsonToCSV
  };
}
</script>
