<script>
'use strict';

/* ── State ──────────────────────────────────────────────────────────────────*/
let numRows = 3;
let numCols = 3;
// alignments[col] = 'left'|'center'|'right'
let alignments = [];
// cells[row][col] = string
let cells = [];

/* ── Init ───────────────────────────────────────────────────────────────────*/
function initState(rows, cols) {
  numRows = rows;
  numCols = cols;
  alignments = Array.from({ length: cols }, () => 'left');
  cells = Array.from({ length: rows }, () => Array(cols).fill(''));
}

function loadFromDOM() {
  const tbody = document.getElementById('grid-body');
  const rows = tbody.querySelectorAll('tr');
  numRows = rows.length;
  cells = [];
  rows.forEach((tr) => {
    const inputs = tr.querySelectorAll('input.cell-input');
    const row = [];
    inputs.forEach(inp => row.push(inp.value));
    cells.push(row);
  });
}

/* ── Core Logic (pure, also used by tests) ──────────────────────────────────*/

/**
 * Parse CSV string → 2D array of strings.
 * Handles quoted fields (RFC 4180 subset).
 */
function parseCSV(text) {
  const rows = [];
  const src = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  let i = 0;
  const n = src.length;

  while (i < n) {
    if (src[i] === '\n') { i++; continue; }
    const row = [];
    let expectMore = true;
    while (expectMore) {
      if (i < n && src[i] === '"') {
        i++;
        let val = '';
        while (i < n) {
          if (src[i] === '"') {
            if (src[i + 1] === '"') { val += '"'; i += 2; }
            else { i++; break; }
          } else { val += src[i++]; }
        }
        row.push(val);
      } else {
        let val = '';
        while (i < n && src[i] !== ',' && src[i] !== '\n') val += src[i++];
        row.push(val);
      }
      if (i < n && src[i] === ',') { i++; }
      else { expectMore = false; }
    }
    if (i < n && src[i] === '\n') i++;
    if (row.length > 0) rows.push(row);
  }
  return rows;
}

/**
 * Normalize 2D array so all rows have same number of cols.
 */
function normalizeCells(arr) {
  if (arr.length === 0) return arr;
  const maxCols = arr.reduce((m, r) => Math.max(m, r.length), 0);
  return arr.map(r => {
    const out = r.slice();
    while (out.length < maxCols) out.push('');
    return out;
  });
}

/**
 * Detect empty rows (all cells are blank/whitespace).
 */
function isEmptyRow(row) {
  return row.every(c => c.trim() === '');
}

/**
 * Detect empty column by index.
 */
function isEmptyCol(data, colIdx) {
  return data.every(row => (row[colIdx] || '').trim() === '');
}

/**
 * Remove all-blank rows and columns.
 */
function trimEmpty(data) {
  if (data.length === 0) return data;
  let out = data.filter(r => !isEmptyRow(r));
  if (out.length === 0) return out;
  const cols = out[0].length;
  const keptCols = [];
  for (let c = 0; c < cols; c++) {
    if (!isEmptyCol(out, c)) keptCols.push(c);
  }
  return out.map(r => keptCols.map(c => r[c]));
}

/**
 * Escape pipe and backslash for Markdown table cells.
 */
function escapeMdCell(val) {
  return val.replace(/\\/g, '\\\\').replace(/\|/g, '\\|');
}

/**
 * Escape HTML special characters.
 */
function escapeHtml(val) {
  return val
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/**
 * Generate alignment separator cell for Markdown.
 * align: 'left'|'center'|'right'
 */
function mdAlignSep(align) {
  if (align === 'center') return ':---:';
  if (align === 'right')  return '---:';
  return ':---';
}

/**
 * Generate Markdown table from 2D cells array.
 * @param {string[][]} data
 * @param {string[]} aligns - per-column alignment
 * @param {boolean} hasHeader - first row is header
 */
function generateMarkdown(data, aligns, hasHeader) {
  if (data.length === 0) return '';
  const cols = data[0].length;
  const effectiveAligns = Array.from({ length: cols }, (_, i) => aligns[i] || 'left');

  // compute column widths
  const widths = Array(cols).fill(0);
  data.forEach(row => {
    row.forEach((cell, ci) => {
      widths[ci] = Math.max(widths[ci], escapeMdCell(cell).length, mdAlignSep(effectiveAligns[ci]).length);
    });
  });

  const padCell = (val, width, align) => {
    const escaped = escapeMdCell(val);
    if (align === 'right')  return escaped.padStart(width);
    if (align === 'center') {
      const totalPad = width - escaped.length;
      const left = Math.floor(totalPad / 2);
      const right = totalPad - left;
      return ' '.repeat(Math.max(0, left)) + escaped + ' '.repeat(Math.max(0, right));
    }
    return escaped.padEnd(width);
  };

  const renderRow = (row) =>
    '| ' + row.map((cell, ci) => padCell(cell, widths[ci], effectiveAligns[ci])).join(' | ') + ' |';

  const sepRow = () =>
    '| ' + effectiveAligns.map((a, ci) => mdAlignSep(a).padEnd(widths[ci], '-').replace(/^(-+)$/, (m) => {
      // re-apply align markers after padding
      if (a === 'center') return ':' + '-'.repeat(widths[ci] - 2) + ':';
      if (a === 'right')  return '-'.repeat(widths[ci] - 1) + ':';
      return ':' + '-'.repeat(widths[ci] - 1);
    })).join(' | ') + ' |';

  const lines = [];
  data.forEach((row, ri) => {
    lines.push(renderRow(row));
    if (ri === 0 && hasHeader) lines.push(sepRow());
  });
  if (!hasHeader) {
    // insert separator after row 0 if no header (still need one for Markdown)
    lines.splice(1, 0, sepRow());
  }
  return lines.join('\n');
}

/**
 * Generate HTML table from 2D cells array.
 */
function generateHTML(data, aligns, hasHeader) {
  if (data.length === 0) return '';
  const cols = data[0].length;
  const effectiveAligns = Array.from({ length: cols }, (_, i) => aligns[i] || 'left');

  const alignStyle = (a) => `text-align: ${a};`;

  const lines = ['<table border="1" cellspacing="0" cellpadding="6">'];
  data.forEach((row, ri) => {
    if (ri === 0 && hasHeader) lines.push('  <thead>');
    if (ri === 1 && hasHeader) lines.push('  <tbody>');
    if (ri === 0 && !hasHeader) lines.push('  <tbody>');
    lines.push('    <tr>');
    row.forEach((cell, ci) => {
      const tag = (ri === 0 && hasHeader) ? 'th' : 'td';
      lines.push(`      <${tag} style="${alignStyle(effectiveAligns[ci])}">${escapeHtml(cell)}</${tag}>`);
    });
    lines.push('    </tr>');
    if (ri === 0 && hasHeader) lines.push('  </thead>');
  });
  lines.push('  </tbody>');
  lines.push('</table>');
  return lines.join('\n');
}

/* ── DOM helpers ─────────────────────────────────────────────────────────────*/

function getGridData() {
  loadFromDOM();
  return cells;
}

function renderGrid() {
  renderColControls();
  renderRows();
  generateOutputs();
}

function renderColControls() {
  const colRow = document.getElementById('col-controls-row');
  // Remove all except first (row-ctrl-cell) and last (add-col-cell)
  const children = Array.from(colRow.children);
  children.slice(1, children.length - 1).forEach(c => c.remove());

  const addColCell = colRow.lastElementChild;
  for (let ci = 0; ci < numCols; ci++) {
    const td = document.createElement('td');
    td.className = 'col-controls';
    const align = alignments[ci] || 'left';
    td.innerHTML = `
      <div class="col-ctrl-wrap">
        <div class="col-move-btns">
          <button class="btn-icon move" title="Move left" onclick="moveColLeft(${ci})">◀</button>
          <button class="btn-icon move" title="Move right" onclick="moveColRight(${ci})">▶</button>
          <button class="btn-icon" title="Delete column" onclick="deleteCol(${ci})">✕</button>
        </div>
        <div class="col-align-btns">
          <button class="align-btn ${align === 'left' ? 'active' : ''}" onclick="setAlign(${ci},'left')" title="Align left">L</button>
          <button class="align-btn ${align === 'center' ? 'active' : ''}" onclick="setAlign(${ci},'center')" title="Align center">C</button>
          <button class="align-btn ${align === 'right' ? 'active' : ''}" onclick="setAlign(${ci},'right')" title="Align right">R</button>
        </div>
      </div>`;
    colRow.insertBefore(td, addColCell);
  }
}

function renderRows() {
  const tbody = document.getElementById('grid-body');
  tbody.innerHTML = '';
  const hasHeader = document.getElementById('chk-header').checked;

  for (let ri = 0; ri < numRows; ri++) {
    const tr = document.createElement('tr');
    if (ri === 0 && hasHeader) tr.className = 'header-row';

    // Row control cell
    const ctrlTd = document.createElement('td');
    ctrlTd.className = 'row-ctrl-cell';
    ctrlTd.innerHTML = `
      <div class="row-ctrl-wrap">
        <span class="row-num">${ri + 1}</span>
        <button class="btn-icon move" title="Move up" onclick="moveRowUp(${ri})">▲</button>
        <button class="btn-icon move" title="Move down" onclick="moveRowDown(${ri})">▼</button>
        <button class="btn-icon" title="Delete row" onclick="deleteRow(${ri})">✕</button>
      </div>`;
    tr.appendChild(ctrlTd);

    // Data cells
    for (let ci = 0; ci < numCols; ci++) {
      const td = document.createElement('td');
      td.className = 'data-cell';
      const inp = document.createElement('input');
      inp.className = 'cell-input';
      inp.type = 'text';
      inp.value = (cells[ri] && cells[ri][ci] !== undefined) ? cells[ri][ci] : '';
      inp.setAttribute('data-row', ri);
      inp.setAttribute('data-col', ci);
      inp.addEventListener('input', () => generateOutputs());
      inp.addEventListener('keydown', handleCellKey);
      td.appendChild(inp);
      tr.appendChild(td);
    }

    // Extra cell to not conflict with add-col-cell column
    const extraTd = document.createElement('td');
    extraTd.style.background = 'var(--bg-card)';
    tr.appendChild(extraTd);

    tbody.appendChild(tr);
  }
}

function handleCellKey(e) {
  const ri = parseInt(e.target.dataset.row);
  const ci = parseInt(e.target.dataset.col);
  if (e.key === 'Tab') {
    e.preventDefault();
    const nextCi = e.shiftKey ? ci - 1 : ci + 1;
    if (nextCi >= 0 && nextCi < numCols) {
      focusCell(ri, nextCi);
    } else if (!e.shiftKey && ri < numRows - 1) {
      focusCell(ri + 1, 0);
    } else if (e.shiftKey && ri > 0) {
      focusCell(ri - 1, numCols - 1);
    }
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (ri < numRows - 1) focusCell(ri + 1, ci);
    else { addRow(); focusCell(ri + 1, ci); }
  }
  if (e.key === 'ArrowUp' && ri > 0) { e.preventDefault(); focusCell(ri - 1, ci); }
  if (e.key === 'ArrowDown' && ri < numRows - 1) { e.preventDefault(); focusCell(ri + 1, ci); }
}

function focusCell(ri, ci) {
  const tbody = document.getElementById('grid-body');
  const rows = tbody.querySelectorAll('tr');
  if (rows[ri]) {
    const inputs = rows[ri].querySelectorAll('input.cell-input');
    if (inputs[ci]) inputs[ci].focus();
  }
}

/* ── State mutations ─────────────────────────────────────────────────────────*/

function saveToCells() {
  loadFromDOM();
}

function addRow() {
  saveToCells();
  cells.push(Array(numCols).fill(''));
  numRows++;
  renderGrid();
}

function addColumn() {
  saveToCells();
  cells.forEach(row => row.push(''));
  alignments.push('left');
  numCols++;
  renderGrid();
}

function deleteRow(ri) {
  saveToCells();
  if (numRows <= 1) return;
  cells.splice(ri, 1);
  numRows--;
  renderGrid();
}

function deleteCol(ci) {
  saveToCells();
  if (numCols <= 1) return;
  cells.forEach(row => row.splice(ci, 1));
  alignments.splice(ci, 1);
  numCols--;
  renderGrid();
}

function moveRowUp(ri) {
  if (ri === 0) return;
  saveToCells();
  [cells[ri - 1], cells[ri]] = [cells[ri], cells[ri - 1]];
  renderGrid();
}

function moveRowDown(ri) {
  if (ri >= numRows - 1) return;
  saveToCells();
  [cells[ri], cells[ri + 1]] = [cells[ri + 1], cells[ri]];
  renderGrid();
}

function moveColLeft(ci) {
  if (ci === 0) return;
  saveToCells();
  cells.forEach(row => { [row[ci - 1], row[ci]] = [row[ci], row[ci - 1]]; });
  [alignments[ci - 1], alignments[ci]] = [alignments[ci], alignments[ci - 1]];
  numCols = cells[0].length;
  renderGrid();
}

function moveColRight(ci) {
  if (ci >= numCols - 1) return;
  saveToCells();
  cells.forEach(row => { [row[ci], row[ci + 1]] = [row[ci + 1], row[ci]]; });
  [alignments[ci], alignments[ci + 1]] = [alignments[ci + 1], alignments[ci]];
  numCols = cells[0].length;
  renderGrid();
}

function setAlign(ci, align) {
  saveToCells();
  alignments[ci] = align;
  renderGrid();
}

function trimEmptyAction() {
  saveToCells();
  const trimmed = trimEmpty(cells);
  if (trimmed.length === 0) {
    initState(2, 2);
  } else {
    cells = normalizeCells(trimmed);
    numRows = cells.length;
    numCols = cells[0].length;
    while (alignments.length < numCols) alignments.push('left');
    alignments = alignments.slice(0, numCols);
  }
  renderGrid();
}

function clearAll() {
  initState(3, 3);
  renderGrid();
}

/* ── Output generation ───────────────────────────────────────────────────────*/

function generateOutputs() {
  try {
    const data = getGridData();
    const hasHeader = document.getElementById('chk-header').checked;
    const md = generateMarkdown(data, alignments, hasHeader);
    const html = generateHTML(data, alignments, hasHeader);
    document.getElementById('output-md').textContent = md;
    document.getElementById('output-html').textContent = html;
  } catch (e) {
    console.error(e);
  }
}

/* ── CSV Import ──────────────────────────────────────────────────────────────*/

function importCSV() {
  try {
    const raw = document.getElementById('csv-input').value;
    if (!raw.trim()) {
      document.getElementById('import-msg').textContent = 'No CSV data.';
      return;
    }
    const parsed = parseCSV(raw);
    if (parsed.length === 0) {
      document.getElementById('import-msg').textContent = 'Could not parse CSV.';
      return;
    }
    cells = normalizeCells(parsed);
    numRows = cells.length;
    numCols = cells[0].length;
    alignments = Array(numCols).fill('left');
    document.getElementById('import-msg').textContent =
      `Imported ${numRows} rows × ${numCols} cols`;
    renderGrid();
  } catch (e) {
    document.getElementById('import-msg').textContent = 'Error: ' + e.message;
  }
}

/* ── Copy ────────────────────────────────────────────────────────────────────*/

function copyOutput(type) {
  try {
    const el = document.getElementById(type === 'md' ? 'output-md' : 'output-html');
    const btn = document.getElementById(type === 'md' ? 'copy-md' : 'copy-html');
    navigator.clipboard.writeText(el.textContent).then(() => {
      btn.classList.add('copied');
      btn.querySelector('span').textContent = '✓';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.querySelector('span').textContent = '⎘';
      }, 1500);
    });
  } catch (e) { console.error(e); }
}

/* ── Event wiring ────────────────────────────────────────────────────────────*/

document.getElementById('btn-add-row').addEventListener('click', addRow);
document.getElementById('btn-add-col').addEventListener('click', addColumn);
document.getElementById('btn-trim').addEventListener('click', trimEmptyAction);
document.getElementById('btn-clear').addEventListener('click', clearAll);
document.getElementById('btn-generate').addEventListener('click', generateOutputs);
document.getElementById('btn-import-csv').addEventListener('click', importCSV);
document.getElementById('chk-header').addEventListener('change', () => { saveToCells(); renderGrid(); });
