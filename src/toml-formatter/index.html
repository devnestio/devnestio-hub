<script>
// =============================================================================
// TOML PARSER
// =============================================================================
// Exported surface (also used by test harness):
//   parseTOML(src)  -> plain JS object  (throws TOMLError on syntax errors)
//   formatTOML(src) -> formatted string (throws TOMLError)
//   tomlToJSON(src) -> JSON string      (throws TOMLError)
//   jsonToTOML(src) -> TOML string      (throws Error)

class TOMLError extends Error {
  constructor(msg, line) {
    super(msg);
    this.line = line;
  }
}

function parseTOML(src) {
  const lines = src.split(/\r?\n/);
  const root = {};
  let current = root;        // current table context
  let currentPath = [];      // path segments of the current table
  let arrayTableCounters = {};  // path -> array used for [[array-of-tables]]
  // Track all defined table headers to detect duplicates
  const definedTables = new Set();
  const definedArrayTables = {};

  let i = 0;  // line index

  function err(msg) { throw new TOMLError(msg, i + 1); }

  // ---- Value parsers ----

  function skipWS(s, pos) {
    while (pos < s.length && (s[pos] === ' ' || s[pos] === '\t')) pos++;
    return pos;
  }

  function parseValue(s, pos) {
    pos = skipWS(s, pos);
    if (pos >= s.length || s[pos] === '#') err('Expected value');

    const ch = s[pos];

    // Multi-line basic string
    if (s.startsWith('"""', pos)) return parseMLBasicString(s, pos);
    // Multi-line literal string
    if (s.startsWith("'''", pos)) return parseMLLiteralString(s, pos);
    // Basic string
    if (ch === '"') return parseBasicString(s, pos);
    // Literal string
    if (ch === "'") return parseLiteralString(s, pos);
    // Array
    if (ch === '[') return parseArray(s, pos);
    // Inline table
    if (ch === '{') return parseInlineTable(s, pos);
    // Boolean
    if (s.startsWith('true', pos) && !isKeyChar(s[pos + 4])) return { val: true, end: pos + 4 };
    if (s.startsWith('false', pos) && !isKeyChar(s[pos + 5])) return { val: false, end: pos + 5 };
    // Special floats
    if (s.startsWith('inf', pos) || s.startsWith('+inf', pos)) return { val: Infinity, end: pos + (ch === '+' ? 4 : 3) };
    if (s.startsWith('-inf', pos)) return { val: -Infinity, end: pos + 4 };
    if (s.startsWith('nan', pos) || s.startsWith('+nan', pos) || s.startsWith('-nan', pos)) return { val: NaN, end: pos + (ch === '+' || ch === '-' ? 4 : 3) };
    // Number or datetime
    return parseNumberOrDate(s, pos);
  }

  function isKeyChar(c) {
    return c !== undefined && /[a-zA-Z0-9_\-]/.test(c);
  }

  function parseBasicString(s, pos) {
    // pos points at opening "
    let out = '';
    let p = pos + 1;
    while (p < s.length) {
      const c = s[p];
      if (c === '"') return { val: out, end: p + 1 };
      if (c === '\\') {
        const r = parseEscape(s, p + 1);
        out += r.ch;
        p = r.end;
      } else {
        out += c;
        p++;
      }
    }
    err('Unterminated basic string');
  }

  function parseLiteralString(s, pos) {
    let p = pos + 1;
    let out = '';
    while (p < s.length) {
      if (s[p] === "'") return { val: out, end: p + 1 };
      out += s[p++];
    }
    err('Unterminated literal string');
  }

  function parseMLBasicString(s, pos) {
    // Collect across lines
    let full = '';
    let li = i;
    // Build full text from remaining lines
    for (let j = i; j < lines.length; j++) {
      full += (j === i ? '' : '\n') + lines[j];
    }
    // Find start (pos within full that corresponds to pos in current line)
    const lineStart = lines.slice(0, i).join('\n').length + (i > 0 ? 1 : 0);
    const absPos = lineStart + pos;
    // Work on the combined text
    let p = absPos + 3; // skip """
    // Trim immediate newline after opening """
    if (full[p] === '\n') p++;
    else if (full[p] === '\r' && full[p+1] === '\n') p += 2;
    let out = '';
    while (p < full.length) {
      if (full.startsWith('"""', p)) {
        // handle up to 2 extra quotes before closing
        let extra = 0;
        while (full[p + 3 + extra] === '"' && extra < 2) extra++;
        out += '"'.repeat(extra);
        const endAbs = p + 3 + extra;
        // figure out new line index
        const consumed = full.slice(0, endAbs);
        const newlines = consumed.split('\n').length - 1;
        i = newlines;
        const newLineStart = consumed.lastIndexOf('\n') + 1;
        const endInLine = endAbs - newLineStart;
        return { val: processMLBasicString(out), end: endInLine };
      }
      if (full[p] === '\\') {
        const next = full[p + 1];
        if (next === '\n' || (next === '\r' && full[p+2] === '\n') || next === ' ' || next === '\t' || next === '\r') {
          // line-ending backslash: skip whitespace/newlines
          p += 2;
          while (p < full.length && (full[p] === ' ' || full[p] === '\t' || full[p] === '\n' || full[p] === '\r')) p++;
        } else {
          const r = parseEscape(full, p + 1);
          out += r.ch;
          p = r.end;
        }
      } else {
        out += full[p++];
      }
    }
    err('Unterminated multi-line basic string');
  }

  function processMLBasicString(s) { return s; }

  function parseMLLiteralString(s, pos) {
    let full = '';
    for (let j = i; j < lines.length; j++) {
      full += (j === i ? '' : '\n') + lines[j];
    }
    const lineStart = lines.slice(0, i).join('\n').length + (i > 0 ? 1 : 0);
    const absPos = lineStart + pos;
    let p = absPos + 3;
    if (full[p] === '\n') p++;
    else if (full[p] === '\r' && full[p+1] === '\n') p += 2;
    let out = '';
    while (p < full.length) {
      if (full.startsWith("'''", p)) {
        let extra = 0;
        while (full[p + 3 + extra] === "'" && extra < 2) extra++;
        out += "'".repeat(extra);
        const endAbs = p + 3 + extra;
        const consumed = full.slice(0, endAbs);
        const newlines = consumed.split('\n').length - 1;
        i = newlines;
        const newLineStart = consumed.lastIndexOf('\n') + 1;
        const endInLine = endAbs - newLineStart;
        return { val: out, end: endInLine };
      }
      out += full[p++];
    }
    err('Unterminated multi-line literal string');
  }

  function parseEscape(s, pos) {
    const escMap = { b:'\b', t:'\t', n:'\n', f:'\f', r:'\r', '"':'"', '\\':'\\' };
    const c = s[pos];
    if (c === 'u') {
      const hex = s.slice(pos+1, pos+5);
      if (!/^[0-9a-fA-F]{4}$/.test(hex)) throw new TOMLError('Invalid unicode escape', i+1);
      return { ch: String.fromCodePoint(parseInt(hex, 16)), end: pos + 5 };
    }
    if (c === 'U') {
      const hex = s.slice(pos+1, pos+9);
      if (!/^[0-9a-fA-F]{8}$/.test(hex)) throw new TOMLError('Invalid unicode escape', i+1);
      return { ch: String.fromCodePoint(parseInt(hex, 16)), end: pos + 9 };
    }
    if (c in escMap) return { ch: escMap[c], end: pos + 1 };
    throw new TOMLError('Invalid escape sequence: \\' + c, i+1);
  }

  function parseArray(s, pos) {
    let p = pos + 1;
    const arr = [];
    while (true) {
      p = skipWS(s, p);
      // skip newlines within arrays (multi-line)
      while (p >= s.length || s[p] === '#') {
        i++;
        if (i >= lines.length) err('Unterminated array');
        s = lines[i];
        p = 0;
        p = skipWS(s, p);
      }
      if (s[p] === ']') return { val: arr, end: p + 1 };
      if (s[p] === ',') { p++; continue; }
      const r = parseValue(s, p);
      arr.push(r.val);
      p = r.end;
      p = skipWS(s, p);
      // skip comment or newline
      while (p >= s.length || s[p] === '#') {
        i++;
        if (i >= lines.length) err('Unterminated array');
        s = lines[i];
        p = 0;
        p = skipWS(s, p);
      }
      if (s[p] === ',') { p++; continue; }
      if (s[p] === ']') return { val: arr, end: p + 1 };
      err('Expected , or ] in array');
    }
  }

  function parseInlineTable(s, pos) {
    let p = pos + 1;
    const obj = {};
    let first = true;
    while (true) {
      p = skipWS(s, p);
      if (s[p] === '}') return { val: obj, end: p + 1 };
      if (!first) {
        if (s[p] !== ',') err('Expected , in inline table');
        p++;
        p = skipWS(s, p);
      }
      first = false;
      const keyRes = parseKey(s, p);
      p = keyRes.end;
      p = skipWS(s, p);
      if (s[p] !== '=') err('Expected = after key in inline table');
      p++;
      const valRes = parseValue(s, p);
      setNestedKey(obj, keyRes.keys, valRes.val);
      p = valRes.end;
    }
  }

  function parseKey(s, pos) {
    const keys = [];
    let p = skipWS(s, pos);
    while (true) {
      let key;
      if (s[p] === '"') {
        const r = parseBasicString(s, p);
        key = r.val; p = r.end;
      } else if (s[p] === "'") {
        const r = parseLiteralString(s, p);
        key = r.val; p = r.end;
      } else {
        // bare key
        const start = p;
        while (p < s.length && /[a-zA-Z0-9_\-]/.test(s[p])) p++;
        if (p === start) err('Empty key');
        key = s.slice(start, p);
      }
      keys.push(key);
      p = skipWS(s, p);
      if (s[p] === '.') { p++; p = skipWS(s, p); } else break;
    }
    return { keys, end: p };
  }

  function parseNumberOrDate(s, pos) {
    // Try to read the token
    let p = pos;
    // collect the raw token
    let raw = '';
    // sign
    if (s[p] === '+' || s[p] === '-') { raw += s[p++]; }
    while (p < s.length && /[0-9a-fA-FxXoObB_eE+\-:TZ.]/.test(s[p])) {
      raw += s[p++];
    }
    if (raw === '' || raw === '+' || raw === '-') err('Expected number or date');

    const full = s[pos] === '+' || s[pos] === '-' ? raw : raw;
    const unsigned = (s[pos] === '+' || s[pos] === '-') ? raw.slice(1) : raw;

    // Datetime: contains T or - with colons pattern
    if (/^\d{4}-\d{2}-\d{2}/.test(raw)) {
      return { val: raw, end: p };  // keep as string, preserve original
    }

    // Hex / Octal / Binary
    if (unsigned.startsWith('0x')) {
      const n = parseInt(unsigned, 16);
      if (isNaN(n)) err('Invalid hex integer: ' + raw);
      return { val: (s[pos] === '-' ? -n : n), end: p };
    }
    if (unsigned.startsWith('0o')) {
      const n = parseInt(unsigned.slice(2), 8);
      if (isNaN(n)) err('Invalid octal integer: ' + raw);
      return { val: (s[pos] === '-' ? -n : n), end: p };
    }
    if (unsigned.startsWith('0b')) {
      const n = parseInt(unsigned.slice(2), 2);
      if (isNaN(n)) err('Invalid binary integer: ' + raw);
      return { val: (s[pos] === '-' ? -n : n), end: p };
    }

    // Float vs integer
    const noUnder = raw.replace(/_/g, '');
    if (/[.eE]/.test(noUnder)) {
      const f = parseFloat(noUnder);
      if (isNaN(f)) err('Invalid float: ' + raw);
      return { val: f, end: p };
    }
    // Integer
    const n = parseInt(noUnder, 10);
    if (isNaN(n)) err('Invalid integer: ' + raw);
    return { val: n, end: p };
  }

  // ---- Key setting helpers ----

  function getOrCreateTable(obj, key) {
    if (!(key in obj)) { obj[key] = {}; return obj[key]; }
    if (Array.isArray(obj[key])) return obj[key][obj[key].length - 1];
    if (typeof obj[key] === 'object' && obj[key] !== null) return obj[key];
    err('Key "' + key + '" already has a non-table value');
  }

  function setNestedKey(obj, keys, val) {
    let cur = obj;
    for (let k = 0; k < keys.length - 1; k++) {
      const key = keys[k];
      if (!(key in cur)) cur[key] = {};
      else if (Array.isArray(cur[key])) cur = cur[key][cur[key].length - 1];
      else if (typeof cur[key] !== 'object') err('Key "' + key + '" already defined as non-table');
      if (k < keys.length - 2 || !(keys[k+1] in (Array.isArray(cur[key]) ? cur[key][cur[key].length-1] : cur[key]))) {
        cur = Array.isArray(cur[key]) ? cur[key][cur[key].length - 1] : cur[key];
      } else {
        cur = Array.isArray(cur[key]) ? cur[key][cur[key].length - 1] : cur[key];
      }
    }
    const lastKey = keys[keys.length - 1];
    if (lastKey in cur && typeof cur[lastKey] !== 'object') err('Duplicate key: ' + keys.join('.'));
    cur[lastKey] = val;
  }

  // Navigate to a path creating tables along the way
  function navigatePath(pathArr) {
    let cur = root;
    for (let k = 0; k < pathArr.length; k++) {
      const key = pathArr[k];
      if (Array.isArray(cur[key])) {
        cur = cur[key][cur[key].length - 1];
      } else if (typeof cur[key] === 'object' && cur[key] !== null) {
        cur = cur[key];
      } else if (!(key in cur)) {
        cur[key] = {};
        cur = cur[key];
      } else {
        err('Key "' + key + '" already defined as a non-table value');
      }
    }
    return cur;
  }

  // ---- Main line-by-line parsing ----

  for (i = 0; i < lines.length; i++) {
    let line = lines[i];
    let pos = skipWS(line, 0);

    // Empty or comment
    if (pos >= line.length || line[pos] === '#') continue;

    // Array of tables: [[key]]
    if (line[pos] === '[' && line[pos + 1] === '[') {
      pos += 2;
      const keyRes = parseKey(line, pos);
      pos = keyRes.end;
      pos = skipWS(line, pos);
      if (!line.startsWith(']]', pos)) err('Expected ]] for array of tables');
      const pathKey = keyRes.keys.join('.');
      // Navigate to parent
      let cur = root;
      for (let k = 0; k < keyRes.keys.length - 1; k++) {
        cur = getOrCreateTable(cur, keyRes.keys[k]);
      }
      const last = keyRes.keys[keyRes.keys.length - 1];
      if (!(last in cur)) cur[last] = [];
      else if (!Array.isArray(cur[last])) err('Key "' + last + '" is not an array');
      const newTable = {};
      cur[last].push(newTable);
      current = newTable;
      currentPath = keyRes.keys;
      continue;
    }

    // Standard table: [key]
    if (line[pos] === '[') {
      pos++;
      const keyRes = parseKey(line, pos);
      pos = keyRes.end;
      pos = skipWS(line, pos);
      if (line[pos] !== ']') err('Expected ] to close table header');
      const pathKey = keyRes.keys.join('.');
      if (definedTables.has(pathKey)) err('Duplicate table definition: [' + pathKey + ']');
      definedTables.add(pathKey);
      current = navigatePath(keyRes.keys);
      currentPath = keyRes.keys;
      continue;
    }

    // Key-value pair
    const keyRes = parseKey(line, pos);
    pos = keyRes.end;
    pos = skipWS(line, pos);
    if (line[pos] !== '=') err('Expected = after key');
    pos++;
    const valRes = parseValue(line, pos);
    setNestedKey(current, keyRes.keys, valRes.val);
  }

  return root;
}

// =============================================================================
// TOML FORMATTER
// =============================================================================
function formatTOML(src) {
  // Parse to validate, then re-serialize
  const obj = parseTOML(src);
  return serializeTOML(obj);
}

function serializeTOML(obj, pathPrefix, arrayTablesTracked) {
  if (pathPrefix === undefined) pathPrefix = [];
  if (!arrayTablesTracked) arrayTablesTracked = new Set();
  let out = '';

  // Split keys into scalars/inline and sub-tables
  const scalarKeys = [];
  const tableKeys = [];
  const arrayTableKeys = [];

  for (const k of Object.keys(obj)) {
    const v = obj[k];
    if (Array.isArray(v) && v.length > 0 && typeof v[0] === 'object' && v[0] !== null && !Array.isArray(v[0])) {
      arrayTableKeys.push(k);
    } else if (isInlineValue(v)) {
      scalarKeys.push(k);
    } else {
      tableKeys.push(k);
    }
  }

  // Write scalar key-value pairs
  for (const k of scalarKeys) {
    out += tomlKey(k) + ' = ' + tomlValue(obj[k]) + '\n';
  }

  // Write sub-tables
  for (const k of tableKeys) {
    const v = obj[k];
    const subPath = [...pathPrefix, k];
    const header = '[' + subPath.map(tomlKey).join('.') + ']';
    if (out.length > 0 || pathPrefix.length > 0) out += '\n';
    out += header + '\n';
    out += serializeTOML(v, subPath, arrayTablesTracked);
  }

  // Write array of tables
  for (const k of arrayTableKeys) {
    const subPath = [...pathPrefix, k];
    const header = '[[' + subPath.map(tomlKey).join('.') + ']]';
    for (const item of obj[k]) {
      out += '\n' + header + '\n';
      out += serializeTOML(item, subPath, arrayTablesTracked);
    }
  }

  return out;
}

function isInlineValue(v) {
  if (v === null || typeof v !== 'object') return true;
  if (Array.isArray(v)) {
    // Array of tables -> not inline
    if (v.length > 0 && typeof v[0] === 'object' && v[0] !== null && !Array.isArray(v[0])) return false;
    return true;
  }
  return false;
}

function tomlKey(k) {
  // Quote if needed
  if (/^[a-zA-Z0-9_\-]+$/.test(k)) return k;
  return '"' + k.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
}

function tomlValue(v) {
  if (v === null) return '"null"';
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  if (typeof v === 'number') {
    if (Number.isNaN(v)) return 'nan';
    if (!isFinite(v)) return v > 0 ? 'inf' : '-inf';
    return String(v);
  }
  if (typeof v === 'string') {
    // Check if it looks like a datetime (keep unquoted representation)
    if (/^\d{4}-\d{2}-\d{2}/.test(v)) return v;
    return '"' + v.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t') + '"';
  }
  if (Array.isArray(v)) {
    if (v.length === 0) return '[]';
    const items = v.map(tomlValue).join(', ');
    return '[' + items + ']';
  }
  if (typeof v === 'object') {
    // inline table
    const pairs = Object.keys(v).map(k => tomlKey(k) + ' = ' + tomlValue(v[k]));
    return '{' + pairs.join(', ') + '}';
  }
  return String(v);
}

// =============================================================================
// TOML -> JSON
// =============================================================================
function tomlToJSON(src) {
  const obj = parseTOML(src);
  return JSON.stringify(obj, null, 2);
}

// =============================================================================
// JSON -> TOML
// =============================================================================
function jsonToTOML(src) {
  let obj;
  try { obj = JSON.parse(src); } catch(e) { throw new Error('Invalid JSON: ' + e.message); }
  if (typeof obj !== 'object' || obj === null || Array.isArray(obj)) {
    throw new Error('JSON root must be an object to convert to TOML');
  }
  return serializeTOML(obj).trimEnd() + '\n';
}

// =============================================================================
// SYNTAX HIGHLIGHTER (for display)
// =============================================================================
function highlightTOML(src) {
  const lines = src.split('\n');
  return lines.map(line => {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const trimmed = line.trim();
    if (trimmed.startsWith('#')) return '<span class="t-comment">' + esc(line) + '</span>';
    if (/^\[\[/.test(trimmed)) return '<span class="t-table">' + esc(line) + '</span>';
    if (/^\[/.test(trimmed)) return '<span class="t-table">' + esc(line) + '</span>';
    // key = value
    const m = line.match(/^(\s*)([^=]+?)(=)(.*)$/);
    if (m) {
      const val = m[4];
      let colored;
      if (/^\s*"/.test(val) || /^\s*'/.test(val)) colored = '<span class="t-str">' + esc(val) + '</span>';
      else if (/^\s*(true|false)/.test(val)) colored = '<span class="t-bool">' + esc(val) + '</span>';
      else if (/^\s*\d{4}-/.test(val)) colored = '<span class="t-date">' + esc(val) + '</span>';
      else if (/^\s*[-+]?\d/.test(val) || /^\s*(inf|nan)/.test(val)) colored = '<span class="t-num">' + esc(val) + '</span>';
      else colored = esc(val);
      return esc(m[1]) + '<span class="t-key">' + esc(m[2]) + '</span><span class="t-eq">' + esc(m[3]) + '</span>' + colored;
    }
    return esc(line);
  }).join('\n');
}

function highlightJSON(src) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc(src).replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
    if (/^"/.test(match)) return /:$/.test(match) ? '<span class="j-key">' + match + '</span>' : '<span class="j-str">' + match + '</span>';
    if (/true|false/.test(match)) return '<span class="j-bool">' + match + '</span>';
    if (/null/.test(match)) return '<span class="j-null">' + match + '</span>';
    return '<span class="j-num">' + match + '</span>';
  });
}

// =============================================================================
// UI STATE
// =============================================================================
let currentTab = 'formatted';
let lastResult = { formatted: '', json: '', errors: [] };

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderOutput();
}

function renderOutput() {
  const el = document.getElementById('outputArea');
  el.className = 'output-content' + (currentTab === 'errors' ? ' errors-view' : '');
  if (currentTab === 'formatted') {
    el.innerHTML = lastResult.formatted ? highlightTOML(lastResult.formatted) : '';
  } else if (currentTab === 'json') {
    el.innerHTML = lastResult.json ? highlightJSON(lastResult.json) : '';
  } else {
    if (lastResult.errors.length === 0) {
      el.innerHTML = '<span class="no-errors">No errors found.</span>';
    } else {
      el.innerHTML = lastResult.errors.map(e => {
        const loc = e.line ? 'Line ' + e.line + ': ' : '';
        return '<div class="err-line"><span class="err-msg">' + loc + escapeHTML(e.message) + '</span></div>';
      }).join('');
    }
  }
}

function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(msg, cls) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar ' + cls;
}

function runFormat() {
  const src = document.getElementById('inputArea').value;
  lastResult = { formatted: '', json: '', errors: [] };
  if (!src.trim()) { setStatus('', ''); renderOutput(); return; }
  try {
    const formatted = formatTOML(src);
    lastResult.formatted = formatted;
    try { lastResult.json = tomlToJSON(src); } catch(_) {}
    setStatus('Valid TOML — formatted successfully', 'status-ok');
    switchTab('formatted');
  } catch(e) {
    lastResult.errors = [e];
    setStatus((e.line ? 'Error on line ' + e.line + ': ' : 'Error: ') + e.message, 'status-err');
    switchTab('errors');
  }
  renderOutput();
}

function runToJSON() {
  const src = document.getElementById('inputArea').value;
  lastResult = { formatted: '', json: '', errors: [] };
  if (!src.trim()) { setStatus('', ''); renderOutput(); return; }
  try {
    lastResult.json = tomlToJSON(src);
    try { lastResult.formatted = formatTOML(src); } catch(_) {}
    setStatus('TOML parsed and converted to JSON', 'status-ok');
    switchTab('json');
  } catch(e) {
    lastResult.errors = [e];
    setStatus((e.line ? 'Error on line ' + e.line + ': ' : 'Error: ') + e.message, 'status-err');
    switchTab('errors');
  }
  renderOutput();
}

function runFromJSON() {
  const src = document.getElementById('inputArea').value;
  lastResult = { formatted: '', json: '', errors: [] };
  if (!src.trim()) { setStatus('', ''); renderOutput(); return; }
  try {
    const toml = jsonToTOML(src);
    lastResult.formatted = toml;
    lastResult.json = src;
    setStatus('JSON converted to TOML', 'status-ok');
    switchTab('formatted');
  } catch(e) {
    lastResult.errors = [{ message: e.message }];
    setStatus('Error: ' + e.message, 'status-err');
    switchTab('errors');
  }
  renderOutput();
}

function copyOutput() {
  let text = '';
  if (currentTab === 'formatted') text = lastResult.formatted;
  else if (currentTab === 'json') text = lastResult.json;
  if (!text) { setStatus('Nothing to copy', 'status-warn'); return; }
  navigator.clipboard.writeText(text).then(() => {
    setStatus('Copied to clipboard!', 'status-ok');
  }).catch(() => {
    setStatus('Copy failed — please select and copy manually', 'status-err');
  });
}

function clearAll() {
  document.getElementById('inputArea').value = '';
  lastResult = { formatted: '', json: '', errors: [] };
  setStatus('', '');
  document.getElementById('outputArea').innerHTML = '';
}
